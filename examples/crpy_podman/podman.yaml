- name: container
  description: Manage containers
  commands:
  - name: attach
    description: Attach to a running container
    params:
    - name: detach-keys
      type: STR
      description: 'Select the key sequence for detaching a container. Format is a single character [a-Z] or a comma separated
        sequence of `ctrl-<value>`, where `<value>` is one of: `a-z`, `@`, `^`, `[`, `\`, `]`, `^` or `_` (default "ctrl-p,ctrl-q")'
      default: '"ctrl-p,ctrl-q"'
    - name: no-stdin
      type: STR
      description: Do not attach STDIN. The default is false
      is_flag: true
    - name: sig-proxy
      type: STR
      description: Proxy received signals to the process (default true)
      default: 'true'
      is_flag: true
  - name: checkpoint
    description: Checkpoint one or more containers
    params:
    - name: all
      type: STR
      description: Checkpoint all running containers
      is_flag: true
    - name: compress
      type: STR
      description: Select compression algorithm (gzip, none, zstd) for checkpoint archive. (default "zstd")
      default: '"zstd"'
    - name: create-image
      type: STR
      description: Create checkpoint image with specified name
    - name: export
      type: STR
      description: Export the checkpoint image to a tar.gz
    - name: file-locks
      type: STR
      description: Checkpoint a container with file locks
      is_flag: true
    - name: ignore-rootfs
      type: STR
      description: Do not include root file-system changes when exporting
      is_flag: true
    - name: ignore-volumes
      type: STR
      description: Do not export volumes associated with container
      is_flag: true
    - name: keep
      type: STR
      description: Keep all temporary checkpoint files
      is_flag: true
    - name: leave-running
      type: STR
      description: Leave the container running after writing checkpoint to disk
      is_flag: true
    - name: pre-checkpoint
      type: STR
      description: Dump container's memory information only, leave the container running
      is_flag: true
    - name: print-stats
      type: STR
      description: Display checkpoint statistics
      is_flag: true
    - name: tcp-established
      type: STR
      description: Checkpoint a container with established TCP connections
      is_flag: true
    - name: with-previous
      type: STR
      description: Checkpoint container with pre-checkpoint images
      is_flag: true
  - name: clone
    description: Clone an existing container
    params:
    - name: blkio-weight
      type: STR
      description: Block IO weight (relative weight) accepts a weight value between 10 and 1000.
    - name: blkio-weight-device
      type: STR
      description: 'Block IO weight (relative device weight, format: DEVICE_NAME:WEIGHT)'
    - name: cpu-period
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) period
    - name: cpu-quota
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) quota
    - name: cpu-rt-period
      type: INT
      description: Limit the CPU real-time period in microseconds
    - name: cpu-rt-runtime
      type: INT
      description: Limit the CPU real-time runtime in microseconds
    - name: cpu-shares
      type: INT
      description: CPU shares (relative weight)
    - name: cpus
      type: STR
      description: Number of CPUs. The default is 0.000 which means no limit
    - name: cpuset-cpus
      type: STR
      description: CPUs in which to allow execution (0-3, 0,1)
    - name: cpuset-mems
      type: STR
      description: Memory nodes (MEMs) in which to allow execution (0-3, 0,1). Only effective on NUMA systems.
    - name: destroy
      type: STR
      description: destroy the original container
      is_flag: true
    - name: device-read-bps
      type: LIST
      description: Limit read rate (bytes per second) from a device (e.g. --device-read-bps=/dev/sda:1mb)
    - name: device-write-bps
      type: LIST
      description: Limit write rate (bytes per second) to a device (e.g. --device-write-bps=/dev/sda:1mb)
    - name: force
      type: STR
      description: force the existing container to be destroyed
      is_flag: true
    - name: memory
      type: STR
      description: 'Memory limit (format: <number>[<unit>], where unit = b (bytes), k (kibibytes), m (mebibytes), or g (gibibytes))'
    - name: memory-reservation
      type: STR
      description: 'Memory soft limit (format: <number>[<unit>], where unit = b (bytes), k (kibibytes), m (mebibytes), or
        g (gibibytes))'
    - name: memory-swap
      type: STR
      description: 'Swap limit equal to memory plus swap: ''-1'' to enable unlimited swap'
    - name: memory-swappiness
      type: INT
      description: Tune container memory swappiness (0 to 100, or -1 for system default) (default -1)
      default: '-1'
    - name: name
      type: STR
      description: Assign a name to the container
    - name: pod
      type: STR
      description: Run container in an existing pod
    - name: run
      type: STR
      description: run the new container
      is_flag: true
  - name: commit
    description: Create new image based on the changed container
    params:
    - name: author
      type: STR
      description: Set the author for the image committed
    - name: change
      type: LIST
      description: 'Apply the following possible instructions to the created image (default []): CMD | ENTRYPOINT | ENV |
        EXPOSE | LABEL | ONBUILD | STOPSIGNAL | USER | VOLUME | WORKDIR'
      default: '[]'
    - name: config
      type: STR
      description: file containing a container configuration to merge into the image
    - name: format
      type: STR
      description: Format of the image manifest and metadata (default "oci")
      default: '"oci"'
    - name: iidfile
      type: STR
      description: file to write the image ID to
    - name: include-volumes
      type: STR
      description: Include container volumes as image volumes
      is_flag: true
    - name: message
      type: STR
      description: Set commit message for imported image
    - name: pause
      type: STR
      description: Pause container during commit
      is_flag: true
    - name: quiet
      type: STR
      description: Suppress output
      is_flag: true
    - name: squash
      type: STR
      description: squash newly built layers into a single new layer
      is_flag: true
  - name: cp
    description: Copy files/folders between a container and the local filesystem
    params:
    - name: archive
      type: STR
      description: Chown copied files to the primary uid/gid of the destination container. (default true)
      default: 'true'
      is_flag: true
    - name: overwrite
      type: STR
      description: Allow to overwrite directories with non-directories and vice versa
      is_flag: true
  - name: create
    description: Create but do not start a container
    params:
    - name: add-host
      type: LIST
      description: Add a custom host-to-IP mapping (host:ip) (default [])
      default: '[]'
    - name: annotation
      type: LIST
      description: Add annotations to container (key=value)
    - name: arch
      type: STR
      description: use ARCH instead of the architecture of the machine for choosing images
    - name: attach
      type: LIST
      description: Attach to STDIN, STDOUT or STDERR
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: blkio-weight
      type: STR
      description: Block IO weight (relative weight) accepts a weight value between 10 and 1000.
    - name: blkio-weight-device
      type: STR
      description: 'Block IO weight (relative device weight, format: DEVICE_NAME:WEIGHT)'
    - name: cap-add
      type: LIST
      description: Add capabilities to the container
    - name: cap-drop
      type: LIST
      description: Drop capabilities from the container
    - name: cgroup-conf
      type: LIST
      description: Configure cgroup v2 (key=value)
    - name: cgroup-parent
      type: STR
      description: Optional parent cgroup for the container
    - name: cgroupns
      type: STR
      description: cgroup namespace to use
    - name: cgroups
      type: STR
      description: control container cgroup configuration ("enabled"|"disabled"|"no-conmon"|"split")
    - name: chrootdirs
      type: LIST
      description: Chroot directories inside the container
    - name: cidfile
      type: STR
      description: Write the container ID to the file
    - name: cpu-period
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) period
    - name: cpu-quota
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) quota
    - name: cpu-rt-period
      type: INT
      description: Limit the CPU real-time period in microseconds
    - name: cpu-rt-runtime
      type: INT
      description: Limit the CPU real-time runtime in microseconds
    - name: cpu-shares
      type: INT
      description: CPU shares (relative weight)
    - name: cpus
      type: STR
      description: Number of CPUs. The default is 0.000 which means no limit
    - name: cpuset-cpus
      type: STR
      description: CPUs in which to allow execution (0-3, 0,1)
    - name: cpuset-mems
      type: STR
      description: Memory nodes (MEMs) in which to allow execution (0-3, 0,1). Only effective on NUMA systems.
    - name: creds
      type: STR
      description: credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: device
      type: LIST
      description: Add a host device to the container
    - name: device-cgroup-rule
      type: LIST
      description: Add a rule to the cgroup allowed devices list
    - name: device-read-bps
      type: LIST
      description: Limit read rate (bytes per second) from a device (e.g. --device-read-bps=/dev/sda:1mb)
    - name: device-read-iops
      type: LIST
      description: Limit read rate (IO per second) from a device (e.g. --device-read-iops=/dev/sda:1000)
    - name: device-write-bps
      type: LIST
      description: Limit write rate (bytes per second) to a device (e.g. --device-write-bps=/dev/sda:1mb)
    - name: device-write-iops
      type: LIST
      description: Limit write rate (IO per second) to a device (e.g. --device-write-iops=/dev/sda:1000)
    - name: disable-content-trust
      type: STR
      description: This is a Docker specific option and is a NOOP
      is_flag: true
    - name: dns
      type: LIST
      description: Set custom DNS servers
    - name: dns-option
      type: LIST
      description: Set custom DNS options
    - name: dns-search
      type: LIST
      description: Set custom DNS search domains
    - name: entrypoint
      type: STR
      description: Overwrite the default ENTRYPOINT of the image
    - name: env
      type: LIST
      description: Set environment variables in container
    - name: env-file
      type: LIST
      description: Read in a file of environment variables
    - name: env-merge
      type: LIST
      description: Preprocess environment variables from image before injecting them into the container
    - name: expose
      type: LIST
      description: Expose a port or a range of ports
    - name: gidmap
      type: LIST
      description: GID map to use for the user namespace
    - name: gpus
      type: LIST
      description: GPU devices to add to the container ('all' to pass all GPUs)
    - name: group-add
      type: LIST
      description: Add additional groups to the primary container process. 'keep-groups' allows container processes to use
        supplementary groups.
    - name: group-entry
      type: STR
      description: Entry to write to /etc/group
    - name: health-cmd
      type: STR
      description: set a healthcheck command for the container ('none' disables the existing healthcheck)
    - name: health-interval
      type: STR
      description: set an interval for the healthcheck. (a value of disable results in no automatic timer setup)  (default
        "30s")
      default: '"30s"'
    - name: health-log-destination
      type: STR
      description: set the destination of the HealthCheck log. Directory path, local or events_logger (local use container
        state file)  (default "local")
      default: '"local"'
    - name: health-max-log-count
      type: INT
      description: set maximum number of attempts in the HealthCheck log file. ('0' value means an infinite number of attempts
        in the log file) (default 5)
      default: '5'
    - name: health-max-log-size
      type: INT
      description: set maximum length in characters of stored HealthCheck log. ('0' value means an infinite log length) (default
        500)
      default: '500'
    - name: health-on-failure
      type: STR
      description: action to take once the container turns unhealthy (default "none")
      default: '"none"'
    - name: health-retries
      type: INT
      description: the number of retries allowed before a healthcheck is considered to be unhealthy (default 3)
      default: '3'
    - name: health-start-period
      type: STR
      description: the initialization time needed for a container to bootstrap (default "0s")
      default: '"0s"'
    - name: health-startup-cmd
      type: STR
      description: Set a startup healthcheck command for the container
    - name: health-startup-interval
      type: STR
      description: Set an interval for the startup healthcheck.  (default "30s")
      default: '"30s"'
    - name: health-startup-retries
      type: INT
      description: Set the maximum number of retries before the startup healthcheck will restart the container
    - name: health-startup-success
      type: INT
      description: Set the number of consecutive successes before the startup healthcheck is marked as successful and the
        normal healthcheck begins (0 indicates any success will start the regular healthcheck)
    - name: health-startup-timeout
      type: STR
      description: Set the maximum amount of time that the startup healthcheck may take before it is considered failed (default
        "30s")
      default: '"30s"'
    - name: health-timeout
      type: STR
      description: the maximum time allowed to complete the healthcheck before an interval is considered failed and SIGKILL
        is sent to the healthcheck process (default "30s")
      default: '"30s"'
    - name: help
      type: STR
      is_flag: true
    - name: hostname
      type: STR
      description: Set container hostname
    - name: hosts-file
      type: STR
      description: Base file to create the /etc/hosts file inside the container, or one of the special values. ("image"|"none")
    - name: hostuser
      type: LIST
      description: Host user account to add to /etc/passwd within container
    - name: http-proxy
      type: STR
      description: Set proxy environment variables in the container based on the host proxy vars (default true)
      default: 'true'
      is_flag: true
    - name: image-volume
      type: STR
      description: Tells podman how to handle the builtin image volumes ("bind"|"tmpfs"|"ignore") (default "anonymous")
      default: '"anonymous"'
    - name: init
      type: STR
      description: Run an init binary inside the container that forwards signals and reaps processes
      is_flag: true
    - name: init-ctr
      type: STR
      description: Make this a pod init container.
    - name: init-path
      type: STR
      description: Path to the container-init binary
    - name: interactive
      type: STR
      description: Make STDIN available to the contained process
      is_flag: true
    - name: ip
      type: STR
      description: Specify a static IPv4 address for the container
    - name: ip6
      type: STR
      description: Specify a static IPv6 address for the container
    - name: ipc
      type: STR
      description: IPC namespace to use
    - name: label
      type: LIST
      description: Set metadata on container
    - name: label-file
      type: LIST
      description: Read in a line delimited file of labels
    - name: log-driver
      type: STR
      description: Logging driver for the container
    - name: log-opt
      type: LIST
      description: Logging driver options
    - name: mac-address
      type: STR
      description: Container MAC address (e.g. 92:d0:c6:0a:29:33)
    - name: memory
      type: STR
      description: 'Memory limit (format: <number>[<unit>], where unit = b (bytes), k (kibibytes), m (mebibytes), or g (gibibytes))'
    - name: memory-reservation
      type: STR
      description: 'Memory soft limit (format: <number>[<unit>], where unit = b (bytes), k (kibibytes), m (mebibytes), or
        g (gibibytes))'
    - name: memory-swap
      type: STR
      description: 'Swap limit equal to memory plus swap: ''-1'' to enable unlimited swap'
    - name: memory-swappiness
      type: INT
      description: Tune container memory swappiness (0 to 100, or -1 for system default) (default -1)
      default: '-1'
    - name: mount
      type: LIST
      description: Attach a filesystem mount to the container
    - name: name
      type: STR
      description: Assign a name to the container
    - name: network
      type: LIST
      description: Connect a container to a network
    - name: network-alias
      type: LIST
      description: Add network-scoped alias for the container
    - name: no-healthcheck
      type: STR
      description: Disable healthchecks on container
      is_flag: true
    - name: no-hostname
      type: STR
      description: Do not create /etc/hostname within the container, instead use the version from the image
      is_flag: true
    - name: no-hosts
      type: STR
      description: Do not create /etc/hosts within the container, instead use the version from the image
      is_flag: true
