      default: 'true'
      is_flag: true
    - name: stop-signal
      type: STR
      description: Signal to stop a container. Default is SIGTERM
    - name: stop-timeout
      type: INT
      description: Timeout (in seconds) that containers stopped by user command have to exit. If exceeded, the container will
        be forcibly stopped via SIGKILL. (default 10)
      default: '10'
    - name: subgidname
      type: STR
      description: Name of range listed in /etc/subgid for use in user namespace
    - name: subuidname
      type: STR
      description: Name of range listed in /etc/subuid for use in user namespace
    - name: sysctl
      type: LIST
      description: Sysctl options
    - name: systemd
      type: STR
      description: Run container in systemd mode ("true"|"false"|"always") (default "true")
      default: '"true"'
    - name: timeout
      type: INT
      description: Maximum length of time a container is allowed to run. The container will be killed automatically after
        the time expires.
    - name: tls-verify
      type: STR
      description: Require HTTPS and verify certificates when contacting registries for pulling images
      is_flag: true
    - name: tmpfs
      type: STR
      description: Mount a temporary filesystem (tmpfs) into a container
    - name: tty
      type: STR
      description: Allocate a pseudo-TTY for container
      is_flag: true
    - name: tz
      type: STR
      description: Set timezone in container
    - name: uidmap
      type: LIST
      description: UID map to use for the user namespace
    - name: ulimit
      type: LIST
      description: Ulimit options
    - name: umask
      type: STR
      description: Set umask in container (default "0022")
      default: '"0022"'
    - name: unsetenv
      type: LIST
      description: Unset environment default variables in container
    - name: unsetenv-all
      type: STR
      description: Unset all default environment variables in container
      is_flag: true
    - name: user
      type: STR
      description: 'Username or UID (format: <name|uid>[:<group|gid>])'
    - name: userns
      type: STR
      description: User namespace to use
    - name: uts
      type: STR
      description: UTS namespace to use
    - name: variant
      type: STR
      description: Use VARIANT instead of the running architecture variant for choosing images
    - name: volume
      type: LIST
      description: Bind mount a volume into the container. Volume source will be on the server machine, not the client
    - name: volumes-from
      type: LIST
      description: Mount volumes from the specified container(s)
    - name: workdir
      type: STR
      description: Working directory inside the container
  - name: start
    description: Start one or more containers
    params:
    - name: all
      type: STR
      description: Start all containers regardless of their state or configuration
      is_flag: true
    - name: attach
      type: STR
      description: Attach container's STDOUT and STDERR
      is_flag: true
    - name: detach-keys
      type: STR
      description: 'Select the key sequence for detaching a container. Format is a single character [a-Z] or a comma separated
        sequence of `ctrl-<value>`, where `<value>` is one of: `a-z`, `@`, `^`, `[`, `\`, `]`, `^` or `_` (default "ctrl-p,ctrl-q")'
      default: '"ctrl-p,ctrl-q"'
    - name: filter
      type: LIST
      description: Filter output based on conditions given
    - name: interactive
      type: STR
      description: Make STDIN available to the contained process
      is_flag: true
  - name: stats
    description: Display a live stream of container resource usage statistics
    params:
    - name: all
      type: STR
      description: Show all containers. Only running containers are shown by default. The default is false
      is_flag: true
    - name: format
      type: STR
      description: Pretty-print container statistics to JSON or using a Go template
    - name: interval
      type: INT
      description: Time in seconds between stats reports (default 5)
      default: '5'
    - name: no-reset
      type: STR
      description: Disable resetting the screen between intervals
      is_flag: true
    - name: no-stream
      type: STR
      description: Disable streaming stats and only pull the first result, default setting is false
      is_flag: true
    - name: no-trunc
      type: STR
      description: Do not truncate output
      is_flag: true
  - name: stop
    description: Stop one or more containers
    params:
    - name: all
      type: STR
      description: Stop all running containers
      is_flag: true
    - name: filter
      type: LIST
      description: Filter output based on conditions given
    - name: time
      type: INT
      description: Seconds to wait for stop before killing the container (default 10)
      default: '10'
  - name: top
    description: Display the running processes of a container
  - name: unpause
    description: Unpause the processes in one or more containers
    params:
    - name: all
      type: STR
      description: Unpause all paused containers
      is_flag: true
    - name: filter
      type: LIST
      description: Filter output based on conditions given
  - name: update
    description: Update an existing container
    params:
    - name: blkio-weight
      type: STR
      description: Block IO weight (relative weight) accepts a weight value between 10 and 1000.
    - name: blkio-weight-device
      type: STR
      description: 'Block IO weight (relative device weight, format: DEVICE_NAME:WEIGHT)'
    - name: cpu-period
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) period
    - name: cpu-quota
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) quota
    - name: cpu-rt-period
      type: INT
      description: Limit the CPU real-time period in microseconds
    - name: cpu-rt-runtime
      type: INT
      description: Limit the CPU real-time runtime in microseconds
    - name: cpu-shares
      type: INT
      description: CPU shares (relative weight)
    - name: cpus
      type: STR
      description: Number of CPUs. The default is 0.000 which means no limit
    - name: cpuset-cpus
      type: STR
      description: CPUs in which to allow execution (0-3, 0,1)
    - name: cpuset-mems
      type: STR
      description: Memory nodes (MEMs) in which to allow execution (0-3, 0,1). Only effective on NUMA systems.
    - name: device-read-bps
      type: LIST
      description: Limit read rate (bytes per second) from a device (e.g. --device-read-bps=/dev/sda:1mb)
    - name: device-read-iops
      type: LIST
      description: Limit read rate (IO per second) from a device (e.g. --device-read-iops=/dev/sda:1000)
    - name: device-write-bps
      type: LIST
      description: Limit write rate (bytes per second) to a device (e.g. --device-write-bps=/dev/sda:1mb)
    - name: device-write-iops
      type: LIST
      description: Limit write rate (IO per second) to a device (e.g. --device-write-iops=/dev/sda:1000)
    - name: env
      type: LIST
      description: Set environment variables in container
    - name: health-cmd
      type: STR
      description: set a healthcheck command for the container ('none' disables the existing healthcheck)
    - name: health-interval
      type: STR
      description: set an interval for the healthcheck. (a value of disable results in no automatic timer setup) Changing
        this setting resets timer. (default "30s")
      default: '"30s"'
    - name: health-log-destination
      type: STR
      description: 'set the destination of the HealthCheck log. Directory path, local or events_logger (local use container
        state file) Warning: Changing this setting may cause the loss of previous logs! (default "local")'
      default: '"local"'
    - name: health-max-log-count
      type: INT
      description: set maximum number of attempts in the HealthCheck log file. ('0' value means an infinite number of attempts
        in the log file) (default 5)
      default: '5'
    - name: health-max-log-size
      type: INT
      description: set maximum length in characters of stored HealthCheck log. ('0' value means an infinite log length) (default
        500)
      default: '500'
    - name: health-on-failure
      type: STR
      description: action to take once the container turns unhealthy (default "none")
      default: '"none"'
    - name: health-retries
      type: INT
      description: the number of retries allowed before a healthcheck is considered to be unhealthy (default 3)
      default: '3'
    - name: health-start-period
      type: STR
      description: the initialization time needed for a container to bootstrap (default "0s")
      default: '"0s"'
    - name: health-startup-cmd
      type: STR
      description: Set a startup healthcheck command for the container
    - name: health-startup-interval
      type: STR
      description: Set an interval for the startup healthcheck. Changing this setting resets the timer, depending on the state
        of the container. (default "30s")
      default: '"30s"'
    - name: health-startup-retries
      type: INT
      description: Set the maximum number of retries before the startup healthcheck will restart the container
    - name: health-startup-success
      type: INT
      description: Set the number of consecutive successes before the startup healthcheck is marked as successful and the
        normal healthcheck begins (0 indicates any success will start the regular healthcheck)
    - name: health-startup-timeout
      type: STR
      description: Set the maximum amount of time that the startup healthcheck may take before it is considered failed (default
        "30s")
      default: '"30s"'
    - name: health-timeout
      type: STR
      description: the maximum time allowed to complete the healthcheck before an interval is considered failed and SIGKILL
        is sent to the healthcheck process (default "30s")
      default: '"30s"'
    - name: memory
      type: STR
      description: 'Memory limit (format: <number>[<unit>], where unit = b (bytes), k (kibibytes), m (mebibytes), or g (gibibytes))'
    - name: memory-reservation
      type: STR
      description: 'Memory soft limit (format: <number>[<unit>], where unit = b (bytes), k (kibibytes), m (mebibytes), or
        g (gibibytes))'
    - name: memory-swap
      type: STR
      description: 'Swap limit equal to memory plus swap: ''-1'' to enable unlimited swap'
    - name: memory-swappiness
      type: INT
      description: Tune container memory swappiness (0 to 100, or -1 for system default) (default -1)
      default: '-1'
    - name: no-healthcheck
      type: STR
      description: Disable healthchecks on container
      is_flag: true
    - name: pids-limit
      type: INT
      description: Tune container pids limit (set -1 for unlimited) (default -1)
      default: '-1'
    - name: restart
      type: STR
      description: Restart policy to apply when a container exits ("always"|"no"|"never"|"on-failure"|"unless-stopped")
    - name: ulimit
      type: LIST
      description: Ulimit options
    - name: unsetenv
      type: LIST
      description: Unset environment default variables in container
  - name: wait
    description: Block on one or more containers
    params:
    - name: condition
      type: LIST
      description: Condition to wait on
    - name: exit-first-match
      type: STR
      description: Wait for exit of first container which matches conditions, ignore other ones
      is_flag: true
    - name: ignore
      type: STR
      description: Ignore if a container does not exist
      is_flag: true
    - name: interval
      type: STR
      description: Time Interval to wait before polling for completion (default "250ms")
      default: '"250ms"'
- name: farm
  description: Farm out builds to remote machines
  commands:
  - name: build
    description: Build a container image for multiple architectures
    params:
    - name: add-host
      type: STR
      description: add a custom host-to-IP mapping (host:ip) (default [])
      default: '[]'
    - name: annotation
      type: LIST
      description: set metadata for an image (default [])
      default: '[]'
    - name: authfile
      type: STR
      description: path of the authentication file.
    - name: build-arg
      type: STR
      description: argument=value to supply to the builder
    - name: build-arg-file
      type: STR
      description: argfile.conf containing lines of argument=value to supply to the builder
    - name: build-context
      type: STR
      description: argument=value to supply additional build context to the builder
    - name: cache-from
      type: LIST
      description: remote repository list to utilise as potential cache source.
    - name: cache-to
      type: LIST
      description: remote repository list to utilise as potential cache destination.
    - name: cache-ttl
      type: STR
      description: only consider cache images under specified duration.
    - name: cap-add
      type: LIST
      description: add the specified capability when running (default [])
      default: '[]'
    - name: cap-drop
      type: LIST
      description: drop the specified capability when running (default [])
      default: '[]'
    - name: cert-dir
      type: STR
      description: use certificates at the specified path to access the registry
    - name: cgroup-parent
      type: STR
      description: optional parent cgroup for the container
    - name: cgroupns
      type: STR
      description: '''private'', or ''host'''
    - name: cleanup
      type: STR
      description: Remove built images from farm nodes on success
      is_flag: true
    - name: compat-volumes
      type: STR
      description: preserve the contents of VOLUMEs during RUN instructions
      is_flag: true
    - name: cpp-flag
      type: LIST
      description: set additional flag to pass to C preprocessor (cpp)
    - name: cpu-period
      type: INT
      description: limit the CPU CFS (Completely Fair Scheduler) period
    - name: cpu-quota
      type: INT
      description: limit the CPU CFS (Completely Fair Scheduler) quota
    - name: cpu-shares
      type: INT
      description: CPU shares (relative weight)
    - name: cpuset-cpus
      type: STR
      description: CPUs in which to allow execution (0-3, 0,1)
    - name: cpuset-mems
      type: STR
      description: memory nodes (MEMs) in which to allow execution (0-3, 0,1). Only effective on NUMA systems.
    - name: created-annotation
      type: STR
      description: set an "org.opencontainers.image.created" annotation in the image (default true)
      default: 'true'
      is_flag: true
    - name: creds
      type: STR
      description: use [username[:password]] for accessing the registry
    - name: decryption-key
      type: LIST
      description: key needed to decrypt the image
    - name: device
      type: LIST
      description: additional devices to provide
    - name: disable-compression
      type: STR
      description: don't compress layers by default (default true)
      default: 'true'
      is_flag: true
    - name: dns
      type: STR
      description: set custom DNS servers or disable it completely by setting it to 'none', which prevents the automatic creation
        of /etc/resolv.conf.
    - name: dns-option
      type: LIST
      description: set custom DNS options
    - name: dns-search
      type: LIST
      description: set custom DNS search domains
    - name: env
      type: LIST
      description: set environment variable for the image
    - name: farm
      type: STR
      description: Farm to use for builds
    - name: force-rm
      type: STR
      description: always remove intermediate containers after a build, even if the build is unsuccessful. (default true)
      default: 'true'
      is_flag: true
    - name: format
      type: STR
      description: format of the built image's manifest and metadata. Use BUILDAH_FORMAT environment variable to override.
        (default "oci")
      default: '"oci"'
    - name: from
      type: STR
      description: image name used to replace the value in the first FROM instruction in the Containerfile
    - name: group-add
      type: LIST
      description: add additional groups to the primary container process. 'keep-groups' allows container processes to use
        supplementary groups.
    - name: hooks-dir
      type: LIST
      description: set the OCI hooks directory path (may be set multiple times)
    - name: http-proxy
      type: STR
      description: pass through HTTP Proxy environment variables (default true)
      default: 'true'
      is_flag: true
    - name: identity-label
      type: STR
      description: add default identity label (default true)
      default: 'true'
      is_flag: true
    - name: ignorefile
      type: STR
      description: path to an alternate .dockerignore file
    - name: iidfile
      type: STR
      description: file to write the image ID to
    - name: inherit-annotations
      type: STR
      description: inherit the annotations from the base image or base stages. (default true)
      default: 'true'
      is_flag: true
    - name: inherit-labels
      type: STR
      description: inherit the labels from the base image or base stages. (default true)
      default: 'true'
      is_flag: true
    - name: ipc
      type: STR
      description: '''private'', path of IPC namespace to join, or ''host'''
    - name: isolation
      type: STR
      description: type of process isolation to use. Use BUILDAH_ISOLATION environment variable to override. (default "rootless")
      default: '"rootless"'
    - name: jobs
      type: INT
      description: how many stages to run in parallel (default 1)
      default: '1'
    - name: label
      type: LIST
      description: set metadata for an image (default [])
      default: '[]'
    - name: layer-label
      type: LIST
      description: set metadata for an intermediate image (default [])
      default: '[]'
    - name: layers
      type: STR
      description: use intermediate layers during build. Use BUILDAH_LAYERS environment variable to override. (default true)
      default: 'true'
      is_flag: true
    - name: local
      type: STR
      description: Build image on local machine as well as on farm nodes (default true)
      default: 'true'
      is_flag: true
    - name: logfile
      type: STR
      description: log to file instead of stdout/stderr
    - name: memory
      type: STR
      description: 'memory limit (format: <number>[<unit>], where unit = b, k, m or g)'
    - name: memory-swap
      type: STR
      description: 'swap limit equal to memory plus swap: ''-1'' to enable unlimited swap'
    - name: network
      type: STR
      description: '''private'', ''none'', ''ns:path'' of network namespace to join, or ''host'''
    - name: no-cache
      type: STR
      description: do not use existing cached images for the container build. Build from the start with a new set of cached
        layers.
      is_flag: true
    - name: no-hostname
      type: STR
      description: do not create new /etc/hostname file for RUN instructions, use the one from the base image.
      is_flag: true
    - name: no-hosts
      type: STR
      description: do not create new /etc/hosts file for RUN instructions, use the one from the base image.
      is_flag: true
    - name: omit-history
      type: STR
      description: omit build history information from built image
      is_flag: true
    - name: os-feature
      type: STR
      description: set required OS feature for the target image in addition to values from the base image
    - name: os-version
      type: STR
      description: set required OS version for the target image instead of the value from the base image
    - name: pid
      type: STR
      description: private, path of PID namespace to join, or 'host'
    - name: platforms
      type: LIST
      description: Build only on farm nodes that match the given platforms
    - name: pull
      type: STR
      description: Pull image policy ("always"|"missing"|"never"|"newer") (default "missing")
      default: '"missing"'
    - name: quiet
      type: STR
      description: refrain from announcing build instructions and image read/write progress
      is_flag: true
    - name: retry
      type: INT
      description: number of times to retry in case of failure when performing push/pull (default 3)
      default: '3'
    - name: retry-delay
      type: STR
      description: delay between retries in case of push/pull failures
    - name: rewrite-timestamp
      type: STR
      description: set timestamps in layers to no later than the value for --source-date-epoch
      is_flag: true
    - name: rm
      type: STR
      description: remove intermediate containers after a successful build (default true)
      default: 'true'
      is_flag: true
    - name: runtime-flag
      type: LIST
      description: add global flags for the container runtime
    - name: sbom
      type: STR
      description: scan working container using preset configuration
    - name: sbom-image-output
      type: STR
      description: add scan results to image as path
    - name: sbom-image-purl-output
      type: STR
      description: add scan results to image as path
    - name: sbom-merge-strategy
      type: STR
      description: merge scan results using strategy
    - name: sbom-output
      type: STR
      description: save scan results to file
    - name: sbom-purl-output
      type: STR
      description: save scan results to file`
    - name: sbom-scanner-command
      type: STR
      description: scan working container using command in scanner image
    - name: sbom-scanner-image
      type: STR
      description: scan working container using scanner command from image
    - name: secret
      type: LIST
      description: secret file to expose to the build
    - name: security-opt
      type: LIST
      description: security options (default [])
      default: '[]'
    - name: shm-size
      type: STR
      description: size of '/dev/shm'. The format is <number><unit>. (default "65536k")
      default: '"65536k"'
    - name: skip-unused-stages
      type: STR
      description: skips stages in multi-stage builds which do not affect the final target (default true)
      default: 'true'
      is_flag: true
    - name: source-date-epoch
      type: STR
      description: set new timestamps in image info to seconds after the epoch, defaults to current time
    - name: squash
      type: STR
      description: squash all image layers into a single layer
      is_flag: true
    - name: squash-all
      type: STR
      description: Squash all layers into a single layer
      is_flag: true
    - name: ssh
      type: LIST
      description: 'SSH agent socket or keys to expose to the build. (format: default|<id>[=<socket>|<key>[,<key>]])'
    - name: tag
      type: STR
      description: tagged name to apply to the built image
    - name: target
      type: STR
      description: set the target build stage to build
    - name: timestamp
      type: STR
      description: set new timestamps in image info and layer to seconds after the epoch, defaults to current times
    - name: tls-verify
      type: STR
      description: require HTTPS and verify certificates when accessing the registry (default true)
      default: 'true'
      is_flag: true
    - name: ulimit
      type: LIST
      description: ulimit options
    - name: unsetannotation
      type: LIST
      description: unset annotation when inheriting annotations from base image
    - name: unsetenv
      type: LIST
      description: unset environment variable from final image
    - name: unsetlabel
      type: LIST
      description: unset label when inheriting labels from base image
    - name: userns
      type: STR
      description: '''container'', path of user namespace to join, or ''host'''
    - name: userns-gid-map
      type: STR
      description: containerGID:hostGID:length GID mapping to use in user namespace
    - name: userns-gid-map-group
      type: STR
      description: name of entries from /etc/subgid to use to set user namespace GID mapping
    - name: userns-uid-map
      type: STR
      description: containerUID:hostUID:length UID mapping to use in user namespace
    - name: userns-uid-map-user
      type: STR
      description: name of entries from /etc/subuid to use to set user namespace UID mapping
    - name: uts
      type: STR
      description: private, :path of UTS namespace to join, or 'host'
    - name: volume
      type: LIST
      description: bind mount a volume into the container
  - name: create
    description: Create a new farm
  - name: list
    description: List all existing farms
    params:
    - name: format
      type: STR
      description: Format farm output using Go template
  - name: remove
    description: Remove one or more farms
    params:
    - name: all
      type: STR
      description: Remove all farms
      is_flag: true
  - name: update
    description: Update an existing farm
    params:
    - name: add
      type: LIST
      description: add system connection(s) to farm
    - name: default
      type: STR
      description: set the given farm as the default farm
      is_flag: true
    - name: remove
      type: LIST
      description: remove system connection(s) from farm
- name: generate
  description: Generate structured data based on containers, pods or volumes
  commands:
  - name: kube
    description: Generate Kubernetes YAML from containers, pods or volumes.
    params:
    - name: filename
      type: STR
      description: Write output to the specified path
    - name: podman-only
      type: STR
      description: Add podman-only reserved annotations to the generated YAML file (Cannot be used by Kubernetes)
      is_flag: true
    - name: replicas
      type: INT
      description: Set the replicas number for Deployment kind (default 1)
      default: '1'
    - name: service
      type: STR
      description: Generate YAML for a Kubernetes service object
      is_flag: true
    - name: type
      type: STR
      description: Generate YAML for the given Kubernetes kind
  - name: spec
    description: Generate Specgen JSON based on containers or pods
    params:
    - name: compact
      type: STR
      description: Print the json in a compact format for consumption
      is_flag: true
    - name: filename
      type: STR
      description: Write output to the specified path
    - name: name
      type: STR
      description: Specify a new name for the generated spec (default true)
      default: 'true'
      is_flag: true
  - name: systemd
    description: '[DEPRECATED] Generate systemd units'
    params:
    - name: after
      type: LIST
      description: Add dependencies order to the generated unit file
    - name: container-prefix
      type: STR
      description: Systemd unit name prefix for containers (default "container")
      default: '"container"'
    - name: env
      type: LIST
      description: Set environment variables to the systemd unit files
    - name: files
      type: STR
      description: Generate .service files instead of printing to stdout
      is_flag: true
    - name: format
      type: STR
      description: Print the created units in specified format (json)
    - name: name
      type: STR
      description: Use container/pod names instead of IDs
      is_flag: true
    - name: new
      type: STR
      description: Create a new container or pod instead of starting an existing one
      is_flag: true
    - name: no-header
      type: STR
      description: Skip header generation
      is_flag: true
    - name: pod-prefix
      type: STR
      description: Systemd unit name prefix for pods (default "pod")
      default: '"pod"'
    - name: requires
      type: LIST
      description: Similar to wants, but declares stronger requirement dependencies
    - name: restart-policy
      type: STR
      description: Systemd restart-policy (default "on-failure")
      default: '"on-failure"'
    - name: restart-sec
      type: INT
      description: Systemd restart-sec
    - name: separator
      type: STR
      description: Systemd unit name separator between name/id and prefix (default "-")
      default: '"-"'
    - name: start-timeout
      type: INT
      description: Start timeout override
    - name: stop-timeout
      type: INT
      description: Stop timeout override (default 10)
      default: '10'
    - name: template
      type: STR
      description: Make it a template file and use %i and %I specifiers. Working only for containers
      is_flag: true
    - name: wants
      type: LIST
      description: Add (weak) requirement dependencies to the generated unit file
- name: image
  description: Manage images
  commands:
  - name: build
    description: Build an image using instructions from Containerfiles
    params:
    - name: add-host
      type: STR
      description: add a custom host-to-IP mapping (host:ip) (default [])
      default: '[]'
    - name: all-platforms
      type: STR
      description: attempt to build for all base image platforms
      is_flag: true
    - name: annotation
      type: LIST
      description: set metadata for an image (default [])
      default: '[]'
    - name: arch
      type: STR
      description: set the ARCH of the image to the provided value instead of the architecture of the host (default "arm64")
      default: '"arm64"'
    - name: authfile
      type: STR
      description: path of the authentication file.
    - name: build-arg
      type: STR
      description: argument=value to supply to the builder
    - name: build-arg-file
      type: STR
      description: argfile.conf containing lines of argument=value to supply to the builder
    - name: build-context
      type: STR
      description: argument=value to supply additional build context to the builder
    - name: cache-from
      type: LIST
      description: remote repository list to utilise as potential cache source.
    - name: cache-to
      type: LIST
      description: remote repository list to utilise as potential cache destination.
    - name: cache-ttl
      type: STR
      description: only consider cache images under specified duration.
    - name: cap-add
      type: LIST
      description: add the specified capability when running (default [])
      default: '[]'
    - name: cap-drop
      type: LIST
      description: drop the specified capability when running (default [])
      default: '[]'
    - name: cert-dir
      type: STR
      description: use certificates at the specified path to access the registry
    - name: cgroup-parent
      type: STR
      description: optional parent cgroup for the container
    - name: cgroupns
      type: STR
      description: '''private'', or ''host'''
    - name: compat-volumes
      type: STR
      description: preserve the contents of VOLUMEs during RUN instructions
      is_flag: true
    - name: cpp-flag
      type: LIST
      description: set additional flag to pass to C preprocessor (cpp)
    - name: cpu-period
      type: INT
      description: limit the CPU CFS (Completely Fair Scheduler) period
    - name: cpu-quota
      type: INT
      description: limit the CPU CFS (Completely Fair Scheduler) quota
    - name: cpu-shares
      type: INT
      description: CPU shares (relative weight)
    - name: cpuset-cpus
      type: STR
      description: CPUs in which to allow execution (0-3, 0,1)
    - name: cpuset-mems
      type: STR
      description: memory nodes (MEMs) in which to allow execution (0-3, 0,1). Only effective on NUMA systems.
    - name: created-annotation
      type: STR
      description: set an "org.opencontainers.image.created" annotation in the image (default true)
      default: 'true'
      is_flag: true
    - name: creds
      type: STR
      description: use [username[:password]] for accessing the registry
    - name: decryption-key
      type: LIST
      description: key needed to decrypt the image
    - name: device
      type: LIST
      description: additional devices to provide
    - name: disable-compression
      type: STR
      description: don't compress layers by default (default true)
      default: 'true'
      is_flag: true
    - name: dns
      type: STR
      description: set custom DNS servers or disable it completely by setting it to 'none', which prevents the automatic creation
        of /etc/resolv.conf.
    - name: dns-option
      type: LIST
      description: set custom DNS options
    - name: dns-search
      type: LIST
      description: set custom DNS search domains
    - name: env
      type: LIST
      description: set environment variable for the image
    - name: force-rm
      type: STR
      description: always remove intermediate containers after a build, even if the build is unsuccessful. (default true)
      default: 'true'
      is_flag: true
    - name: format
      type: STR
      description: format of the built image's manifest and metadata. Use BUILDAH_FORMAT environment variable to override.
        (default "oci")
      default: '"oci"'
    - name: from
      type: STR
      description: image name used to replace the value in the first FROM instruction in the Containerfile
    - name: group-add
      type: LIST
      description: add additional groups to the primary container process. 'keep-groups' allows container processes to use
        supplementary groups.
    - name: hooks-dir
      type: LIST
      description: set the OCI hooks directory path (may be set multiple times)
    - name: http-proxy
      type: STR
      description: pass through HTTP Proxy environment variables (default true)
      default: 'true'
      is_flag: true
    - name: identity-label
      type: STR
      description: add default identity label (default true)
      default: 'true'
      is_flag: true
    - name: ignorefile
      type: STR
      description: path to an alternate .dockerignore file
    - name: iidfile
      type: STR
      description: file to write the image ID to
    - name: inherit-annotations
      type: STR
      description: inherit the annotations from the base image or base stages. (default true)
      default: 'true'
      is_flag: true
    - name: inherit-labels
      type: STR
      description: inherit the labels from the base image or base stages. (default true)
      default: 'true'
      is_flag: true
    - name: ipc
      type: STR
      description: '''private'', path of IPC namespace to join, or ''host'''
    - name: isolation
      type: STR
      description: type of process isolation to use. Use BUILDAH_ISOLATION environment variable to override. (default "rootless")
      default: '"rootless"'
    - name: jobs
      type: INT
      description: how many stages to run in parallel (default 1)
      default: '1'
    - name: label
      type: LIST
      description: set metadata for an image (default [])
      default: '[]'
    - name: layer-label
      type: LIST
      description: set metadata for an intermediate image (default [])
      default: '[]'
    - name: layers
      type: STR
      description: use intermediate layers during build. Use BUILDAH_LAYERS environment variable to override. (default true)
      default: 'true'
      is_flag: true
    - name: logfile
      type: STR
      description: log to file instead of stdout/stderr
    - name: manifest
      type: STR
      description: add the image to the specified manifest list. Creates manifest list if it does not exist
    - name: memory
      type: STR
      description: 'memory limit (format: <number>[<unit>], where unit = b, k, m or g)'
    - name: memory-swap
      type: STR
      description: 'swap limit equal to memory plus swap: ''-1'' to enable unlimited swap'
    - name: network
      type: STR
      description: '''private'', ''none'', ''ns:path'' of network namespace to join, or ''host'''
    - name: no-cache
      type: STR
      description: do not use existing cached images for the container build. Build from the start with a new set of cached
        layers.
      is_flag: true
    - name: no-hostname
      type: STR
      description: do not create new /etc/hostname file for RUN instructions, use the one from the base image.
      is_flag: true
    - name: no-hosts
      type: STR
      description: do not create new /etc/hosts file for RUN instructions, use the one from the base image.
      is_flag: true
    - name: omit-history
      type: STR
      description: omit build history information from built image
      is_flag: true
    - name: os
      type: STR
      description: set the OS to the provided value instead of the current operating system of the host (default "darwin")
      default: '"darwin"'
    - name: os-feature
      type: STR
      description: set required OS feature for the target image in addition to values from the base image
    - name: os-version
      type: STR
      description: set required OS version for the target image instead of the value from the base image
    - name: pid
      type: STR
      description: private, path of PID namespace to join, or 'host'
    - name: platform
      type: STR
      description: set the OS/ARCH[/VARIANT] of the image to the provided value instead of the current operating system and
        architecture of the host (for example "linux/arm") (default [darwin/arm64/v8])
      default: '[darwin/arm64/v8]'
    - name: pull
      type: STR
      description: Pull image policy ("always"|"missing"|"never"|"newer") (default "missing")
      default: '"missing"'
    - name: quiet
      type: STR
      description: refrain from announcing build instructions and image read/write progress
      is_flag: true
    - name: retry
      type: INT
      description: number of times to retry in case of failure when performing push/pull (default 3)
      default: '3'
    - name: retry-delay
      type: STR
      description: delay between retries in case of push/pull failures
    - name: rewrite-timestamp
      type: STR
      description: set timestamps in layers to no later than the value for --source-date-epoch
      is_flag: true
    - name: rm
      type: STR
      description: remove intermediate containers after a successful build (default true)
      default: 'true'
      is_flag: true
    - name: runtime-flag
      type: LIST
      description: add global flags for the container runtime
    - name: sbom
      type: STR
      description: scan working container using preset configuration
    - name: sbom-image-output
      type: STR
      description: add scan results to image as path
    - name: sbom-image-purl-output
      type: STR
      description: add scan results to image as path
    - name: sbom-merge-strategy
      type: STR
      description: merge scan results using strategy
    - name: sbom-output
      type: STR
      description: save scan results to file
    - name: sbom-purl-output
      type: STR
      description: save scan results to file`
    - name: sbom-scanner-command
      type: STR
      description: scan working container using command in scanner image
    - name: sbom-scanner-image
      type: STR
      description: scan working container using scanner command from image
    - name: secret
      type: LIST
      description: secret file to expose to the build
    - name: security-opt
      type: LIST
      description: security options (default [])
      default: '[]'
    - name: shm-size
      type: STR
      description: size of '/dev/shm'. The format is <number><unit>. (default "65536k")
      default: '"65536k"'
    - name: skip-unused-stages
      type: STR
      description: skips stages in multi-stage builds which do not affect the final target (default true)
      default: 'true'
      is_flag: true
    - name: source-date-epoch
      type: STR
      description: set new timestamps in image info to seconds after the epoch, defaults to current time
    - name: squash
      type: STR
      description: squash all image layers into a single layer
      is_flag: true
    - name: squash-all
      type: STR
      description: Squash all layers into a single layer
      is_flag: true
    - name: ssh
      type: LIST
      description: 'SSH agent socket or keys to expose to the build. (format: default|<id>[=<socket>|<key>[,<key>]])'
    - name: stdin
      type: STR
      description: pass stdin into containers
      is_flag: true
    - name: tag
      type: STR
      description: tagged name to apply to the built image
    - name: target
      type: STR
      description: set the target build stage to build
    - name: timestamp
      type: STR
      description: set new timestamps in image info and layer to seconds after the epoch, defaults to current times
    - name: ulimit
      type: LIST
      description: ulimit options
    - name: unsetannotation
      type: LIST
      description: unset annotation when inheriting annotations from base image
    - name: unsetenv
      type: LIST
      description: unset environment variable from final image
    - name: unsetlabel
      type: LIST
      description: unset label when inheriting labels from base image
    - name: userns
      type: STR
      description: '''container'', path of user namespace to join, or ''host'''
    - name: userns-gid-map
      type: STR
      description: containerGID:hostGID:length GID mapping to use in user namespace
    - name: userns-gid-map-group
      type: STR
      description: name of entries from /etc/subgid to use to set user namespace GID mapping
    - name: userns-uid-map
      type: STR
      description: containerUID:hostUID:length UID mapping to use in user namespace
    - name: userns-uid-map-user
      type: STR
      description: name of entries from /etc/subuid to use to set user namespace UID mapping
    - name: uts
      type: STR
      description: private, :path of UTS namespace to join, or 'host'
    - name: variant
      type: STR
      description: override the variant of the specified image
    - name: volume
      type: LIST
      description: bind mount a volume into the container
  - name: diff
    description: Inspect changes to the image's file systems
    params:
    - name: format
      type: STR
      description: Change the output format (json)
  - name: exists
    description: Check if an image exists in local storage
  - name: history
    description: Show history of a specified image
    params:
    - name: format
      type: STR
      description: Change the output to JSON or a Go template
    - name: human
      type: STR
      description: Display sizes and dates in human readable format (default true)
      default: 'true'
      is_flag: true
    - name: no-trunc
      type: STR
      description: Do not truncate the output
      is_flag: true
    - name: quiet
      type: STR
      description: Display the numeric IDs only
      is_flag: true
  - name: import
    description: Import a tarball to create a filesystem image
    params:
    - name: arch
      type: STR
      description: Set the architecture of the imported image
    - name: change
      type: LIST
      description: 'Apply the following possible instructions to the created image (default []): CMD | ENTRYPOINT | ENV |
        EXPOSE | LABEL | ONBUILD | STOPSIGNAL | USER | VOLUME | WORKDIR'
      default: '[]'
    - name: message
      type: STR
      description: Set commit message for imported image
    - name: os
      type: STR
      description: Set the OS of the imported image
    - name: quiet
      type: STR
      description: Suppress output
      is_flag: true
    - name: variant
      type: STR
      description: Set the variant of the imported image
  - name: inspect
    description: Display the configuration of an image
    params:
    - name: format
      type: STR
      description: Format the output to a Go template or json (default "json")
      default: '"json"'
  - name: list
    description: List images in local storage
    params:
    - name: all
      type: STR
      description: Show all images (default hides intermediate images)
      default: hides intermediate images
      is_flag: true
    - name: digests
      type: STR
      description: Show digests
      is_flag: true
    - name: filter
      type: LIST
      description: Filter output based on conditions provided (default [])
      default: '[]'
    - name: format
      type: STR
      description: Change the output format to JSON or a Go template
    - name: history
      type: STR
      description: Display the image name history
      is_flag: true
    - name: no-trunc
      type: STR
      description: Do not truncate output
      is_flag: true
    - name: noheading
      type: STR
      description: Do not print column headings
      is_flag: true
    - name: quiet
      type: STR
      description: Display only image IDs
      is_flag: true
    - name: sort
      type: STR
      description: Sort by created, id, repository, size, tag (default created)
      default: created
  - name: load
    description: Load image(s) from a tar archive
    params:
    - name: input
      type: STR
      description: 'Read from specified archive file (default: stdin)'
    - name: quiet
      type: STR
      description: Suppress the output
      is_flag: true
  - name: prune
    description: Remove unused images
    params:
    - name: all
      type: STR
      description: Remove all images not in use by containers, not just dangling ones
      is_flag: true
    - name: build-cache
      type: STR
      description: Remove persistent build cache created by --mount=type=cache
      is_flag: true
    - name: external
      type: STR
      description: Remove images even when they are used by external containers (e.g., by build containers)
      is_flag: true
    - name: filter
      type: LIST
      description: Provide filter values (e.g. 'label=<key>=<value>')
    - name: force
      type: STR
      description: Do not prompt for confirmation
      is_flag: true
  - name: pull
    description: Pull an image from a registry
    params:
    - name: all-tags
      type: STR
      description: All tagged images in the repository will be pulled
      is_flag: true
    - name: arch
      type: STR
      description: Use ARCH instead of the architecture of the machine for choosing images
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: creds
      type: STR
      description: Credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: disable-content-trust
      type: STR
      description: This is a Docker specific option and is a NOOP
      is_flag: true
    - name: os
      type: STR
      description: Use OS instead of the running OS for choosing images
    - name: platform
      type: STR
      description: Specify the platform for selecting the image.  (Conflicts with arch and os)
    - name: policy
      type: STR
      description: Pull image policy ("always"|"missing"|"never"|"newer") (default "always")
      default: '"always"'
    - name: quiet
      type: STR
      description: Suppress output information when pulling images
      is_flag: true
    - name: retry
      type: INT
      description: number of times to retry in case of failure when performing pull
    - name: retry-delay
      type: STR
      description: delay between retries in case of pull failures
    - name: tls-verify
      type: STR
      description: Require HTTPS and verify certificates when contacting registries (default true)
      default: 'true'
      is_flag: true
    - name: variant
      type: STR
      description: Use VARIANT instead of the running architecture variant for choosing images
  - name: push
    description: Push an image to a specified destination
    params:
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: compression-format
      type: STR
      description: compression format to use
    - name: compression-level
      type: INT
      description: compression level to use
    - name: creds
      type: STR
      description: Credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: digestfile
      type: STR
      description: Write the digest of the pushed image to the specified file
    - name: disable-content-trust
      type: STR
      description: This is a Docker specific option and is a NOOP
      is_flag: true
    - name: force-compression
      type: STR
      description: Use the specified compression algorithm even if the destination contains a differently-compressed variant
        already
      is_flag: true
    - name: format
      type: STR
      description: Manifest type (oci, v2s2, or v2s1) to use in the destination (default is manifest type of source, with
        fallbacks)
      default: is manifest type of source, with fallbacks
    - name: remove-signatures
      type: STR
      description: Discard any pre-existing signatures in the image
      is_flag: true
    - name: retry
      type: INT
      description: number of times to retry in case of failure when performing push
    - name: retry-delay
      type: STR
      description: delay between retries in case of push failures
    - name: tls-verify
      type: STR
      description: Require HTTPS and verify certificates when contacting registries (default true)
      default: 'true'
      is_flag: true
  - name: rm
    description: Remove one or more images from local storage
    params:
    - name: all
      type: STR
      description: Remove all images
      is_flag: true
    - name: force
      type: STR
      description: Force Removal of the image
      is_flag: true
    - name: ignore
      type: STR
      description: Ignore errors if a specified image does not exist
      is_flag: true
    - name: no-prune
      type: STR
      description: Do not remove dangling images
      is_flag: true
  - name: save
    description: Save image(s) to an archive
    params:
    - name: compress
      type: STR
      description: Compress tarball image layers when saving to a directory using the 'dir' transport. (default is same compression
        type as source)
      default: is same compression type as source
      is_flag: true
    - name: format
      type: STR
      description: Save image to oci-archive, oci-dir (directory with oci manifest type), docker-archive, docker-dir (directory
        with v2s2 manifest type) (default "docker-archive")
      default: '"docker-archive"'
    - name: multi-image-archive
      type: STR
      description: Interpret additional arguments as images not tags and create a multi-image-archive (only for docker-archive)
      is_flag: true
    - name: output
      type: STR
      description: 'Write to a specified file (default: stdout, which must be redirected)'
    - name: quiet
      type: STR
      description: Suppress the output
      is_flag: true
    - name: uncompressed
      type: STR
      description: Accept uncompressed layers when copying OCI images
      is_flag: true
  - name: scp
    description: Securely copy images
    params:
    - name: quiet
      type: STR
      description: Suppress the output
      is_flag: true
  - name: search
    description: Search registry for image
    params:
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: compatible
      type: STR
      description: List stars, official and automated columns (Docker compatibility)
      is_flag: true
    - name: creds
      type: STR
      description: Credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: filter
      type: LIST
      description: Filter output based on conditions provided (default [])
      default: '[]'
    - name: format
      type: STR
      description: Change the output format to JSON or a Go template
    - name: limit
      type: INT
      description: Limit the number of results
    - name: list-tags
      type: STR
      description: List the tags of the input registry
      is_flag: true
    - name: no-trunc
      type: STR
      description: Do not truncate the output
      is_flag: true
    - name: tls-verify
      type: STR
      description: Require HTTPS and verify certificates when contacting registries (default true)
      default: 'true'
      is_flag: true
  - name: tag
    description: Add an additional name to a local image
  - name: tree
    description: Print layer hierarchy of an image in a tree format
    params:
    - name: whatrequires
      type: STR
      description: Show all child images and layers of the specified image
      is_flag: true
  - name: untag
    description: Remove a name from a local image
- name: kube
  description: Play containers, pods or volumes from a structured file
  commands:
  - name: apply
    description: Deploy a podman container, pod, volume, or Kubernetes yaml to a Kubernetes cluster
    params:
    - name: ca-cert-file
      type: STR
      description: Path to the CA cert file for the Kubernetes cluster.
    - name: file
      type: STR
      description: Path to the Kubernetes yaml file to deploy.
    - name: kubeconfig
      type: STR
      description: Path to the kubeconfig file for the Kubernetes cluster
    - name: ns
      type: STR
      description: The namespace to deploy the workload to on the Kubernetes cluster
    - name: service
      type: STR
      description: Create a service object for the container being deployed.
      is_flag: true
  - name: down
    description: Remove pods based on Kubernetes YAML
    params:
    - name: force
      type: STR
      description: remove volumes
      is_flag: true
  - name: generate
    description: Generate Kubernetes YAML from containers, pods or volumes.
    params:
    - name: filename
      type: STR
      description: Write output to the specified path
    - name: podman-only
      type: STR
      description: Add podman-only reserved annotations to the generated YAML file (Cannot be used by Kubernetes)
      is_flag: true
    - name: replicas
      type: INT
      description: Set the replicas number for Deployment kind (default 1)
      default: '1'
    - name: service
      type: STR
      description: Generate YAML for a Kubernetes service object
      is_flag: true
    - name: type
      type: STR
      description: Generate YAML for the given Kubernetes kind
  - name: play
    description: Play a pod or volume based on Kubernetes YAML
    params:
    - name: annotation
      type: LIST
      description: Add Podman-specific annotations to containers and pods created by Podman (key=value)
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: configmap
      type: STR
      description: Pathname of a YAML file containing a kubernetes configmap
    - name: creds
      type: STR
      description: Credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: force
      type: STR
      description: Remove volumes as part of --down
      is_flag: true
    - name: ip
      type: STR
      description: Static IP addresses to assign to the pods (default [])
      default: '[]'
    - name: log-driver
      type: STR
      description: Logging driver for the container
    - name: log-opt
      type: LIST
      description: Logging driver options
    - name: mac-address
      type: LIST
      description: Static MAC addresses to assign to the pods
    - name: network
      type: LIST
      description: Connect pod to network(s) or network mode
    - name: no-hostname
      type: STR
      description: Do not create /etc/hostname within the container, instead use the version from the image
      is_flag: true
    - name: no-hosts
      type: STR
      description: Do not create /etc/hosts within the pod's containers, instead use the version from the image
      is_flag: true
