name: podman
version: 5.8.0
description: Manage pods, containers and images
groups:
- name: _global
  description: Global flags available on all commands
  commands:
  - name: _flags
    description: Global flags
    params:
    - name: config
      type: STR
      description: Path to directory containing authentication config file
    - name: connection
      type: STR
      description: Connection to use for remote Podman service (CONTAINER_CONNECTION) (default "podman-machine-default")
      default: '"podman-machine-default"'
    - name: help
      type: STR
      description: Help for podman
      is_flag: true
    - name: identity
      type: STR
      description: path to SSH identity file, (CONTAINER_SSHKEY) (default "/Users/voltt/.local/share/containers/podman/machine/machine")
      default: '"/Users/voltt/.local/share/containers/podman/machine/machine"'
    - name: log-level
      type: STR
      description: Log messages above specified level (trace, debug, info, warn, warning, error, fatal, panic) (default "warn")
      default: '"warn"'
    - name: out
      type: STR
      description: Send output (stdout) from podman to a file
    - name: ssh
      type: STR
      description: define the ssh mode (default "golang")
      default: '"golang"'
    - name: storage-opt
      type: LIST
      description: Used to pass an option to the storage driver
    - name: tls-ca
      type: STR
      description: path to TLS certificate Authority PEM file for remote.
    - name: tls-cert
      type: STR
      description: path to TLS client certificate PEM file for remote.
    - name: tls-key
      type: STR
      description: path to TLS client certificate private key PEM file for remote.
    - name: url
      type: STR
      description: URL to access Podman service (CONTAINER_HOST) (default "ssh://core@127.0.0.1:53318/run/user/501/podman/podman.sock")
      default: '"ssh://core@127.0.0.1:53318/run/user/501/podman/podman.sock"'
    - name: version
      type: STR
      description: version for podman
      is_flag: true
- name: artifact
  description: Manage OCI artifacts
  commands:
  - name: add
    description: Add an OCI artifact to the local store
    params:
    - name: annotation
      type: STR
      description: set an annotation for the specified files of artifact
    - name: append
      type: STR
      description: Append files to an existing artifact
      is_flag: true
    - name: file-type
      type: STR
      description: Set file type to use for the artifact (layer)
    - name: replace
      type: STR
      description: Replace an existing artifact
      is_flag: true
    - name: type
      type: STR
      description: Use type to describe an artifact
  - name: extract
    description: Extract an OCI artifact to a local path
    params:
    - name: digest
      type: STR
      description: Only extract blob with the given digest
    - name: title
      type: STR
      description: Only extract blob with the given title
  - name: inspect
    description: Inspect an OCI artifact
    params:
    - name: format
      type: STR
      description: Format volume output using JSON or a Go template (default "json")
      default: '"json"'
  - name: ls
    description: List OCI artifacts
    params:
    - name: format
      type: STR
      description: Format volume output using JSON or a Go template (default "{{range .}}{{.Repository}}\t{{.Tag}}\t{{.Digest}}\t{{.Created}}\t{{.Size}}\n{{end
        -}}")
      default: '"{{range .}}{{.Repository}}\t{{.Tag}}\t{{.Digest}}\t{{.Created}}\t{{.Size}}\n{{end -}}"'
    - name: no-trunc
      type: STR
      description: Do not truncate output
      is_flag: true
    - name: noheading
      type: STR
      description: Do not print column headings
      is_flag: true
  - name: pull
    description: Pull an OCI artifact
    params:
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: creds
      type: STR
      description: Credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: quiet
      type: STR
      description: Suppress output information when pulling images
      is_flag: true
    - name: retry
      type: INT
      description: number of times to retry in case of failure when performing pull
    - name: retry-delay
      type: STR
      description: delay between retries in case of pull failures
    - name: tls-verify
      type: STR
      description: Require HTTPS and verify certificates when contacting registries (default true)
      default: 'true'
      is_flag: true
  - name: push
    description: Push an OCI artifact
    params:
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: creds
      type: STR
      description: Credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: digestfile
      type: STR
      description: Write the digest of the pushed image to the specified file
    - name: retry
      type: INT
      description: number of times to retry in case of failure when performing push
    - name: retry-delay
      type: STR
      description: delay between retries in case of push failures
    - name: tls-verify
      type: STR
      description: Require HTTPS and verify certificates when contacting registries (default true)
      default: 'true'
      is_flag: true
  - name: rm
    description: Remove one or more OCI artifacts
    params:
    - name: all
      type: STR
      description: Remove all artifacts
      is_flag: true
    - name: ignore
      type: STR
      description: Ignore error if artifact does not exist
      is_flag: true
- name: _root
  description: Top-level commands
  commands:
  - name: attach
    description: Attach to a running container
    params:
    - name: detach-keys
      type: STR
      description: 'Select the key sequence for detaching a container. Format is a single character [a-Z] or a comma separated
        sequence of `ctrl-<value>`, where `<value>` is one of: `a-z`, `@`, `^`, `[`, `\`, `]`, `^` or `_` (default "ctrl-p,ctrl-q")'
      default: '"ctrl-p,ctrl-q"'
    - name: no-stdin
      type: STR
      description: Do not attach STDIN. The default is false
      is_flag: true
    - name: sig-proxy
      type: STR
      description: Proxy received signals to the process (default true)
      default: 'true'
      is_flag: true
  - name: build
    description: Build an image using instructions from Containerfiles
    params:
    - name: add-host
      type: STR
      description: add a custom host-to-IP mapping (host:ip) (default [])
      default: '[]'
    - name: all-platforms
      type: STR
      description: attempt to build for all base image platforms
      is_flag: true
    - name: annotation
      type: LIST
      description: set metadata for an image (default [])
      default: '[]'
    - name: arch
      type: STR
      description: set the ARCH of the image to the provided value instead of the architecture of the host (default "arm64")
      default: '"arm64"'
    - name: authfile
      type: STR
      description: path of the authentication file.
    - name: build-arg
      type: STR
      description: argument=value to supply to the builder
    - name: build-arg-file
      type: STR
      description: argfile.conf containing lines of argument=value to supply to the builder
    - name: build-context
      type: STR
      description: argument=value to supply additional build context to the builder
    - name: cache-from
      type: LIST
      description: remote repository list to utilise as potential cache source.
    - name: cache-to
      type: LIST
      description: remote repository list to utilise as potential cache destination.
    - name: cache-ttl
      type: STR
      description: only consider cache images under specified duration.
    - name: cap-add
      type: LIST
      description: add the specified capability when running (default [])
      default: '[]'
    - name: cap-drop
      type: LIST
      description: drop the specified capability when running (default [])
      default: '[]'
    - name: cert-dir
      type: STR
      description: use certificates at the specified path to access the registry
    - name: cgroup-parent
      type: STR
      description: optional parent cgroup for the container
    - name: cgroupns
      type: STR
      description: '''private'', or ''host'''
    - name: compat-volumes
      type: STR
      description: preserve the contents of VOLUMEs during RUN instructions
      is_flag: true
    - name: cpp-flag
      type: LIST
      description: set additional flag to pass to C preprocessor (cpp)
    - name: cpu-period
      type: INT
      description: limit the CPU CFS (Completely Fair Scheduler) period
    - name: cpu-quota
      type: INT
      description: limit the CPU CFS (Completely Fair Scheduler) quota
    - name: cpu-shares
      type: INT
      description: CPU shares (relative weight)
    - name: cpuset-cpus
      type: STR
      description: CPUs in which to allow execution (0-3, 0,1)
    - name: cpuset-mems
      type: STR
      description: memory nodes (MEMs) in which to allow execution (0-3, 0,1). Only effective on NUMA systems.
    - name: created-annotation
      type: STR
      description: set an "org.opencontainers.image.created" annotation in the image (default true)
      default: 'true'
      is_flag: true
    - name: creds
      type: STR
      description: use [username[:password]] for accessing the registry
    - name: decryption-key
      type: LIST
      description: key needed to decrypt the image
    - name: device
      type: LIST
      description: additional devices to provide
    - name: disable-compression
      type: STR
      description: don't compress layers by default (default true)
      default: 'true'
      is_flag: true
    - name: dns
      type: STR
      description: set custom DNS servers or disable it completely by setting it to 'none', which prevents the automatic creation
        of /etc/resolv.conf.
    - name: dns-option
      type: LIST
      description: set custom DNS options
    - name: dns-search
      type: LIST
      description: set custom DNS search domains
    - name: env
      type: LIST
      description: set environment variable for the image
    - name: force-rm
      type: STR
      description: always remove intermediate containers after a build, even if the build is unsuccessful. (default true)
      default: 'true'
      is_flag: true
    - name: format
      type: STR
      description: format of the built image's manifest and metadata. Use BUILDAH_FORMAT environment variable to override.
        (default "oci")
      default: '"oci"'
    - name: from
      type: STR
      description: image name used to replace the value in the first FROM instruction in the Containerfile
    - name: group-add
      type: LIST
      description: add additional groups to the primary container process. 'keep-groups' allows container processes to use
        supplementary groups.
    - name: hooks-dir
      type: LIST
      description: set the OCI hooks directory path (may be set multiple times)
    - name: http-proxy
      type: STR
      description: pass through HTTP Proxy environment variables (default true)
      default: 'true'
      is_flag: true
    - name: identity-label
      type: STR
      description: add default identity label (default true)
      default: 'true'
      is_flag: true
    - name: ignorefile
      type: STR
      description: path to an alternate .dockerignore file
    - name: iidfile
      type: STR
      description: file to write the image ID to
    - name: inherit-annotations
      type: STR
      description: inherit the annotations from the base image or base stages. (default true)
      default: 'true'
      is_flag: true
    - name: inherit-labels
      type: STR
      description: inherit the labels from the base image or base stages. (default true)
      default: 'true'
      is_flag: true
    - name: ipc
      type: STR
      description: '''private'', path of IPC namespace to join, or ''host'''
    - name: isolation
      type: STR
      description: type of process isolation to use. Use BUILDAH_ISOLATION environment variable to override. (default "rootless")
      default: '"rootless"'
    - name: jobs
      type: INT
      description: how many stages to run in parallel (default 1)
      default: '1'
    - name: label
      type: LIST
      description: set metadata for an image (default [])
      default: '[]'
    - name: layer-label
      type: LIST
      description: set metadata for an intermediate image (default [])
      default: '[]'
    - name: layers
      type: STR
      description: use intermediate layers during build. Use BUILDAH_LAYERS environment variable to override. (default true)
      default: 'true'
      is_flag: true
    - name: logfile
      type: STR
      description: log to file instead of stdout/stderr
    - name: manifest
      type: STR
      description: add the image to the specified manifest list. Creates manifest list if it does not exist
    - name: memory
      type: STR
      description: 'memory limit (format: <number>[<unit>], where unit = b, k, m or g)'
    - name: memory-swap
      type: STR
      description: 'swap limit equal to memory plus swap: ''-1'' to enable unlimited swap'
    - name: network
      type: STR
      description: '''private'', ''none'', ''ns:path'' of network namespace to join, or ''host'''
    - name: no-cache
      type: STR
      description: do not use existing cached images for the container build. Build from the start with a new set of cached
        layers.
      is_flag: true
    - name: no-hostname
      type: STR
      description: do not create new /etc/hostname file for RUN instructions, use the one from the base image.
      is_flag: true
    - name: no-hosts
      type: STR
      description: do not create new /etc/hosts file for RUN instructions, use the one from the base image.
      is_flag: true
    - name: omit-history
      type: STR
      description: omit build history information from built image
      is_flag: true
    - name: os
      type: STR
      description: set the OS to the provided value instead of the current operating system of the host (default "darwin")
      default: '"darwin"'
    - name: os-feature
      type: STR
      description: set required OS feature for the target image in addition to values from the base image
    - name: os-version
      type: STR
      description: set required OS version for the target image instead of the value from the base image
    - name: pid
      type: STR
      description: private, path of PID namespace to join, or 'host'
    - name: platform
      type: STR
      description: set the OS/ARCH[/VARIANT] of the image to the provided value instead of the current operating system and
        architecture of the host (for example "linux/arm") (default [darwin/arm64/v8])
      default: '[darwin/arm64/v8]'
    - name: pull
      type: STR
      description: Pull image policy ("always"|"missing"|"never"|"newer") (default "missing")
      default: '"missing"'
    - name: quiet
      type: STR
      description: refrain from announcing build instructions and image read/write progress
      is_flag: true
    - name: retry
      type: INT
      description: number of times to retry in case of failure when performing push/pull (default 3)
      default: '3'
    - name: retry-delay
      type: STR
      description: delay between retries in case of push/pull failures
    - name: rewrite-timestamp
      type: STR
      description: set timestamps in layers to no later than the value for --source-date-epoch
      is_flag: true
    - name: rm
      type: STR
      description: remove intermediate containers after a successful build (default true)
      default: 'true'
      is_flag: true
    - name: runtime-flag
      type: LIST
      description: add global flags for the container runtime
    - name: sbom
      type: STR
      description: scan working container using preset configuration
    - name: sbom-image-output
      type: STR
      description: add scan results to image as path
    - name: sbom-image-purl-output
      type: STR
      description: add scan results to image as path
    - name: sbom-merge-strategy
      type: STR
      description: merge scan results using strategy
    - name: sbom-output
      type: STR
      description: save scan results to file
    - name: sbom-purl-output
      type: STR
      description: save scan results to file`
    - name: sbom-scanner-command
      type: STR
      description: scan working container using command in scanner image
    - name: sbom-scanner-image
      type: STR
      description: scan working container using scanner command from image
    - name: secret
      type: LIST
      description: secret file to expose to the build
    - name: security-opt
      type: LIST
      description: security options (default [])
      default: '[]'
    - name: shm-size
      type: STR
      description: size of '/dev/shm'. The format is <number><unit>. (default "65536k")
      default: '"65536k"'
    - name: skip-unused-stages
      type: STR
      description: skips stages in multi-stage builds which do not affect the final target (default true)
      default: 'true'
      is_flag: true
    - name: source-date-epoch
      type: STR
      description: set new timestamps in image info to seconds after the epoch, defaults to current time
    - name: squash
      type: STR
      description: squash all image layers into a single layer
      is_flag: true
    - name: squash-all
      type: STR
      description: Squash all layers into a single layer
      is_flag: true
    - name: ssh
      type: LIST
      description: 'SSH agent socket or keys to expose to the build. (format: default|<id>[=<socket>|<key>[,<key>]])'
    - name: stdin
      type: STR
      description: pass stdin into containers
      is_flag: true
    - name: tag
      type: STR
      description: tagged name to apply to the built image
    - name: target
      type: STR
      description: set the target build stage to build
    - name: timestamp
      type: STR
      description: set new timestamps in image info and layer to seconds after the epoch, defaults to current times
    - name: ulimit
      type: LIST
      description: ulimit options
    - name: unsetannotation
      type: LIST
      description: unset annotation when inheriting annotations from base image
    - name: unsetenv
      type: LIST
      description: unset environment variable from final image
    - name: unsetlabel
      type: LIST
      description: unset label when inheriting labels from base image
    - name: userns
      type: STR
      description: '''container'', path of user namespace to join, or ''host'''
    - name: userns-gid-map
      type: STR
      description: containerGID:hostGID:length GID mapping to use in user namespace
    - name: userns-gid-map-group
      type: STR
      description: name of entries from /etc/subgid to use to set user namespace GID mapping
    - name: userns-uid-map
      type: STR
      description: containerUID:hostUID:length UID mapping to use in user namespace
    - name: userns-uid-map-user
      type: STR
      description: name of entries from /etc/subuid to use to set user namespace UID mapping
    - name: uts
      type: STR
      description: private, :path of UTS namespace to join, or 'host'
    - name: variant
      type: STR
      description: override the variant of the specified image
    - name: volume
      type: LIST
      description: bind mount a volume into the container
  - name: commit
    description: Create new image based on the changed container
    params:
    - name: author
      type: STR
      description: Set the author for the image committed
    - name: change
      type: LIST
      description: 'Apply the following possible instructions to the created image (default []): CMD | ENTRYPOINT | ENV |
        EXPOSE | LABEL | ONBUILD | STOPSIGNAL | USER | VOLUME | WORKDIR'
      default: '[]'
    - name: config
      type: STR
      description: file containing a container configuration to merge into the image
    - name: format
      type: STR
      description: Format of the image manifest and metadata (default "oci")
      default: '"oci"'
    - name: iidfile
      type: STR
      description: file to write the image ID to
    - name: include-volumes
      type: STR
      description: Include container volumes as image volumes
      is_flag: true
    - name: message
      type: STR
      description: Set commit message for imported image
    - name: pause
      type: STR
      description: Pause container during commit
      is_flag: true
    - name: quiet
      type: STR
      description: Suppress output
      is_flag: true
    - name: squash
      type: STR
      description: squash newly built layers into a single new layer
      is_flag: true
  - name: cp
    description: Copy files/folders between a container and the local filesystem
    params:
    - name: archive
      type: STR
      description: Chown copied files to the primary uid/gid of the destination container. (default true)
      default: 'true'
      is_flag: true
    - name: overwrite
      type: STR
      description: Allow to overwrite directories with non-directories and vice versa
      is_flag: true
  - name: create
    description: Create but do not start a container
    params:
    - name: add-host
      type: LIST
      description: Add a custom host-to-IP mapping (host:ip) (default [])
      default: '[]'
    - name: annotation
      type: LIST
      description: Add annotations to container (key=value)
    - name: arch
      type: STR
      description: use ARCH instead of the architecture of the machine for choosing images
    - name: attach
      type: LIST
      description: Attach to STDIN, STDOUT or STDERR
    - name: authfile
      type: STR
      description: Path of the authentication file. Use REGISTRY_AUTH_FILE environment variable to override
    - name: blkio-weight
      type: STR
      description: Block IO weight (relative weight) accepts a weight value between 10 and 1000.
    - name: blkio-weight-device
      type: STR
      description: 'Block IO weight (relative device weight, format: DEVICE_NAME:WEIGHT)'
    - name: cap-add
      type: LIST
      description: Add capabilities to the container
    - name: cap-drop
      type: LIST
      description: Drop capabilities from the container
    - name: cgroup-conf
      type: LIST
      description: Configure cgroup v2 (key=value)
    - name: cgroup-parent
      type: STR
      description: Optional parent cgroup for the container
    - name: cgroupns
      type: STR
      description: cgroup namespace to use
    - name: cgroups
      type: STR
      description: control container cgroup configuration ("enabled"|"disabled"|"no-conmon"|"split")
    - name: chrootdirs
      type: LIST
      description: Chroot directories inside the container
    - name: cidfile
      type: STR
      description: Write the container ID to the file
    - name: cpu-period
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) period
    - name: cpu-quota
      type: INT
      description: Limit the CPU CFS (Completely Fair Scheduler) quota
    - name: cpu-rt-period
      type: INT
      description: Limit the CPU real-time period in microseconds
    - name: cpu-rt-runtime
      type: INT
      description: Limit the CPU real-time runtime in microseconds
    - name: cpu-shares
      type: INT
      description: CPU shares (relative weight)
    - name: cpus
      type: STR
      description: Number of CPUs. The default is 0.000 which means no limit
    - name: cpuset-cpus
      type: STR
      description: CPUs in which to allow execution (0-3, 0,1)
    - name: cpuset-mems
      type: STR
      description: Memory nodes (MEMs) in which to allow execution (0-3, 0,1). Only effective on NUMA systems.
    - name: creds
      type: STR
      description: credentials (USERNAME:PASSWORD) to use for authenticating to a registry
    - name: device
      type: LIST
      description: Add a host device to the container
    - name: device-cgroup-rule
      type: LIST
      description: Add a rule to the cgroup allowed devices list
    - name: device-read-bps
      type: LIST
      description: Limit read rate (bytes per second) from a device (e.g. --device-read-bps=/dev/sda:1mb)
    - name: device-read-iops
      type: LIST
      description: Limit read rate (IO per second) from a device (e.g. --device-read-iops=/dev/sda:1000)
    - name: device-write-bps
      type: LIST
      description: Limit write rate (bytes per second) to a device (e.g. --device-write-bps=/dev/sda:1mb)
    - name: device-write-iops
      type: LIST
      description: Limit write rate (IO per second) to a device (e.g. --device-write-iops=/dev/sda:1000)
    - name: disable-content-trust
      type: STR
      description: This is a Docker specific option and is a NOOP
      is_flag: true
    - name: dns
      type: LIST
      description: Set custom DNS servers
    - name: dns-option
      type: LIST
      description: Set custom DNS options
    - name: dns-search
      type: LIST
      description: Set custom DNS search domains
    - name: entrypoint
      type: STR
      description: Overwrite the default ENTRYPOINT of the image
    - name: env
      type: LIST
      description: Set environment variables in container
    - name: env-file
      type: LIST
      description: Read in a file of environment variables
    - name: env-merge
      type: LIST
      description: Preprocess environment variables from image before injecting them into the container
    - name: expose
      type: LIST
      description: Expose a port or a range of ports
    - name: gidmap
      type: LIST
      description: GID map to use for the user namespace
    - name: gpus
      type: LIST
      description: GPU devices to add to the container ('all' to pass all GPUs)
    - name: group-add
      type: LIST
      description: Add additional groups to the primary container process. 'keep-groups' allows container processes to use
        supplementary groups.
    - name: group-entry
      type: STR
      description: Entry to write to /etc/group
    - name: health-cmd
      type: STR
      description: set a healthcheck command for the container ('none' disables the existing healthcheck)
    - name: health-interval
      type: STR
      description: set an interval for the healthcheck. (a value of disable results in no automatic timer setup)  (default
        "30s")
      default: '"30s"'
    - name: health-log-destination
      type: STR
      description: set the destination of the HealthCheck log. Directory path, local or events_logger (local use container
        state file)  (default "local")
      default: '"local"'
    - name: health-max-log-count
      type: INT
      description: set maximum number of attempts in the HealthCheck log file. ('0' value means an infinite number of attempts
        in the log file) (default 5)
      default: '5'
    - name: health-max-log-size
      type: INT
      description: set maximum length in characters of stored HealthCheck log. ('0' value means an infinite log length) (default
        500)
      default: '500'
    - name: health-on-failure
      type: STR
      description: action to take once the container turns unhealthy (default "none")
      default: '"none"'
    - name: health-retries
