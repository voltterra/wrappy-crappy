      type: STR
      description: Name of range listed in /etc/subuid for use in user namespace
    - name: sysctl
      type: LIST
      description: Sysctl options
    - name: uidmap
      type: LIST
      description: UID map to use for the user namespace
    - name: userns
      type: STR
      description: User namespace to use
    - name: uts
      type: STR
      description: UTS namespace to use
    - name: volume
      type: LIST
      description: Bind mount a volume into the container. Volume source will be on the server machine, not the client
    - name: volumes-from
      type: LIST
      description: Mount volumes from the specified container(s)
  - name: exists
    description: Check if a pod exists in local storage
  - name: inspect
    description: Display a pod configuration
    params:
    - name: format
      type: STR
      description: Format the output to a Go template or json (default "json")
      default: '"json"'
  - name: kill
    description: Send the specified signal or SIGKILL to containers in pod
    params:
    - name: all
      type: STR
      description: Kill all containers in all pods
      is_flag: true
    - name: signal
      type: STR
      description: Signal to send to the containers in the pod (default "KILL")
      default: '"KILL"'
  - name: logs
    description: Fetch logs for pod with one or more containers
    params:
    - name: color
      type: STR
      description: Output the containers within a pod with different colors in the log
      is_flag: true
    - name: container
      type: STR
      description: Filter logs by container name or id which belongs to pod
    - name: follow
      type: STR
      description: Follow log output.
      is_flag: true
    - name: names
      type: STR
      description: Output container names instead of container IDs in the log
      is_flag: true
    - name: since
      type: STR
      description: Show logs since TIMESTAMP
    - name: tail
      type: INT
      description: Output the specified number of LINES at the end of the logs. (default -1)
      default: '-1'
    - name: timestamps
      type: STR
      description: Output the timestamps in the log
      is_flag: true
    - name: until
      type: STR
      description: Show logs until TIMESTAMP
  - name: pause
    description: Pause one or more pods
    params:
    - name: all
      type: STR
      description: Pause all running pods
      is_flag: true
  - name: prune
    description: Remove all stopped pods and their containers
    params:
    - name: force
      type: STR
      description: Do not prompt for confirmation.  The default is false
      is_flag: true
  - name: ps
    description: List pods
    params:
    - name: ctr-ids
      type: STR
      description: Display the container UUIDs. If no-trunc is not set they will be truncated
      is_flag: true
    - name: ctr-names
      type: STR
      description: Display the container names
      is_flag: true
    - name: ctr-status
      type: STR
      description: Display the container status
      is_flag: true
    - name: filter
      type: LIST
      description: Filter output based on conditions given
    - name: format
      type: STR
      description: Pretty-print pods to JSON or using a Go template
    - name: no-trunc
      type: STR
      description: Do not truncate pod and container IDs
      is_flag: true
    - name: noheading
      type: STR
      description: Do not print headers
      is_flag: true
    - name: ns
      type: STR
      description: Display namespace information of the pod
      is_flag: true
    - name: quiet
      type: STR
      description: Print the numeric IDs of the pods only
      is_flag: true
    - name: sort
      type: STR
      description: Sort output by created, id, name, or number (default "created")
      default: '"created"'
  - name: restart
    description: Restart one or more pods
    params:
    - name: all
      type: STR
      description: Restart all running pods
      is_flag: true
  - name: rm
    description: Remove one or more pods
    params:
    - name: all
      type: STR
      description: Remove all running pods
      is_flag: true
    - name: force
      type: STR
      description: Force removal of a running pod by first stopping all containers, then removing all containers in the pod.  The
        default is false
      is_flag: true
    - name: pod-id-file
      type: LIST
      description: Read the pod ID from the file
    - name: time
      type: INT
      description: Seconds to wait for pod stop before killing the container (default 10)
      default: '10'
  - name: start
    description: Start one or more pods
    params:
    - name: all
      type: STR
      description: Restart all running pods
      is_flag: true
    - name: pod-id-file
      type: LIST
      description: Read the pod ID from the file
  - name: stats
    description: Display a live stream of resource usage statistics for the containers in one or more pods
    params:
    - name: all
      type: STR
      description: Provide stats for all pods
      is_flag: true
    - name: format
      type: STR
      description: Pretty-print container statistics to JSON or using a Go template
    - name: no-reset
      type: STR
      description: Disable resetting the screen when streaming
      is_flag: true
    - name: no-stream
      type: STR
      description: Disable streaming stats and only pull the first result
      is_flag: true
  - name: stop
    description: Stop one or more pods
    params:
    - name: all
      type: STR
      description: Stop all running pods
      is_flag: true
    - name: pod-id-file
      type: LIST
      description: Write the pod ID to the file
    - name: time
      type: INT
      description: Seconds to wait for pod stop before killing the container (default 10)
      default: '10'
  - name: top
    description: Display the running processes of containers in a pod
  - name: unpause
    description: Unpause one or more pods
    params:
    - name: all
      type: STR
      description: Unpause all running pods
      is_flag: true
- name: quadlet
  description: Allows users to manage Quadlets
  commands:
  - name: install
    description: Install a quadlet file or quadlet application
    params:
    - name: reload-systemd
      type: STR
      description: Reload systemd after installing Quadlets (default true)
      default: 'true'
      is_flag: true
    - name: replace
      type: STR
      description: Replace the installation even if the quadlet already exists
      is_flag: true
  - name: list
    description: List Quadlets
    params:
    - name: filter
      type: LIST
      description: Filter output based on conditions given
    - name: format
      type: STR
      description: Pretty-print output to JSON or using a Go template (default "{{range .}}{{.Name}}\t{{.UnitName}}\t{{.Path}}\t{{.Status}}\t{{.App}}\n{{end
        -}}")
      default: '"{{range .}}{{.Name}}\t{{.UnitName}}\t{{.Path}}\t{{.Status}}\t{{.App}}\n{{end -}}"'
  - name: print
    description: Display the contents of a quadlet
  - name: rm
    description: Remove Quadlets
    params:
    - name: all
      type: STR
      description: Remove all Quadlets for the current user
      is_flag: true
    - name: force
      type: STR
      description: Remove running quadlets
      is_flag: true
    - name: ignore
      type: STR
      description: Do not error for Quadlets that do not exist
      is_flag: true
    - name: reload-systemd
      type: STR
      description: Reload systemd after removal (default true)
      default: 'true'
      is_flag: true
- name: secret
  description: Manage secrets
  commands:
  - name: create
    description: Create a new secret
    params:
    - name: driver
      type: STR
      description: Specify secret driver (default "file")
      default: '"file"'
    - name: driver-opts
      type: STR
      description: Specify driver specific options (default [])
      default: '[]'
    - name: env
      type: STR
      description: Read secret data from environment variable
      is_flag: true
    - name: ignore
      type: STR
      description: If a secret with the same name exists, ignore and do not create a new secret
      is_flag: true
    - name: label
      type: LIST
      description: Specify labels on the secret
    - name: replace
      type: STR
      description: If a secret with the same name exists, replace it
      is_flag: true
  - name: exists
    description: Check if a secret exists in local storage
  - name: inspect
    description: Inspect a secret
    params:
    - name: format
      type: STR
      description: Format inspect output using Go template
    - name: pretty
      type: STR
      description: Print inspect output in human-readable format
      is_flag: true
    - name: showsecret
      type: STR
      description: Display the secret
      is_flag: true
  - name: ls
    description: List secrets
    params:
    - name: filter
      type: LIST
      description: Filter secret output
    - name: format
      type: STR
      description: Format secret output using Go template (default "{{range .}}{{.ID}}\t{{.Name}}\t{{.Driver}}\t{{.CreatedAt}}\t{{.UpdatedAt}}\n{{end
        -}}")
      default: '"{{range .}}{{.ID}}\t{{.Name}}\t{{.Driver}}\t{{.CreatedAt}}\t{{.UpdatedAt}}\n{{end -}}"'
    - name: noheading
      type: STR
      description: Do not print headers
      is_flag: true
    - name: quiet
      type: STR
      description: Print secret IDs only
      is_flag: true
  - name: rm
    description: Remove one or more secrets
    params:
    - name: all
      type: STR
      description: Remove all secrets
      is_flag: true
    - name: ignore
      type: STR
      description: Ignore errors when a specified secret is missing
      is_flag: true
- name: system
  description: Manage podman
  commands:
  - name: check
    description: Check storage consistency
    params:
    - name: force
      type: STR
      description: Remove inconsistent images and containers
      is_flag: true
    - name: max
      type: STR
      description: Maximum allowed age of unreferenced layers (default 24h0m0s)
      default: 24h0m0s
    - name: quick
      type: STR
      description: Skip time-consuming checks. The default is to include time-consuming checks
      is_flag: true
    - name: repair
      type: STR
      description: Remove inconsistent images
      is_flag: true
  - name: df
    description: Show podman disk usage
    params:
    - name: format
      type: STR
      description: Pretty-print images using a Go template
    - name: verbose
      type: STR
      description: Show detailed information on disk usage
      is_flag: true
  - name: events
    description: Show podman system events
    params:
    - name: filter
      type: LIST
      description: filter output
    - name: format
      type: STR
      description: format the output using a Go template
    - name: no-trunc
      type: STR
      description: do not truncate the output (default true)
      default: 'true'
      is_flag: true
    - name: since
      type: STR
      description: show all events created since timestamp
    - name: stream
      type: STR
      description: stream events and do not exit when returning the last known event (default true)
      default: 'true'
      is_flag: true
    - name: until
      type: STR
      description: show all events until timestamp
  - name: info
    description: Display podman system information
    params:
    - name: format
      type: STR
      description: Change the output format to JSON or a Go template
  - name: prune
    description: Remove unused data
    params:
    - name: all
      type: STR
      description: Remove all unused data
      is_flag: true
    - name: build
      type: STR
      description: Remove build containers
      is_flag: true
    - name: external
      type: STR
      description: Remove container data in storage not controlled by podman
      is_flag: true
    - name: filter
      type: LIST
      description: Provide filter values (e.g. 'label=<key>=<value>')
    - name: force
      type: STR
      description: Do not prompt for confirmation.  The default is false
      is_flag: true
    - name: volumes
      type: STR
      description: Prune volumes
      is_flag: true
- name: system.connection
  commands:
  - name: add
    description: Record destination for the Podman service
    params:
    - name: default
      type: STR
      description: Set connection to be default
      is_flag: true
    - name: identity
      type: STR
      description: path to SSH identity file
    - name: port
      type: INT
      description: SSH port number for destination (default 22)
      default: '22'
    - name: socket-path
      type: STR
      description: path to podman socket on remote host. (default '/run/podman/podman.sock' or '/run/user/{uid}/podman/podman.sock)
      default: '''/run/podman/podman.sock'' or ''/run/user/{uid}/podman/podman.sock'
    - name: tls-ca
      type: STR
      description: path to TLS certificate Authority PEM file
    - name: tls-cert
      type: STR
      description: path to TLS client certificate PEM file
    - name: tls-key
      type: STR
      description: path to TLS client certificate private key PEM file
  - name: default
    description: Set named destination as default
  - name: list
    description: List destination for the Podman service(s)
    params:
    - name: format
      type: STR
      description: Custom Go template for printing connections
    - name: quiet
      type: STR
      description: Custom Go template for printing connections
      is_flag: true
  - name: remove
    description: Delete named destination
    params:
    - name: all
      type: STR
      description: Remove all connections
      is_flag: true
  - name: rename
    description: Rename "old" to "new"
- name: volume
  description: Manage volumes
  commands:
  - name: create
    description: Create a new volume
    params:
    - name: driver
      type: STR
      description: Specify volume driver name (default "local")
      default: '"local"'
    - name: gid
      type: INT
      description: Set the GID of the volume owner
    - name: ignore
      type: STR
      description: Don't fail if volume already exists
      is_flag: true
    - name: label
      type: LIST
      description: Set metadata for a volume (default [])
      default: '[]'
    - name: opt
      type: LIST
      description: Set driver specific options (default [])
      default: '[]'
    - name: uid
      type: INT
      description: Set the UID of the volume owner
  - name: exists
    description: Check if volume exists
  - name: export
    description: Export volumes
    params:
    - name: output
      type: STR
      description: 'Write to a specified file (default: stdout, which must be redirected)'
  - name: import
    description: Import a tarball contents into a podman volume
  - name: inspect
    description: Display detailed information on one or more volumes
    params:
    - name: all
      type: STR
      description: Inspect all volumes
      is_flag: true
    - name: format
      type: STR
      description: Format volume output using Go template (default "json")
      default: '"json"'
  - name: ls
    description: List volumes
    params:
    - name: filter
      type: LIST
      description: Filter volume output
    - name: format
      type: STR
      description: Format volume output using Go template (default "{{range .}}{{.Driver}}\t{{.Name}}\n{{end -}}")
      default: '"{{range .}}{{.Driver}}\t{{.Name}}\n{{end -}}"'
    - name: noheading
      type: STR
      description: Do not print headers
      is_flag: true
    - name: quiet
      type: STR
      description: Print volume output in quiet mode
      is_flag: true
  - name: prune
    description: Remove all unused volumes
    params:
    - name: filter
      type: LIST
      description: Provide filter values (e.g. 'label=<key>=<value>')
    - name: force
      type: STR
      description: Do not prompt for confirmation
      is_flag: true
  - name: reload
    description: Reload all volumes from volume plugins
  - name: rm
    description: Remove one or more volumes
    params:
    - name: all
      type: STR
      description: Remove all volumes
      is_flag: true
    - name: force
      type: STR
      description: Remove a volume by force, even if it is being used by a container
      is_flag: true
    - name: time
      type: INT
      description: Seconds to wait for running containers to stop before killing the container (default 10)
      default: '10'
