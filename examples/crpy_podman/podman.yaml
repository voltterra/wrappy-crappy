    - name: dry-run
      type: STR
      description: Execute command in dry run mode
      is_flag: true
  - name: watch
    description: Watch build context for service and rebuild/refresh containers when files are updated
    params:
    - name: dry-run
      type: STR
      description: Execute command in dry run mode
      is_flag: true
    - name: no-up
