- name: classroom.invitations
  description: Operations on the 'invitations' resource
  commands:
  - name: accept
    description: 'Accepts an invitation, removing it and adding the invited user to the teachers or students (as appropriate)
      of the specified course. Only the invited user may accept an invitation. This method returns the following error codes:
      * `PERMISSION_DENIED` if the requesting user is not permitted to accept the requested invitation or for access errors.
      * `FAILED_PRECONDITION` for the following request errors: * CourseMemberLimitReached * CourseNotModifiable * CourseTeacherLimitReached
      * UserGroupsMembershipLimitReached * `NOT_FOUND` if no invitation exists with the requested ID.'
    params:
    - name: id
      type: STR
      description: Identifier of the invitation to accept.
      required: true
  - name: create
    description: 'Creates an invitation. Only one invitation for a user and course may exist at a time. Delete and re-create
      an invitation to make changes. This method returns the following error codes: * `PERMISSION_DENIED` if the requesting
      user is not permitted to create invitations for this course or for access errors. * `NOT_FOUND` if the course or the
      user does not exist. * `FAILED_PRECONDITION`: * if the requested user''s account is disabled. * if the user already
      has this role or a role with greater permissions. * for the following request errors: * IneligibleOwner * `ALREADY_EXISTS`
      if an invitation for the specified user and course already exists.'
    outputs:
    - name: courseId
      type: STR
      description: Identifier of the course to invite the user to.
    - name: id
      type: STR
      description: Identifier assigned by Classroom. Read-only.
    - name: role
      type: STR
      description: Role to invite the user to have. Must not be `COURSE_ROLE_UNSPECIFIED`.
    - name: userId
      type: STR
      description: 'Identifier of the invited user. When specified as a parameter of a request, this identifier can be set
        to one of the following: * the numeric identifier for the user * the email address of the user * the string literal
        `"me"`, indicating the requesting user'
  - name: delete
    description: 'Deletes an invitation. This method returns the following error codes: * `PERMISSION_DENIED` if the requesting
      user is not permitted to delete the requested invitation or for access errors. * `NOT_FOUND` if no invitation exists
      with the requested ID.'
    params:
    - name: id
      type: STR
      description: Identifier of the invitation to delete.
      required: true
  - name: get
    description: 'Returns an invitation. This method returns the following error codes: * `PERMISSION_DENIED` if the requesting
      user is not permitted to view the requested invitation or for access errors. * `NOT_FOUND` if no invitation exists with
      the requested ID.'
    params:
    - name: id
      type: STR
      description: Identifier of the invitation to return.
      required: true
    outputs:
    - name: courseId
      type: STR
      description: Identifier of the course to invite the user to.
    - name: id
      type: STR
      description: Identifier assigned by Classroom. Read-only.
    - name: role
      type: STR
      description: Role to invite the user to have. Must not be `COURSE_ROLE_UNSPECIFIED`.
    - name: userId
      type: STR
      description: 'Identifier of the invited user. When specified as a parameter of a request, this identifier can be set
        to one of the following: * the numeric identifier for the user * the email address of the user * the string literal
        `"me"`, indicating the requesting user'
  - name: list
    description: 'Returns a list of invitations that the requesting user is permitted to view, restricted to those that match
      the list request. *Note:* At least one of `user_id` or `course_id` must be supplied. Both fields can be supplied. This
      method returns the following error codes: * `PERMISSION_DENIED` for access errors.'
    params:
    - name: courseId
      type: STR
      description: Restricts returned invitations to those for a course with the specified identifier.
    - name: pageSize
      type: INT
      description: Maximum number of items to return. The default is 500 if unspecified or `0`. The server may return fewer
        than the specified number of results.
    - name: pageToken
      type: STR
      description: nextPageToken value returned from a previous list call, indicating that the subsequent page of results
        should be returned. The list request must be otherwise identical to the one that resulted in this token.
    - name: userId
      type: STR
      description: 'Restricts returned invitations to those for a specific user. The identifier can be one of the following:
        * the numeric identifier for the user * the email address of the user * the string literal `"me"`, indicating the
        requesting user'
    outputs:
    - name: invitations
      type: LIST
      description: Invitations that match the list request.
    - name: nextPageToken
      type: STR
      description: Token identifying the next page of results to return. If empty, no further results are available.
- name: classroom.registrations
  description: Operations on the 'registrations' resource
  commands:
  - name: create
    description: 'Creates a `Registration`, causing Classroom to start sending notifications from the provided `feed` to the
      destination provided in `cloudPubSubTopic`. Returns the created `Registration`. Currently, this will be the same as
      the argument, but with server-assigned fields such as `expiry_time` and `id` filled in. Note that any value specified
      for the `expiry_time` or `id` fields will be ignored. While Classroom may validate the `cloudPubSubTopic` and return
      errors on a best effort basis, it is the caller''s responsibility to ensure that it exists and that Classroom has permission
      to publish to it. This method may return the following error codes: * `PERMISSION_DENIED` if: * the authenticated user
      does not have permission to receive notifications from the requested field; or * the current user has not granted access
      to the current Cloud project with the appropriate scope for the requested feed. Note that domain-wide delegation of
      authority is not currently supported for this purpose. If the request has the appropriate scope, but no grant exists,
      a Request Errors is returned. * another access error is encountered. * `INVALID_ARGUMENT` if: * no `cloudPubsubTopic`
      is specified, or the specified `cloudPubsubTopic` is not valid; or * no `feed` is specified, or the specified `feed`
      is not valid. * `NOT_FOUND` if: * the specified `feed` cannot be located, or the requesting user does not have permission
      to determine whether or not it exists; or * the specified `cloudPubsubTopic` cannot be located, or Classroom has not
      been granted permission to publish to it.'
    outputs:
    - name: cloudPubsubTopic
      type: STR
      description: The Cloud Pub/Sub topic that notifications are to be sent to.
    - name: expiryTime
      type: STR
      description: The time until which the `Registration` is effective. This is a read-only field assigned by the server.
    - name: feed
      type: STR
      description: Specification for the class of notifications that Classroom should deliver to the destination.
    - name: registrationId
      type: STR
      description: A server-generated unique identifier for this `Registration`. Read-only.
  - name: delete
    description: Deletes a `Registration`, causing Classroom to stop sending notifications for that `Registration`.
    params:
    - name: registrationId
      type: STR
      description: The `registration_id` of the `Registration` to be deleted.
      required: true
- name: classroom.userProfiles
