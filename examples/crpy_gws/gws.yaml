- name: forms.forms
  description: Operations on the 'forms' resource
  commands:
  - name: batchUpdate
    description: Change the form with a batch of updates.
    params:
    - name: formId
      type: STR
      description: Required. The form ID.
      required: true
    outputs:
    - name: form
      type: STR
      description: Based on the bool request field `include_form_in_response`, a form with all applied mutations/updates is
        returned or not. This may be later than the revision ID created by these changes.
    - name: replies
      type: LIST
      description: The reply of the updates. This maps 1:1 with the update requests, although replies to some requests may
        be empty.
    - name: writeControl
      type: STR
      description: The updated write control after applying the request.
  - name: create
    description: Create a new form using the title given in the provided form message in the request. *Important:* Only the
      form.info.title and form.info.document_title fields are copied to the new form. All other fields including the form
      description, items and settings are disallowed. To create a new form and add items, you must first call forms.create
      to create an empty form with a title and (optional) document title, and then call forms.update to add the items.
    params:
    - name: unpublished
      type: BOOL
