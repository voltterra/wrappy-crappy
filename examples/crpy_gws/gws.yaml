        request. It makes the result of this list request contain only entries that have changed since then.

        If the syncToken expires, the server will respond with a 410 GONE response code and the client should clear its storage
        and perform a full synchronization without any syncToken.

        Learn more about incremental synchronization.

        Optional. The default is to return all entries.'
