  - name: list
    description: Returns events on the specified calendar.
    params:
    - name: alwaysIncludeEmail
      type: BOOL
      description: Deprecated and ignored.
      is_flag: true
    - name: calendarId
      type: STR
      description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
        the primary calendar of the currently logged in user, use the "primary" keyword.
      required: true
    - name: eventTypes
      type: STR
      description: Event types to return. Optional. This parameter can be repeated multiple times to return events of different
        types. If unset, returns all event types.
      choices:
      - birthday
      - default
      - focusTime
      - fromGmail
      - outOfOffice
      - workingLocation
    - name: iCalUID
      type: STR
      description: Specifies an event ID in the iCalendar format to be provided in the response. Optional. Use this if you
        want to search for an event by its iCalendar ID.
    - name: maxAttendees
      type: INT
      description: The maximum number of attendees to include in the response. If there are more than the specified number
        of attendees, only the participant is returned. Optional.
    - name: maxResults
      type: INT
      description: Maximum number of events returned on one result page. The number of events in the resulting page may be
        less than this value, or none at all, even if there are more events matching the query. Incomplete pages can be detected
        by a non-empty nextPageToken field in the response. By default the value is 250 events. The page size can never be
        larger than 2500 events. Optional.
      default: '250'
    - name: orderBy
      type: STR
      description: The order of the events returned in the result. Optional. The default is an unspecified, stable order.
      choices:
      - startTime
      - updated
    - name: pageToken
      type: STR
      description: Token specifying which result page to return. Optional.
    - name: privateExtendedProperty
      type: STR
      description: Extended properties constraint specified as propertyName=value. Matches only private properties. This parameter
        might be repeated multiple times to return events that match all given constraints.
    - name: q
      type: STR
      description: "Free text search terms to find events that match these terms in the following fields:\n\n- summary \n\
        - description \n- location \n- attendee's displayName \n- attendee's email \n- organizer's displayName \n- organizer's\
        \ email \n- workingLocationProperties.officeLocation.buildingId \n- workingLocationProperties.officeLocation.deskId\
        \ \n- workingLocationProperties.officeLocation.label \n- workingLocationProperties.customLocation.label \nThese search\
        \ terms also match predefined keywords against all display title translations of working location, out-of-office,\
        \ and focus-time events. For example, searching for \"Office\" or \"Bureau\" returns working location events of type\
        \ officeLocation, whereas searching for \"Out of office\" or \"Abwesend\" returns out-of-office events. Optional."
    - name: sharedExtendedProperty
      type: STR
      description: Extended properties constraint specified as propertyName=value. Matches only shared properties. This parameter
        might be repeated multiple times to return events that match all given constraints.
    - name: showDeleted
      type: BOOL
      description: Whether to include deleted events (with status equals "cancelled") in the result. Cancelled instances of
        recurring events (but not the underlying recurring event) will still be included if showDeleted and singleEvents are
        both False. If showDeleted and singleEvents are both True, only single instances of deleted events (but not the underlying
        recurring events) are returned. Optional. The default is False.
      is_flag: true
    - name: showHiddenInvitations
      type: BOOL
      description: Whether to include hidden invitations in the result. Optional. The default is False.
      is_flag: true
    - name: singleEvents
      type: BOOL
      description: Whether to expand recurring events into instances and only return single one-off events and instances of
        recurring events, but not the underlying recurring events themselves. Optional. The default is False.
      is_flag: true
    - name: syncToken
      type: STR
      description: "Token obtained from the nextSyncToken field returned on the last page of results from the previous list\
        \ request. It makes the result of this list request contain only entries that have changed since then. All events\
        \ deleted since the previous list request will always be in the result set and it is not allowed to set showDeleted\
        \ to False.\nThere are several query parameters that cannot be specified together with nextSyncToken to ensure consistency\
        \ of the client state.\n\nThese are: \n- iCalUID \n- orderBy \n- privateExtendedProperty \n- q \n- sharedExtendedProperty\
        \ \n- timeMin \n- timeMax \n- updatedMin All other query parameters should be the same as for the initial synchronization\
        \ to avoid undefined behavior. If the syncToken expires, the server will respond with a 410 GONE response code and\
        \ the client should clear its storage and perform a full synchronization without any syncToken.\nLearn more about\
        \ incremental synchronization.\nOptional. The default is to return all entries."
    - name: timeMax
      type: STR
      description: Upper bound (exclusive) for an event's start time to filter by. Optional. The default is not to filter
        by start time. Must be an RFC3339 timestamp with mandatory time zone offset, for example, 2011-06-03T10:00:00-07:00,
        2011-06-03T10:00:00Z. Milliseconds may be provided but are ignored. If timeMin is set, timeMax must be greater than
        timeMin.
    - name: timeMin
      type: STR
      description: Lower bound (exclusive) for an event's end time to filter by. Optional. The default is not to filter by
        end time. Must be an RFC3339 timestamp with mandatory time zone offset, for example, 2011-06-03T10:00:00-07:00, 2011-06-03T10:00:00Z.
        Milliseconds may be provided but are ignored. If timeMax is set, timeMin must be smaller than timeMax.
    - name: timeZone
      type: STR
      description: Time zone used in the response. Optional. The default is the time zone of the calendar.
    - name: updatedMin
      type: STR
      description: Lower bound for an event's last modification time (as a RFC3339 timestamp) to filter by. When specified,
        entries deleted since this time will always be included regardless of showDeleted. Optional. The default is not to
        filter by last modification time.
    outputs:
    - name: accessRole
      type: STR
      description: "The user's access role for this calendar. Read-only. Possible values are:  \n- \"none\" - The user has\
        \ no access. \n- \"freeBusyReader\" - The user has read access to free/busy information. \n- \"reader\" - The user\
        \ has read access to the calendar. Private events will appear to users with reader access, but event details will\
