        to only update the participant's response. Optional. The default is False.
    - name: birthdayProperties
      type: STR
      description: Birthday or special event data. Used if eventType is "birthday". Immutable.
    - name: colorId
      type: STR
      description: The color of the event. This is an ID referring to an entry in the event section of the colors definition
        (see the  colors endpoint). Optional.
    - name: conferenceData
      type: STR
      description: 'The conference-related information, such as details of a Google Meet conference. To create new conference
        details use the createRequest field. To persist your changes, remember to set the conferenceDataVersion request parameter
        to 1 for all event modification requests. Warning: Reusing Google Meet conference data across different events can
        cause access issues and expose meeting details to unintended users. To help ensure meeting privacy, always generate
        a unique conference for each event by using the createRequest field.'
    - name: created
      type: STR
      description: Creation time of the event (as a RFC3339 timestamp). Read-only.
    - name: creator
      type: STR
      description: The creator of the event. Read-only.
    - name: description
      type: STR
      description: Description of the event. Can contain HTML. Optional.
    - name: end
      type: STR
      description: The (exclusive) end time of the event. For a recurring event, this is the end time of the first instance.
    - name: endTimeUnspecified
      type: BOOL
