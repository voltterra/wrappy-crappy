        field: Instead, use Document.tabs.documentTab.suggestedNamedStylesChanges, which exposes the actual document content
        from all tabs when the includeTabsContent parameter is set to `true`. If `false` or unset, this field contains information
        about the first tab in the document.'
    - name: suggestionsViewMode
      type: STR
      description: 'Output only. The suggestions view mode applied to the document. Note: When editing a document, changes
        must be based on a document with SUGGESTIONS_INLINE.'
    - name: tabs
      type: LIST
      description: Tabs that are part of a document. Tabs can contain child tabs, a tab nested within another tab. Child tabs
        are represented by the Tab.childTabs field.
    - name: title
      type: STR
      description: The title of the document.
  - name: get
    description: Gets the latest version of the specified document.
    params:
    - name: documentId
      type: STR
      description: The ID of the document to retrieve.
      required: true
    - name: includeTabsContent
      type: BOOL
      description: 'Whether to populate the Document.tabs field instead of the text content fields like `body` and `documentStyle`
        on Document. - When `True`: Document content populates in the Document.tabs field instead of the text content fields
        in Document. - When `False`: The content of the document''s first tab populates the content fields in Document excluding
        Document.tabs. If a document has only one tab, then that tab is used to populate the document content. Document.tabs
        will be empty.'
