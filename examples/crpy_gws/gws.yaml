        a space in a Google Workspace organization. Omit this field when creating spaces in the following conditions: * The
        authenticated user uses a consumer account (unmanaged user account). By default, a space created by a consumer account
        permits any Google Chat user. For existing spaces, this field is output only.'
    - name: importMode
