- name: drive.revisions
  description: Operations on the 'revisions' resource
  commands:
  - name: delete
    description: Permanently deletes a file version. You can only delete revisions for files with binary content in Google
      Drive, like images or videos. Revisions for other files, like Google Docs or Sheets, and the last remaining file version
      can't be deleted. For more information, see [Manage file revisions](https://developers.google.com/drive/api/guides/manage-revisions).
    params:
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
    - name: revisionId
      type: STR
      description: The ID of the revision.
      required: true
  - name: get
    description: Gets a revision's metadata or content by ID. For more information, see [Manage file revisions](https://developers.google.com/workspace/drive/api/guides/manage-revisions).
    params:
    - name: acknowledgeAbuse
      type: BOOL
      description: Whether the user is acknowledging the risk of downloading known malware or other abusive files. This is
        only applicable when the `alt` parameter is set to `media` and the user is the owner of the file or an organizer of
        the shared drive in which the file resides.
      default: 'false'
      is_flag: true
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
    - name: revisionId
      type: STR
      description: The ID of the revision.
      required: true
    outputs:
    - name: exportLinks
      type: STR
      description: Output only. Links for exporting Docs Editors files to specific formats.
    - name: id
      type: STR
      description: Output only. The ID of the revision.
    - name: keepForever
      type: BOOL
      description: Whether to keep this revision forever, even if it is no longer the head revision. If not set, the revision
        will be automatically purged 30 days after newer content is uploaded. This can be set on a maximum of 200 revisions
        for a file. This field is only applicable to files with binary content in Drive.
    - name: kind
      type: STR
      description: 'Output only. Identifies what kind of resource this is. Value: the fixed string `"drive#revision"`.'
    - name: lastModifyingUser
      type: STR
      description: Output only. The last user to modify this revision. This field is only populated when the last modification
        was performed by a signed-in user.
    - name: md5Checksum
      type: STR
      description: Output only. The MD5 checksum of the revision's content. This is only applicable to files with binary content
        in Drive.
    - name: mimeType
      type: STR
      description: Output only. The MIME type of the revision.
    - name: modifiedTime
      type: STR
      description: The last time the revision was modified (RFC 3339 date-time).
    - name: originalFilename
      type: STR
      description: Output only. The original filename used to create this revision. This is only applicable to files with
        binary content in Drive.
    - name: publishAuto
      type: BOOL
      description: Whether subsequent revisions will be automatically republished. This is only applicable to Docs Editors
        files.
    - name: published
      type: BOOL
      description: Whether this revision is published. This is only applicable to Docs Editors files.
    - name: publishedLink
      type: STR
      description: Output only. A link to the published revision. This is only populated for Docs Editors files.
    - name: publishedOutsideDomain
      type: BOOL
      description: Whether this revision is published outside the domain. This is only applicable to Docs Editors files.
    - name: size
      type: STR
      description: Output only. The size of the revision's content in bytes. This is only applicable to files with binary
        content in Drive.
  - name: list
    description: Lists a file's revisions. For more information, see [Manage file revisions](https://developers.google.com/workspace/drive/api/guides/manage-revisions).
      **Important:** The list of revisions returned by this method might be incomplete for files with a large revision history,
      including frequently edited Google Docs, Sheets, and Slides. Older revisions might be omitted from the response, meaning
      the first revision returned may not be the oldest existing revision. The revision history visible in the Workspace editor
      user interface might be more complete than the list returned by the API.
    params:
    - name: fileId
