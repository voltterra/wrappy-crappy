      type: STR
      description: The id of the user setting.
      required: true
    outputs:
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: id
      type: STR
      description: The id of the user setting.
    - name: kind
      type: STR
      description: Type of the resource ("calendar#setting").
    - name: value
      type: STR
      description: Value of the user setting. The format of the value depends on the ID of the setting. It must always be
        a UTF-8 string of length up to 1024 characters.
  - name: list
    description: Returns all user settings for the authenticated user.
    params:
