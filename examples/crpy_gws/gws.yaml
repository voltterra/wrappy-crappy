- name: meet.conferenceRecords
  description: Operations on the 'conferenceRecords' resource
  commands:
  - name: get
    description: Gets a conference record by conference ID.
    params:
    - name: name
      type: STR
      description: Required. Resource name of the conference.
      required: true
    outputs:
    - name: endTime
      type: STR
      description: Output only. Timestamp when the conference ended. Set for past conferences. Unset if the conference is
        ongoing.
    - name: expireTime
      type: STR
      description: Output only. Server enforced expiration time for when this conference record resource is deleted. The resource
        is deleted 30 days after the conference ends.
    - name: name
      type: STR
      description: 'Identifier. Resource name of the conference record. Format: `conferenceRecords/{conference_record}` where
        `{conference_record}` is a unique ID for each instance of a call within a space.'
    - name: space
      type: STR
      description: Output only. The space where the conference was held.
    - name: startTime
      type: STR
      description: Output only. Timestamp when the conference started. Always set.
  - name: list
    description: Lists the conference records. By default, ordered by start time and in descending order.
    params:
    - name: filter
      type: STR
      description: 'Optional. User specified filtering condition in [EBNF format](https://en.wikipedia.org/wiki/Extended_Backus%E2%80%93Naur_form).
        The following are the filterable fields: * `space.meeting_code` * `space.name` * `start_time` * `end_time` For example,
        consider the following filters: * `space.name = "spaces/NAME"` * `space.meeting_code = "abc-mnop-xyz"` * `start_time>="2024-01-01T00:00:00.000Z"
        AND start_time<="2024-01-02T00:00:00.000Z"` * `end_time IS NULL`'
    - name: pageSize
      type: INT
      description: Optional. Maximum number of conference records to return. The service might return fewer than this value.
        If unspecified, at most 25 conference records are returned. The maximum value is 100; values above 100 are coerced
        to 100. Maximum might change in the future.
    - name: pageToken
      type: STR
      description: Optional. Page token returned from previous List Call.
    outputs:
    - name: conferenceRecords
      type: LIST
      description: List of conferences in one page.
    - name: nextPageToken
      type: STR
      description: Token to be circulated back for further List call if current List does NOT include all the Conferences.
        Unset if all conferences have been returned.
