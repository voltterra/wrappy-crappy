  - name: modifyLabels
    description: Modifies the set of labels applied to a file. For more information, see [Set a label field on a file](https://developers.google.com/workspace/drive/api/guides/set-label).
      Returns a list of the labels that were added or modified.
    params:
    - name: fileId
      type: STR
      description: The ID of the file to which the labels belong.
      required: true
    outputs:
    - name: kind
      type: STR
      description: This is always `"drive#modifyLabelsResponse"`.
    - name: modifiedLabels
      type: LIST
      description: The list of labels which were added or updated by the request.
