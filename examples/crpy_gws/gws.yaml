      type: BOOL
      description: Output only. Whether the file has been modified by this user.
    - name: modifiedByMeTime
      type: STR
      description: The last time the file was modified by the user (RFC 3339 date-time).
    - name: modifiedTime
      type: STR
      description: he last time the file was modified by anyone (RFC 3339 date-time). Note that setting modifiedTime will
        also update modifiedByMeTime for the user.
