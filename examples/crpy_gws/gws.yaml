- name: admin-reports.customerUsageReports
  description: Operations on the 'customerUsageReports' resource
  commands:
  - name: get
    description: 'Retrieves a report which is a collection of properties and statistics for a specific customer''s account.
      For more information, see the Customers Usage Report guide. For more information about the customer report''s parameters,
      see the Customers Usage parameters reference guides. '
    params:
    - name: customerId
      type: STR
      description: The unique ID of the customer to retrieve data for.
    - name: date
      type: STR
      description: Represents the date the usage occurred, based on UTC-8:00 (Pacific Standard Time). The timestamp is in
        the [ISO 8601 format](https://en.wikipedia.org/wiki/ISO_8601), `yyyy-mm-dd`.
      required: true
    - name: pageToken
      type: STR
      description: Token to specify next page. A report with multiple pages has a `nextPageToken` property in the response.
        For your follow-on requests getting all of the report's pages, enter the `nextPageToken` value in the `pageToken`
        query string.
    - name: parameters
      type: STR
      description: 'The `parameters` query string is a comma-separated list of event parameters that refine a report''s results.
        The parameter is associated with a specific application. The application values for the Customers usage report include
        `accounts`, `app_maker`, `apps_scripts`, `calendar`, `chat`, `classroom`, `cros`, `docs`, `gmail`, `gplus`, `device_management`,
        `meet`, and `sites`. A `parameters` query string is in the CSV form of `app_name1:param_name1, app_name2:param_name2`.
        *Note:* The API doesn''t accept multiple values of a parameter. If a particular parameter is supplied more than once
        in the API request, the API only accepts the last value of that request parameter. In addition, if an invalid request
        parameter is supplied in the API request, the API ignores that request parameter and returns the response corresponding
        to the remaining valid request parameters. An example of an invalid request parameter is one that does not belong
        to the application. If no parameters are requested, all parameters are returned. '
    outputs:
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: kind
      type: STR
      description: The type of API resource. For a usage report, the value is `admin#reports#usageReports`.
    - name: nextPageToken
      type: STR
      description: Token to specify next page. A report with multiple pages has a `nextPageToken` property in the response.
        For your follow-on requests getting all of the report's pages, enter the `nextPageToken` value in the `pageToken`
        query string.
    - name: usageReports
      type: LIST
      description: Various application parameter records.
    - name: warnings
      type: LIST
      description: Warnings, if any.
- name: admin-reports.entityUsageReports
  description: Operations on the 'entityUsageReports' resource
  commands:
  - name: get
    description: Retrieves a report which is a collection of properties and statistics for entities used by users within the
      account. For more information, see the Entities Usage Report guide. For more information about the entities report's
      parameters, see the Entities Usage parameters reference guides.
