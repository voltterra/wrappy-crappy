- name: classroom.courses
  description: Operations on the 'courses' resource
  commands:
  - name: create
    description: 'Creates a course. The user specified in `ownerId` is the owner of the created course and added as a teacher.
      A non-admin requesting user can only create a course with themselves as the owner. Domain admins can create courses
      owned by any user within their domain. This method returns the following error codes: * `PERMISSION_DENIED` if the requesting
      user is not permitted to create courses or for access errors. * `NOT_FOUND` if the primary teacher is not a valid user.
      * `FAILED_PRECONDITION` if the course owner''s account is disabled or for the following request errors: * UserCannotOwnCourse
      * UserGroupsMembershipLimitReached * CourseTitleCannotContainUrl * `ALREADY_EXISTS` if an alias was specified in the
      `id` and already exists.'
    outputs:
    - name: alternateLink
      type: STR
      description: Absolute link to this course in the Classroom web UI. Read-only.
    - name: calendarId
      type: STR
      description: The Calendar ID for a calendar that all course members can see, to which Classroom adds events for course
        work and announcements in the course. The Calendar for a course is created asynchronously when the course is set to
        `CourseState.ACTIVE` for the first time (at creation time or when it is updated to `ACTIVE` through the UI or the
        API). The Calendar ID will not be populated until the creation process is completed. Read-only.
    - name: courseGroupEmail
      type: STR
      description: The email address of a Google group containing all members of the course. This group does not accept email
        and can only be used for permissions. Read-only.
    - name: courseMaterialSets
      type: LIST
      description: Sets of materials that appear on the "about" page of this course. Read-only.
    - name: courseState
      type: STR
      description: State of the course. If unspecified, the default state is `PROVISIONED`.
    - name: creationTime
      type: STR
      description: Creation time of the course. Specifying this field in a course update mask results in an error. Read-only.
    - name: description
      type: STR
      description: Optional description. For example, "We'll be learning about the structure of living creatures from a combination
        of textbooks, guest lectures, and lab work. Expect to be excited!" If set, this field must be a valid UTF-8 string
        and no longer than 30,000 characters.
    - name: descriptionHeading
      type: STR
      description: Optional heading for the description. For example, "Welcome to 10th Grade Biology." If set, this field
        must be a valid UTF-8 string and no longer than 3600 characters.
    - name: enrollmentCode
      type: STR
      description: Enrollment code to use when joining this course. Specifying this field in a course update mask results
        in an error. Read-only.
    - name: gradebookSettings
      type: STR
      description: The gradebook settings that specify how a student's overall grade for the course will be calculated and
        who it will be displayed to. Read-only.
    - name: guardiansEnabled
      type: BOOL
      description: Whether or not guardian notifications are enabled for this course. Read-only.
    - name: id
      type: STR
      description: Identifier for this course assigned by Classroom. When creating a course, you may optionally set this identifier
        to an alias string in the request to create a corresponding alias. The `id` is still assigned by Classroom and cannot
        be updated after the course is created. Specifying this field in a course update mask results in an error.
    - name: name
      type: STR
      description: Name of the course. For example, "10th Grade Biology". The name is required. It must be between 1 and 750
        characters and a valid UTF-8 string.
    - name: ownerId
      type: STR
      description: 'The identifier of the owner of a course. When specified as a parameter of a create course request, this
        field is required. The identifier can be one of the following: * the numeric identifier for the user * the email address
        of the user * the string literal `"me"`, indicating the requesting user This must be set in a create request. Admins
        can also specify this field in a patch course request to transfer ownership. In other contexts, it is read-only.'
    - name: room
      type: STR
      description: Optional room location. For example, "301". If set, this field must be a valid UTF-8 string and no longer
        than 650 characters.
    - name: section
      type: STR
      description: Section of the course. For example, "Period 2". If set, this field must be a valid UTF-8 string and no
        longer than 2800 characters.
    - name: subject
      type: STR
      description: Optional. The subject of the course.
    - name: teacherFolder
      type: STR
      description: Information about a Drive Folder that is shared with all teachers of the course. This field will only be
        set for teachers of the course and domain administrators. Read-only.
    - name: teacherGroupEmail
      type: STR
      description: The email address of a Google group containing all teachers of the course. This group does not accept email
        and can only be used for permissions. Read-only.
    - name: updateTime
      type: STR
      description: Time of the most recent update to this course. Specifying this field in a course update mask results in
        an error. Read-only.
  - name: delete
    description: 'Deletes a course. This method returns the following error codes: * `PERMISSION_DENIED` if the requesting
      user is not permitted to delete the requested course or for access errors. * `NOT_FOUND` if no course exists with the
      requested ID.'
    params:
    - name: id
      type: STR
      description: Identifier of the course to delete. This identifier can be either the Classroom-assigned identifier or
        an alias.
      required: true
  - name: get
    description: 'Returns a course. This method returns the following error codes: * `PERMISSION_DENIED` if the requesting
      user is not permitted to access the requested course or for access errors. * `NOT_FOUND` if no course exists with the
      requested ID.'
    params:
    - name: id
      type: STR
      description: Identifier of the course to return. This identifier can be either the Classroom-assigned identifier or
        an alias.
      required: true
    outputs:
    - name: alternateLink
      type: STR
      description: Absolute link to this course in the Classroom web UI. Read-only.
    - name: calendarId
      type: STR
      description: The Calendar ID for a calendar that all course members can see, to which Classroom adds events for course
        work and announcements in the course. The Calendar for a course is created asynchronously when the course is set to
        `CourseState.ACTIVE` for the first time (at creation time or when it is updated to `ACTIVE` through the UI or the
        API). The Calendar ID will not be populated until the creation process is completed. Read-only.
    - name: courseGroupEmail
      type: STR
      description: The email address of a Google group containing all members of the course. This group does not accept email
        and can only be used for permissions. Read-only.
    - name: courseMaterialSets
      type: LIST
      description: Sets of materials that appear on the "about" page of this course. Read-only.
    - name: courseState
      type: STR
      description: State of the course. If unspecified, the default state is `PROVISIONED`.
    - name: creationTime
      type: STR
      description: Creation time of the course. Specifying this field in a course update mask results in an error. Read-only.
    - name: description
      type: STR
      description: Optional description. For example, "We'll be learning about the structure of living creatures from a combination
        of textbooks, guest lectures, and lab work. Expect to be excited!" If set, this field must be a valid UTF-8 string
        and no longer than 30,000 characters.
