      type: STR
      description: "The role assigned to the scope. Possible values are:  \n- \"none\" - Provides no access. \n- \"freeBusyReader\"\
        \ - Provides read access to free/busy information. \n- \"reader\" - Provides read access to the calendar. Private\
        \ events will appear to users with reader access, but event details will be hidden. \n- \"writer\" - Provides read\
