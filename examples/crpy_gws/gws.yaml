  - name: delete
    description: Permanently deletes a file owned by the user without moving it to the trash. For more information, see [Trash
      or delete files and folders](https://developers.google.com/workspace/drive/api/guides/delete). If the file belongs to
      a shared drive, the user must be an `organizer` on the parent folder. If the target is a folder, all descendants owned
      by the user are also deleted.
    params:
    - name: enforceSingleParent
      type: BOOL
      description: 'Deprecated: If an item isn''t in a shared drive and its last parent is deleted but the item itself isn''t,
        the item will be placed under its owner''s root.'
      default: 'false'
      is_flag: true
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
    - name: supportsAllDrives
      type: BOOL
      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
      is_flag: true
    - name: supportsTeamDrives
      type: BOOL
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
      is_flag: true
  - name: download
    description: Downloads the content of a file. For more information, see [Download and export files](https://developers.google.com/workspace/drive/api/guides/manage-downloads).
      Operations are valid for 24 hours from the time of creation.
    params:
    - name: fileId
      type: STR
      description: Required. The ID of the file to download.
      required: true
    - name: mimeType
      type: STR
      description: Optional. The MIME type the file should be downloaded as. This field can only be set when downloading Google
        Workspace documents. For a list of supported MIME types, see [Export MIME types for Google Workspace documents](/workspace/drive/api/guides/ref-export-formats).
        If not set, a Google Workspace document is downloaded with a default MIME type. The default MIME type might change
        in the future.
    - name: revisionId
      type: STR
      description: Optional. The revision ID of the file to download. This field can only be set when downloading blob files,
        Google Docs, and Google Sheets. Returns `INVALID_ARGUMENT` if downloading a specific revision on the file is unsupported.
    outputs:
    - name: done
      type: BOOL
      description: If the value is `false`, it means the operation is still in progress. If `true`, the operation is completed,
        and either `error` or `response` is available.
    - name: error
      type: STR
      description: The error result of the operation in case of failure or cancellation.
    - name: metadata
      type: STR
      description: Service-specific metadata associated with the operation. It typically contains progress information and
        common metadata such as create time. Some services might not provide such metadata. Any method that returns a long-running
        operation should document the metadata type, if any.
    - name: name
      type: STR
      description: The server-assigned name, which is only unique within the same service that originally returns it. If you
        use the default HTTP mapping, the `name` should be a resource name ending with `operations/{unique_id}`.
    - name: response
      type: STR
      description: The normal, successful response of the operation. If the original method returns no data on success, such
        as `Delete`, the response is `google.protobuf.Empty`. If the original method is standard `Get`/`Create`/`Update`,
        the response should be the resource. For other methods, the response should have the type `XxxResponse`, where `Xxx`
        is the original method name. For example, if the original method name is `TakeSnapshot()`, the inferred response type
        is `TakeSnapshotResponse`.
