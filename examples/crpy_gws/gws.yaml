    description: Permanently deletes all of the user's trashed files. For more information, see [Trash or delete files and
      folders](https://developers.google.com/workspace/drive/api/guides/delete).
    params:
    - name: driveId
      type: STR
      description: If set, empties the trash of the provided shared drive.
    - name: enforceSingleParent
      type: BOOL
      description: 'Deprecated: If an item isn''t in a shared drive and its last parent is deleted but the item itself isn''t,
        the item will be placed under its owner''s root.'
      default: 'false'
      is_flag: true
  - name: export
    description: Exports a Google Workspace document to the requested MIME type and returns exported byte content. For more
