  - name: list
    description: List all "Other contacts", that is contacts that are not in a contact group. "Other contacts" are typically
      auto created contacts from interactions. Sync tokens expire 7 days after the full sync. A request with an expired sync
      token will get an error with an [google.rpc.ErrorInfo](https://cloud.google.com/apis/design/errors#error_info) with
