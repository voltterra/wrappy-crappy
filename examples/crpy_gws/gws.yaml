      description: Non-empty default. The timestamp in UTC when the subscription expires. Always displayed on output, regardless
        of what was used on input.
    - name: name
      type: STR
      description: 'Identifier. Resource name of the subscription. Format: `subscriptions/{subscription}`'
    - name: notificationEndpoint
      type: STR
      description: Required. Immutable. The endpoint where the subscription delivers events, such as a Pub/Sub topic.
    - name: payloadOptions
      type: STR
      description: Optional. Options about what data to include in the event payload. Only supported for Google Chat and Google
