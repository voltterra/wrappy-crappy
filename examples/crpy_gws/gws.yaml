- name: docs.documents
  description: Operations on the 'documents' resource
  commands:
  - name: batchUpdate
    description: 'Applies one or more updates to the document. Each request is validated before being applied. If any request
      is not valid, then the entire request will fail and nothing will be applied. Some requests have replies to give you
      some information about how they are applied. Other requests do not need to return information; these each return an
      empty reply. The order of replies matches that of the requests. For example, suppose you call batchUpdate with four
      updates, and only the third one returns information. The response would have two empty replies, the reply to the third
      request, and another empty reply, in that order. Because other users may be editing the document, the document might
      not exactly reflect your changes: your changes may be altered with respect to collaborator changes. If there are no
      collaborators, the document should reflect your changes. In any case, the updates in your request are guaranteed to
      be applied together atomically.'
    params:
    - name: documentId
      type: STR
      description: The ID of the document to update.
      required: true
    outputs:
    - name: documentId
      type: STR
      description: The ID of the document to which the updates were applied to.
    - name: replies
      type: LIST
      description: The reply of the updates. This maps 1:1 with the updates, although replies to some requests may be empty.
    - name: writeControl
      type: STR
      description: The updated write control after applying the request.
  - name: create
    description: Creates a blank document using the title given in the request. Other fields in the request, including any
      provided content, are ignored. Returns the created document.
    outputs:
    - name: body
      type: STR
      description: 'Output only. The main body of the document. Legacy field: Instead, use Document.tabs.documentTab.body,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: documentId
      type: STR
      description: Output only. The ID of the document.
    - name: documentStyle
      type: STR
      description: 'Output only. The style of the document. Legacy field: Instead, use Document.tabs.documentTab.documentStyle,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: footers
      type: STR
      description: 'Output only. The footers in the document, keyed by footer ID. Legacy field: Instead, use Document.tabs.documentTab.footers,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: footnotes
      type: STR
      description: 'Output only. The footnotes in the document, keyed by footnote ID. Legacy field: Instead, use Document.tabs.documentTab.footnotes,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: headers
      type: STR
      description: 'Output only. The headers in the document, keyed by header ID. Legacy field: Instead, use Document.tabs.documentTab.headers,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: inlineObjects
      type: STR
      description: 'Output only. The inline objects in the document, keyed by object ID. Legacy field: Instead, use Document.tabs.documentTab.inlineObjects,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: lists
      type: STR
      description: 'Output only. The lists in the document, keyed by list ID. Legacy field: Instead, use Document.tabs.documentTab.lists,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: namedRanges
      type: STR
      description: 'Output only. The named ranges in the document, keyed by name. Legacy field: Instead, use Document.tabs.documentTab.namedRanges,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: namedStyles
      type: STR
      description: 'Output only. The named styles of the document. Legacy field: Instead, use Document.tabs.documentTab.namedStyles,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: positionedObjects
      type: STR
      description: 'Output only. The positioned objects in the document, keyed by object ID. Legacy field: Instead, use Document.tabs.documentTab.positionedObjects,
        which exposes the actual document content from all tabs when the includeTabsContent parameter is set to `true`. If
        `false` or unset, this field contains information about the first tab in the document.'
    - name: revisionId
      type: STR
      description: Output only. The revision ID of the document. Can be used in update requests to specify which revision
        of a document to apply updates to and how the request should behave if the document has been edited since that revision.
        Only populated if the user has edit access to the document. The revision ID is not a sequential number but an opaque
        string. The format of the revision ID might change over time. A returned revision ID is only guaranteed to be valid
        for 24 hours after it has been returned and cannot be shared across users. If the revision ID is unchanged between
        calls, then the document has not changed. Conversely, a changed ID (for the same document and user) usually means
        the document has been updated. However, a changed ID can also be due to internal factors such as ID format changes.
    - name: suggestedDocumentStyleChanges
      type: STR
      description: 'Output only. The suggested changes to the style of the document, keyed by suggestion ID. Legacy field:
        Instead, use Document.tabs.documentTab.suggestedDocumentStyleChanges, which exposes the actual document content from
        all tabs when the includeTabsContent parameter is set to `true`. If `false` or unset, this field contains information
        about the first tab in the document.'
    - name: suggestedNamedStylesChanges
