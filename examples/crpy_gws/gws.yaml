      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
      is_flag: true
    - name: supportsTeamDrives
      type: BOOL
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
      is_flag: true
    outputs:
    - name: appProperties
      type: STR
      description: 'A collection of arbitrary key-value pairs which are private to the requesting app.

        Entries with null values are cleared in update and copy requests. These properties can only be retrieved using an
        authenticated request. An authenticated request uses an access token obtained with a OAuth 2 client ID. You cannot
