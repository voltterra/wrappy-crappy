- name: drive.operations
  description: Operations on the 'operations' resource
  commands:
  - name: get
    description: Gets the latest state of a long-running operation. Clients can use this method to poll the operation result
      at intervals as recommended by the API service.
    params:
    - name: name
      type: STR
      description: The name of the operation resource.
      required: true
    outputs:
    - name: done
      type: BOOL
      description: If the value is `false`, it means the operation is still in progress. If `true`, the operation is completed,
        and either `error` or `response` is available.
    - name: error
      type: STR
      description: The error result of the operation in case of failure or cancellation.
    - name: metadata
      type: STR
      description: Service-specific metadata associated with the operation. It typically contains progress information and
        common metadata such as create time. Some services might not provide such metadata. Any method that returns a long-running
        operation should document the metadata type, if any.
    - name: name
      type: STR
      description: The server-assigned name, which is only unique within the same service that originally returns it. If you
        use the default HTTP mapping, the `name` should be a resource name ending with `operations/{unique_id}`.
    - name: response
      type: STR
      description: The normal, successful response of the operation. If the original method returns no data on success, such
        as `Delete`, the response is `google.protobuf.Empty`. If the original method is standard `Get`/`Create`/`Update`,
        the response should be the resource. For other methods, the response should have the type `XxxResponse`, where `Xxx`
        is the original method name. For example, if the original method name is `TakeSnapshot()`, the inferred response type
        is `TakeSnapshotResponse`.
- name: drive.permissions
  description: Operations on the 'permissions' resource
  commands:
  - name: create
    description: Creates a permission for a file or shared drive. For more information, see [Share files, folders, and drives](https://developers.google.com/workspace/drive/api/guides/manage-sharing).
      **Warning:** Concurrent permissions operations on the same file aren't supported; only the last update is applied.
