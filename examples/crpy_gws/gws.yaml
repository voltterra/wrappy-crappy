- name: calendar.calendars
  description: Operations on the 'calendars' resource
  commands:
  - name: clear
    description: Clears a primary calendar. This operation deletes all events associated with the primary calendar of an account.
    params:
    - name: calendarId
      type: STR
      description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
        the primary calendar of the currently logged in user, use the "primary" keyword.
      required: true
  - name: delete
    description: Deletes a secondary calendar. Use calendars.clear for clearing all events on primary calendars.
    params:
    - name: calendarId
      type: STR
      description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
        the primary calendar of the currently logged in user, use the "primary" keyword.
      required: true
  - name: get
    description: Returns metadata for a calendar.
    params:
    - name: calendarId
      type: STR
      description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
        the primary calendar of the currently logged in user, use the "primary" keyword.
      required: true
    outputs:
    - name: autoAcceptInvitations
      type: BOOL
      description: Whether this calendar automatically accepts invitations. Only valid for resource calendars.
    - name: conferenceProperties
      type: STR
      description: Conferencing properties for this calendar, for example what types of conferences are allowed.
    - name: dataOwner
      type: STR
      description: The email of the owner of the calendar. Set only for secondary calendars. Read-only.
    - name: description
      type: STR
      description: Description of the calendar. Optional.
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: id
      type: STR
      description: Identifier of the calendar. To retrieve IDs call the calendarList.list() method.
    - name: kind
      type: STR
      description: Type of the resource ("calendar#calendar").
    - name: location
      type: STR
      description: Geographic location of the calendar as free-form text. Optional.
    - name: summary
      type: STR
      description: Title of the calendar.
    - name: timeZone
      type: STR
      description: The time zone of the calendar. (Formatted as an IANA Time Zone Database name, e.g. "Europe/Zurich".) Optional.
  - name: insert
    description: 'Creates a secondary calendar.

      The authenticated user for the request is made the data owner of the new calendar.


      Note: We recommend to authenticate as the intended data owner of the calendar. You can use domain-wide delegation of
      authority to allow applications to act on behalf of a specific user. Don''t use a service account for authentication.
      If you use a service account for authentication, the service account is the data owner, which can lead to unexpected
      behavior. For example, if a service account is the data owner, data ownership cannot be transferred.'
    outputs:
    - name: autoAcceptInvitations
      type: BOOL
      description: Whether this calendar automatically accepts invitations. Only valid for resource calendars.
    - name: conferenceProperties
      type: STR
      description: Conferencing properties for this calendar, for example what types of conferences are allowed.
    - name: dataOwner
      type: STR
      description: The email of the owner of the calendar. Set only for secondary calendars. Read-only.
    - name: description
      type: STR
      description: Description of the calendar. Optional.
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: id
      type: STR
      description: Identifier of the calendar. To retrieve IDs call the calendarList.list() method.
    - name: kind
      type: STR
      description: Type of the resource ("calendar#calendar").
    - name: location
      type: STR
      description: Geographic location of the calendar as free-form text. Optional.
    - name: summary
      type: STR
      description: Title of the calendar.
    - name: timeZone
      type: STR
      description: The time zone of the calendar. (Formatted as an IANA Time Zone Database name, e.g. "Europe/Zurich".) Optional.
- name: calendar.channels
  description: Operations on the 'channels' resource
  commands:
  - name: stop
    description: Stop watching resources through this channel
- name: calendar.colors
  description: Operations on the 'colors' resource
  commands:
  - name: get
    description: Returns the color definitions for calendars and events.
    outputs:
    - name: calendar
      type: STR
      description: A global palette of calendar colors, mapping from the color ID to its definition. A calendarListEntry resource
        refers to one of these color IDs in its colorId field. Read-only.
    - name: event
      type: STR
      description: A global palette of event colors, mapping from the color ID to its definition. An event resource may refer
        to one of these color IDs in its colorId field. Read-only.
    - name: kind
      type: STR
      description: Type of the resource ("calendar#colors").
    - name: updated
      type: STR
      description: Last modification time of the color palette (as a RFC3339 timestamp). Read-only.
- name: calendar.events
  description: Operations on the 'events' resource
  commands:
  - name: delete
    description: Deletes an event.
    params:
    - name: calendarId
      type: STR
      description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
        the primary calendar of the currently logged in user, use the "primary" keyword.
      required: true
    - name: eventId
      type: STR
      description: Event identifier.
      required: true
    - name: sendNotifications
      type: BOOL
      description: 'Deprecated. Please use sendUpdates instead.


        Whether to send notifications about the deletion of the event. Note that some emails might still be sent even if you
        set the value to false. The default is false.'
      is_flag: true
    - name: sendUpdates
      type: STR
      description: Guests who should receive notifications about the deletion of the event.
      choices:
      - all
      - externalOnly
      - none
  - name: get
    description: Returns an event based on its Google Calendar ID. To retrieve an event using its iCalendar ID, call the events.list
      method using the iCalUID parameter.
    params:
    - name: alwaysIncludeEmail
      type: BOOL
      description: Deprecated and ignored. A value will always be returned in the email field for the organizer, creator and
        attendees, even if no real email address is available (i.e. a generated, non-working value will be provided).
      is_flag: true
    - name: calendarId
      type: STR
      description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
        the primary calendar of the currently logged in user, use the "primary" keyword.
      required: true
    - name: eventId
      type: STR
      description: Event identifier.
      required: true
    - name: maxAttendees
      type: INT
      description: The maximum number of attendees to include in the response. If there are more than the specified number
        of attendees, only the participant is returned. Optional.
    - name: timeZone
      type: STR
      description: Time zone used in the response. Optional. The default is the time zone of the calendar.
    outputs:
    - name: anyoneCanAddSelf
      type: BOOL
      description: Whether anyone can invite themselves to the event (deprecated). Optional. The default is False.
    - name: attachments
      type: LIST
      description: 'File attachments for the event.

        In order to modify attachments the supportsAttachments request parameter should be set to true.

        There can be at most 25 attachments per event,'
    - name: attendees
      type: LIST
      description: The attendees of the event. See the Events with attendees guide for more information on scheduling events
        with other calendar users. Service accounts need to use domain-wide delegation of authority to populate the attendee
        list.
    - name: attendeesOmitted
      type: BOOL
      description: Whether attendees may have been omitted from the event's representation. When retrieving an event, this
        may be due to a restriction specified by the maxAttendee query parameter. When updating an event, this can be used
        to only update the participant's response. Optional. The default is False.
    - name: birthdayProperties
      type: STR
      description: Birthday or special event data. Used if eventType is "birthday". Immutable.
    - name: colorId
      type: STR
      description: The color of the event. This is an ID referring to an entry in the event section of the colors definition
        (see the  colors endpoint). Optional.
    - name: conferenceData
      type: STR
      description: 'The conference-related information, such as details of a Google Meet conference. To create new conference
        details use the createRequest field. To persist your changes, remember to set the conferenceDataVersion request parameter
        to 1 for all event modification requests. Warning: Reusing Google Meet conference data across different events can
        cause access issues and expose meeting details to unintended users. To help ensure meeting privacy, always generate
        a unique conference for each event by using the createRequest field.'
    - name: created
      type: STR
      description: Creation time of the event (as a RFC3339 timestamp). Read-only.
    - name: creator
      type: STR
      description: The creator of the event. Read-only.
    - name: description
      type: STR
      description: Description of the event. Can contain HTML. Optional.
    - name: end
      type: STR
      description: The (exclusive) end time of the event. For a recurring event, this is the end time of the first instance.
    - name: endTimeUnspecified
      type: BOOL
      description: Whether the end time is actually unspecified. An end time is still provided for compatibility reasons,
        even if this attribute is set to True. The default is False.
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: eventType
      type: STR
      description: "Specific type of the event. This cannot be modified after the event is created. Possible values are: \
        \ \n- \"birthday\" - A special all-day event with an annual recurrence. \n- \"default\" - A regular event or not further\
        \ specified. \n- \"focusTime\" - A focus-time event. \n- \"fromGmail\" - An event from Gmail. This type of event cannot\
        \ be created. \n- \"outOfOffice\" - An out-of-office event. \n- \"workingLocation\" - A working location event."
    - name: extendedProperties
      type: STR
      description: Extended properties of the event.
    - name: focusTimeProperties
      type: STR
      description: Focus Time event data. Used if eventType is focusTime.
    - name: gadget
      type: STR
      description: A gadget that extends this event. Gadgets are deprecated; this structure is instead only used for returning
        birthday calendar metadata.
    - name: guestsCanInviteOthers
      type: BOOL
      description: Whether attendees other than the organizer can invite others to the event. Optional. The default is True.
    - name: guestsCanModify
      type: BOOL
      description: Whether attendees other than the organizer can modify the event. Optional. The default is False.
    - name: guestsCanSeeOtherGuests
      type: BOOL
      description: Whether attendees other than the organizer can see who the event's attendees are. Optional. The default
        is True.
    - name: hangoutLink
      type: STR
      description: An absolute link to the Google Hangout associated with this event. Read-only.
    - name: htmlLink
      type: STR
      description: An absolute link to this event in the Google Calendar Web UI. Read-only.
    - name: iCalUID
      type: STR
      description: 'Event unique identifier as defined in RFC5545. It is used to uniquely identify events accross calendaring
        systems and must be supplied when importing events via the import method.

        Note that the iCalUID and the id are not identical and only one of them should be supplied at event creation time.
        One difference in their semantics is that in recurring events, all occurrences of one event have different ids while
        they all share the same iCalUIDs. To retrieve an event using its iCalUID, call the events.list method using the iCalUID
        parameter. To retrieve an event using its id, call the events.get method.'
    - name: id
      type: STR
      description: "Opaque identifier of the event. When creating new single or recurring events, you can specify their IDs.\
        \ Provided IDs must follow these rules:  \n- characters allowed in the ID are those used in base32hex encoding, i.e.\
        \ lowercase letters a-v and digits 0-9, see section 3.1.2 in RFC2938 \n- the length of the ID must be between 5 and\
        \ 1024 characters \n- the ID must be unique per calendar  Due to the globally distributed nature of the system, we\
        \ cannot guarantee that ID collisions will be detected at event creation time. To minimize the risk of collisions\
        \ we recommend using an established UUID algorithm such as one described in RFC4122.\nIf you do not specify an ID,\
        \ it will be automatically generated by the server.\nNote that the icalUID and the id are not identical and only one\
        \ of them should be supplied at event creation time. One difference in their semantics is that in recurring events,\
        \ all occurrences of one event have different ids while they all share the same icalUIDs."
    - name: kind
      type: STR
      description: Type of the resource ("calendar#event").
    - name: location
      type: STR
      description: Geographic location of the event as free-form text. Optional.
    - name: locked
      type: BOOL
      description: Whether this is a locked event copy where no changes can be made to the main event fields "summary", "description",
        "location", "start", "end" or "recurrence". The default is False. Read-Only.
    - name: organizer
      type: STR
      description: The organizer of the event. If the organizer is also an attendee, this is indicated with a separate entry
        in attendees with the organizer field set to True. To change the organizer, use the move operation. Read-only, except
        when importing an event.
    - name: originalStartTime
      type: STR
      description: For an instance of a recurring event, this is the time at which this event would start according to the
        recurrence data in the recurring event identified by recurringEventId. It uniquely identifies the instance within
