        [Admin SDK customer resource](https://developers.google.com/admin-sdk/directory/reference/rest/v1/customers). Private
        apps can also use the `customers/my_customer` alias to create the space in the same Google Workspace organization
        as the app. This field isn't populated for direct messages (DMs) or when the space is created by non-Google Workspace
        users.
    - name: displayName
      type: STR
      description: Optional. The space's display name. Required when [creating a space](https://developers.google.com/workspace/chat/api/reference/rest/v1/spaces/create)
        with a `spaceType` of `SPACE`. If you receive the error message `ALREADY_EXISTS` when creating a space or updating
        the `displayName`, try a different `displayName`. An existing space within the Google Workspace organization might
        already use this display name. For direct messages, this field might be empty. Supports up to 128 characters.
    - name: externalUserAllowed
      type: BOOL
      description: 'Optional. Immutable. Whether this space permits any Google Chat user as a member. Input when creating
        a space in a Google Workspace organization. Omit this field when creating spaces in the following conditions: * The
        authenticated user uses a consumer account (unmanaged user account). By default, a space created by a consumer account
        permits any Google Chat user. For existing spaces, this field is output only.'
    - name: importMode
      type: BOOL
      description: Optional. Whether this space is created in `Import Mode` as part of a data migration into Google Workspace.
        While spaces are being imported, they aren't visible to users until the import is complete. Creating a space in `Import
        Mode`requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user).
    - name: importModeExpireTime
      type: STR
      description: Output only. The time when the space will be automatically deleted by the system if it remains in import
        mode. Each space created in import mode must exit this mode before this expire time using `spaces.completeImport`.
        This field is only populated for spaces that were created with import mode.
    - name: lastActiveTime
      type: STR
      description: Output only. Timestamp of the last message in the space.
    - name: membershipCount
      type: STR
      description: Output only. The count of joined memberships grouped by member type. Populated when the `space_type` is
        `SPACE`, `DIRECT_MESSAGE` or `GROUP_CHAT`.
    - name: name
      type: STR
      description: 'Identifier. Resource name of the space. Format: `spaces/{space}` Where `{space}` represents the system-assigned
        ID for the space. You can obtain the space ID by calling the [`spaces.list()`](https://developers.google.com/workspace/chat/api/reference/rest/v1/spaces/list)
        method or from the space URL. For example, if the space URL is `https://mail.google.com/mail/u/0/#chat/space/AAAAAAAAA`,
        the space ID is `AAAAAAAAA`.'
    - name: permissionSettings
      type: STR
      description: 'Optional. Space permission settings for existing spaces. Input for updating exact space permission settings,
        where existing permission settings are replaced. Output lists current permission settings. Reading and updating permission
        settings supports: - [App authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-app)
        with [administrator approval](https://support.google.com/a?p=chat-app-auth) with the `chat.app.spaces` scope. Only
        populated and settable when the Chat app created the space. - [User authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)'
    - name: predefinedPermissionSettings
      type: STR
      description: 'Optional. Input only. Predefined space permission settings, input only when creating a space. If the field
        is not set, a collaboration space is created. After you create the space, settings are populated in the `PermissionSettings`
        field. Setting predefined permission settings supports: - [App authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-app)
        with [administrator approval](https://support.google.com/a?p=chat-app-auth) with the `chat.app.spaces` or `chat.app.spaces.create`
        scopes. - [User authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)'
    - name: singleUserBotDm
      type: BOOL
      description: Optional. Whether the space is a DM between a Chat app and a single human.
    - name: spaceDetails
      type: STR
      description: Optional. Details about the space including description and rules.
    - name: spaceHistoryState
      type: STR
      description: Optional. The message history state for messages and threads in this space.
    - name: spaceThreadingState
      type: STR
      description: Output only. The threading state in the Chat space.
    - name: spaceType
      type: STR
      description: Optional. The type of space. Required when creating a space or updating the space type of a space. Output
        only for other usage.
    - name: spaceUri
      type: STR
      description: Output only. The URI for a user to access the space.
    - name: threaded
      type: BOOL
      description: 'Output only. Deprecated: Use `spaceThreadingState` instead. Whether messages are threaded in this space.'
    - name: type
      type: STR
      description: 'Output only. Deprecated: Use `space_type` instead. The type of a space.'
  - name: search
    description: 'Returns a list of spaces in a Google Workspace organization based on an administrator''s search. In the
      request, set `use_admin_access` to `true`. For an example, see [Search for and manage spaces](https://developers.google.com/workspace/chat/search-manage-admin).
      Requires [user authentication with administrator privileges](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user#admin-privileges)
      and one of the following [authorization scopes](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes):
      - `https://www.googleapis.com/auth/chat.admin.spaces.readonly` - `https://www.googleapis.com/auth/chat.admin.spaces`'
    params:
    - name: orderBy
      type: STR
      description: 'Optional. How the list of spaces is ordered. Supported attributes to order by are: - `membership_count.joined_direct_human_user_count`
        — Denotes the count of human users that have directly joined a space. - `last_active_time` — Denotes the time when
        last eligible item is added to any topic of this space. - `create_time` — Denotes the time of the space creation.
        Valid ordering operation values are: - `ASC` for ascending. Default value. - `DESC` for descending. The supported
        syntax are: - `membership_count.joined_direct_human_user_count DESC` - `membership_count.joined_direct_human_user_count
        ASC` - `last_active_time DESC` - `last_active_time ASC` - `create_time DESC` - `create_time ASC`'
    - name: pageSize
      type: INT
      description: The maximum number of spaces to return. The service may return fewer than this value. If unspecified, at
        most 100 spaces are returned. The maximum value is 1000. If you use a value more than 1000, it's automatically changed
        to 1000.
    - name: pageToken
      type: STR
      description: A token, received from the previous search spaces call. Provide this parameter to retrieve the subsequent
        page. When paginating, all other parameters provided should match the call that provided the page token. Passing different
        values to the other parameters might lead to unexpected results.
    - name: query
      type: STR
      description: 'Required. A search query. You can search by using the following parameters: - `create_time` - `customer`
        - `display_name` - `external_user_allowed` - `last_active_time` - `space_history_state` - `space_type` `create_time`
        and `last_active_time` accept a timestamp in [RFC-3339](https://www.rfc-editor.org/rfc/rfc3339) format and the supported
        comparison operators are: `=`, `<`, `>`, `<=`, `>=`. `customer` is required and is used to indicate which customer
        to fetch spaces from. `customers/my_customer` is the only supported value. `display_name` only accepts the `HAS` (`:`)
        operator. The text to match is first tokenized into tokens and each token is prefix-matched case-insensitively and
        independently as a substring anywhere in the space''s `display_name`. For example, `Fun Eve` matches `Fun event` or
        `The evening was fun`, but not `notFun event` or `even`. `external_user_allowed` accepts either `true` or `false`.
        `space_history_state` only accepts values from the [`historyState`] (https://developers.google.com/workspace/chat/api/reference/rest/v1/spaces#Space.HistoryState)
        field of a `space` resource. `space_type` is required and the only valid value is `SPACE`. Across different fields,
        only `AND` operators are supported. A valid example is `space_type = "SPACE" AND display_name:"Hello"` and an invalid
        example is `space_type = "SPACE" OR display_name:"Hello"`. Among the same field, `space_type` doesn''t support `AND`
        or `OR` operators. `display_name`, ''space_history_state'', and ''external_user_allowed'' only support `OR` operators.
        `last_active_time` and `create_time` support both `AND` and `OR` operators. `AND` can only be used to represent an
        interval, such as `last_active_time < "2022-01-01T00:00:00+00:00" AND last_active_time > "2023-01-01T00:00:00+00:00"`.
        The following example queries are valid: ``` customer = "customers/my_customer" AND space_type = "SPACE" customer
        = "customers/my_customer" AND space_type = "SPACE" AND display_name:"Hello World" customer = "customers/my_customer"
        AND space_type = "SPACE" AND (last_active_time < "2020-01-01T00:00:00+00:00" OR last_active_time > "2022-01-01T00:00:00+00:00")
        customer = "customers/my_customer" AND space_type = "SPACE" AND (display_name:"Hello World" OR display_name:"Fun event")
        AND (last_active_time > "2020-01-01T00:00:00+00:00" AND last_active_time < "2022-01-01T00:00:00+00:00") customer =
        "customers/my_customer" AND space_type = "SPACE" AND (create_time > "2019-01-01T00:00:00+00:00" AND create_time <
        "2020-01-01T00:00:00+00:00") AND (external_user_allowed = "true") AND (space_history_state = "HISTORY_ON" OR space_history_state
        = "HISTORY_OFF") ```'
    - name: useAdminAccess
      type: BOOL
      description: When `true`, the method runs using the user's Google Workspace administrator privileges. The calling user
        must be a Google Workspace administrator with the [manage chat and spaces conversations privilege](https://support.google.com/a/answer/13369245).
        Requires either the `chat.admin.spaces.readonly` or `chat.admin.spaces` [OAuth 2.0 scope](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes).
        This method currently only supports admin access, thus only `true` is accepted for this field.
      is_flag: true
    outputs:
    - name: nextPageToken
      type: STR
      description: A token that can be used to retrieve the next page. If this field is empty, there are no subsequent pages.
    - name: spaces
      type: LIST
      description: A page of the requested spaces.
    - name: totalSize
      type: INT
      description: The total number of spaces that match the query, across all pages. If the result is over 10,000 spaces,
        this value is an estimate.
  - name: setup
    description: 'Creates a space and adds specified users to it. The calling user is automatically added to the space, and
      shouldn''t be specified as a membership in the request. For an example, see [Set up a space with initial members](https://developers.google.com/workspace/chat/set-up-spaces).
      To specify the human members to add, add memberships with the appropriate `membership.member.name`. To add a human user,
      use `users/{user}`, where `{user}` can be the email address for the user. For users in the same Workspace organization
      `{user}` can also be the `id` for the person from the People API, or the `id` for the user in the Directory API. For
      example, if the People API Person profile ID for `user@example.com` is `123456789`, you can add the user to the space
      by setting the `membership.member.name` to `users/user@example.com` or `users/123456789`. To specify the Google groups
      to add, add memberships with the appropriate `membership.group_member.name`. To add or invite a Google group, use `groups/{group}`,
      where `{group}` is the `id` for the group from the Cloud Identity Groups API. For example, you can use [Cloud Identity
      Groups lookup API](https://cloud.google.com/identity/docs/reference/rest/v1/groups/lookup) to retrieve the ID `123456789`
      for group email `group@example.com`, then you can add the group to the space by setting the `membership.group_member.name`
      to `groups/123456789`. Group email is not supported, and Google groups can only be added as members in named spaces.
      For a named space or group chat, if the caller blocks, or is blocked by some members, or doesn''t have permission to
      add some members, then those members aren''t added to the created space. To create a direct message (DM) between the
      calling user and another human user, specify exactly one membership to represent the human user. If one user blocks
      the other, the request fails and the DM isn''t created. To create a DM between the calling user and the calling app,
      set `Space.singleUserBotDm` to `true` and don''t specify any memberships. You can only use this method to set up a DM
      with the calling app. To add the calling app as a member of a space or an existing DM between two human users, see [Invite
      or add a user or app to a space](https://developers.google.com/workspace/chat/create-members). If a DM already exists
      between two users, even when one user blocks the other at the time a request is made, then the existing DM is returned.
      Spaces with threaded replies aren''t supported. If you receive the error message `ALREADY_EXISTS` when setting up a
      space, try a different `displayName`. An existing space within the Google Workspace organization might already use this
      display name. Requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)
      with one of the following [authorization scopes](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes):
      - `https://www.googleapis.com/auth/chat.spaces.create` - `https://www.googleapis.com/auth/chat.spaces`'
    outputs:
