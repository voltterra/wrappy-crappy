- name: tasks.tasklists
  description: Operations on the 'tasklists' resource
  commands:
  - name: delete
    description: Deletes the authenticated user's specified task list. If the list contains assigned tasks, both the assigned
      tasks and the original tasks in the assignment surface (Docs, Chat Spaces) are deleted.
    params:
    - name: tasklist
      type: STR
      description: Task list identifier.
      required: true
  - name: get
    description: Returns the authenticated user's specified task list.
    params:
    - name: tasklist
      type: STR
      description: Task list identifier.
      required: true
    outputs:
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: id
      type: STR
      description: Task list identifier.
    - name: kind
      type: STR
      description: Output only. Type of the resource. This is always "tasks#taskList".
    - name: selfLink
      type: STR
      description: Output only. URL pointing to this task list. Used to retrieve, update, or delete this task list.
    - name: title
      type: STR
      description: 'Title of the task list. Maximum length allowed: 1024 characters.'
    - name: updated
      type: STR
      description: Output only. Last modification time of the task list (as a RFC 3339 timestamp).
  - name: insert
    description: Creates a new task list and adds it to the authenticated user's task lists. A user can have up to 2000 lists
      at a time.
    outputs:
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: id
      type: STR
      description: Task list identifier.
    - name: kind
      type: STR
      description: Output only. Type of the resource. This is always "tasks#taskList".
    - name: selfLink
      type: STR
      description: Output only. URL pointing to this task list. Used to retrieve, update, or delete this task list.
    - name: title
      type: STR
      description: 'Title of the task list. Maximum length allowed: 1024 characters.'
    - name: updated
      type: STR
      description: Output only. Last modification time of the task list (as a RFC 3339 timestamp).
  - name: list
    description: Returns all the authenticated user's task lists. A user can have up to 2000 lists at a time.
    params:
    - name: maxResults
      type: INT
      description: 'Maximum number of task lists returned on one page. Optional. The default is 1000 (max allowed: 1000).'
    - name: pageToken
      type: STR
      description: Token specifying the result page to return. Optional.
    outputs:
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: items
      type: LIST
      description: Collection of task lists.
    - name: kind
      type: STR
      description: Type of the resource. This is always "tasks#taskLists".
    - name: nextPageToken
      type: STR
      description: Token that can be used to request the next page of this result.
  - name: patch
    description: Updates the authenticated user's specified task list. This method supports patch semantics.
    params:
    - name: tasklist
      type: STR
      description: Task list identifier.
      required: true
    outputs:
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: id
      type: STR
      description: Task list identifier.
    - name: kind
      type: STR
      description: Output only. Type of the resource. This is always "tasks#taskList".
    - name: selfLink
      type: STR
      description: Output only. URL pointing to this task list. Used to retrieve, update, or delete this task list.
    - name: title
      type: STR
      description: 'Title of the task list. Maximum length allowed: 1024 characters.'
    - name: updated
      type: STR
      description: Output only. Last modification time of the task list (as a RFC 3339 timestamp).
