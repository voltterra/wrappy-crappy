- name: tasks.tasks
  description: Operations on the 'tasks' resource
  commands:
  - name: clear
    description: Clears all completed tasks from the specified task list. The affected tasks will be marked as 'hidden' and
      no longer be returned by default when retrieving all tasks for a task list.
    params:
    - name: tasklist
      type: STR
      description: Task list identifier.
      required: true
  - name: delete
    description: Deletes the specified task from the task list. If the task is assigned, both the assigned task and the original
      task (in Docs, Chat Spaces) are deleted. To delete the assigned task only, navigate to the assignment surface and unassign
      the task from there.
    params:
    - name: task
      type: STR
      description: Task identifier.
      required: true
    - name: tasklist
      type: STR
      description: Task list identifier.
      required: true
  - name: get
    description: Returns the specified task.
    params:
    - name: task
      type: STR
      description: Task identifier.
      required: true
    - name: tasklist
      type: STR
      description: Task list identifier.
      required: true
    outputs:
    - name: assignmentInfo
      type: STR
      description: Output only. Context information for assigned tasks. A task can be assigned to a user, currently possible
        from surfaces like Docs and Chat Spaces. This field is populated for tasks assigned to the current user and identifies
        where the task was assigned from. This field is read-only.
    - name: completed
      type: STR
      description: Completion date of the task (as a RFC 3339 timestamp). This field is omitted if the task has not been completed.
    - name: deleted
      type: BOOL
      description: Flag indicating whether the task has been deleted. For assigned tasks this field is read-only. They can
        only be deleted by calling tasks.delete, in which case both the assigned task and the original task (in Docs or Chat
        Spaces) are deleted. To delete the assigned task only, navigate to the assignment surface and unassign the task from
        there. The default is False.
    - name: due
      type: STR
      description: Scheduled date for the task (as an RFC 3339 timestamp). Optional. This represents the day that the task
        should be done, or that the task is visible on the calendar grid. It doesn't represent the deadline of the task. Only
        date information is recorded; the time portion of the timestamp is discarded when setting this field. It isn't possible
        to read or write the time that a task is scheduled for using the API.
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: hidden
      type: BOOL
      description: Flag indicating whether the task is hidden. This is the case if the task had been marked completed when
        the task list was last cleared. The default is False. This field is read-only.
    - name: id
      type: STR
      description: Task identifier.
    - name: kind
      type: STR
      description: Output only. Type of the resource. This is always "tasks#task".
    - name: links
      type: LIST
      description: Output only. Collection of links. This collection is read-only.
    - name: notes
      type: STR
      description: 'Notes describing the task. Tasks assigned from Google Docs cannot have notes. Optional. Maximum length
        allowed: 8192 characters.'
    - name: parent
      type: STR
      description: Output only. Parent task identifier. This field is omitted if it is a top-level task. Use the "move" method
        to move the task under a different parent or to the top level. A parent task can never be an assigned task (from Chat
        Spaces, Docs). This field is read-only.
    - name: position
      type: STR
      description: Output only. String indicating the position of the task among its sibling tasks under the same parent task
        or at the top level. If this string is greater than another task's corresponding position string according to lexicographical
        ordering, the task is positioned after the other task under the same parent task (or at the top level). Use the "move"
        method to move the task to another position.
    - name: selfLink
      type: STR
      description: Output only. URL pointing to this task. Used to retrieve, update, or delete this task.
    - name: status
      type: STR
      description: Status of the task. This is either "needsAction" or "completed".
    - name: title
      type: STR
      description: 'Title of the task. Maximum length allowed: 1024 characters.'
    - name: updated
      type: STR
      description: Output only. Last modification time of the task (as a RFC 3339 timestamp).
    - name: webViewLink
      type: STR
      description: Output only. An absolute link to the task in the Google Tasks Web UI.
  - name: insert
    description: Creates a new task on the specified task list. Tasks assigned from Docs or Chat Spaces cannot be inserted
      from Tasks Public API; they can only be created by assigning them from Docs or Chat Spaces. A user can have up to 20,000
      non-hidden tasks per list and up to 100,000 tasks in total at a time.
    params:
    - name: parent
      type: STR
      description: Parent task identifier. If the task is created at the top level, this parameter is omitted. An assigned
        task cannot be a parent task, nor can it have a parent. Setting the parent to an assigned task results in failure
        of the request. Optional.
    - name: previous
      type: STR
      description: Previous sibling task identifier. If the task is created at the first position among its siblings, this
        parameter is omitted. Optional.
    - name: tasklist
      type: STR
      description: Task list identifier.
      required: true
    outputs:
    - name: assignmentInfo
      type: STR
      description: Output only. Context information for assigned tasks. A task can be assigned to a user, currently possible
        from surfaces like Docs and Chat Spaces. This field is populated for tasks assigned to the current user and identifies
        where the task was assigned from. This field is read-only.
    - name: completed
      type: STR
      description: Completion date of the task (as a RFC 3339 timestamp). This field is omitted if the task has not been completed.
    - name: deleted
      type: BOOL
      description: Flag indicating whether the task has been deleted. For assigned tasks this field is read-only. They can
        only be deleted by calling tasks.delete, in which case both the assigned task and the original task (in Docs or Chat
        Spaces) are deleted. To delete the assigned task only, navigate to the assignment surface and unassign the task from
        there. The default is False.
    - name: due
      type: STR
      description: Scheduled date for the task (as an RFC 3339 timestamp). Optional. This represents the day that the task
        should be done, or that the task is visible on the calendar grid. It doesn't represent the deadline of the task. Only
        date information is recorded; the time portion of the timestamp is discarded when setting this field. It isn't possible
        to read or write the time that a task is scheduled for using the API.
    - name: etag
      type: STR
      description: ETag of the resource.
    - name: hidden
      type: BOOL
      description: Flag indicating whether the task is hidden. This is the case if the task had been marked completed when
        the task list was last cleared. The default is False. This field is read-only.
    - name: id
      type: STR
      description: Task identifier.
    - name: kind
      type: STR
      description: Output only. Type of the resource. This is always "tasks#task".
    - name: links
      type: LIST
      description: Output only. Collection of links. This collection is read-only.
    - name: notes
      type: STR
      description: 'Notes describing the task. Tasks assigned from Google Docs cannot have notes. Optional. Maximum length
        allowed: 8192 characters.'
    - name: parent
      type: STR
      description: Output only. Parent task identifier. This field is omitted if it is a top-level task. Use the "move" method
        to move the task under a different parent or to the top level. A parent task can never be an assigned task (from Chat
        Spaces, Docs). This field is read-only.
    - name: position
      type: STR
      description: Output only. String indicating the position of the task among its sibling tasks under the same parent task
        or at the top level. If this string is greater than another task's corresponding position string according to lexicographical
        ordering, the task is positioned after the other task under the same parent task (or at the top level). Use the "move"
        method to move the task to another position.
    - name: selfLink
      type: STR
      description: Output only. URL pointing to this task. Used to retrieve, update, or delete this task.
    - name: status
      type: STR
      description: Status of the task. This is either "needsAction" or "completed".
    - name: title
      type: STR
      description: 'Title of the task. Maximum length allowed: 1024 characters.'
    - name: updated
      type: STR
      description: Output only. Last modification time of the task (as a RFC 3339 timestamp).
    - name: webViewLink
      type: STR
      description: Output only. An absolute link to the task in the Google Tasks Web UI.
  - name: list
    description: Returns all tasks in the specified task list. Doesn't return assigned tasks by default (from Docs, Chat Spaces).
      A user can have up to 20,000 non-hidden tasks per list and up to 100,000 tasks in total at a time.
    params:
    - name: completedMax
      type: STR
      description: Upper bound for a task's completion date (as a RFC 3339 timestamp) to filter by. Optional. The default
        is not to filter by completion date.
    - name: completedMin
      type: STR
      description: Lower bound for a task's completion date (as a RFC 3339 timestamp) to filter by. Optional. The default
        is not to filter by completion date.
    - name: dueMax
      type: STR
      description: Upper bound for a task's due date (as a RFC 3339 timestamp) to filter by. Optional. The default is not
        to filter by due date.
    - name: dueMin
      type: STR
      description: Lower bound for a task's due date (as a RFC 3339 timestamp) to filter by. Optional. The default is not
        to filter by due date.
    - name: maxResults
      type: INT
      description: 'Maximum number of tasks returned on one page. Optional. The default is 20 (max allowed: 100).'
    - name: pageToken
      type: STR
      description: Token specifying the result page to return. Optional.
    - name: showAssigned
