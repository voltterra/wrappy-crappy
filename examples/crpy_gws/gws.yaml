name: gws
version: 0.1.0
description: gws — Google Workspace CLI
groups:
- name: drive.about
  description: Operations on the 'about' resource
  commands:
  - name: get
    description: 'Gets information about the user, the user''s Drive, and system capabilities. For more information, see [Return
      user info](https://developers.google.com/workspace/drive/api/guides/user-info). Required: The `fields` parameter must
      be set. To return the exact fields you need, see [Return specific fields](https://developers.google.com/workspace/drive/api/guides/fields-parameter).'
    outputs:
    - name: appInstalled
      type: BOOL
      description: Whether the user has installed the requesting app.
    - name: canCreateDrives
      type: BOOL
      description: Whether the user can create shared drives.
    - name: canCreateTeamDrives
      type: BOOL
      description: 'Deprecated: Use `canCreateDrives` instead.'
    - name: driveThemes
      type: LIST
      description: A list of themes that are supported for shared drives.
    - name: exportFormats
      type: STR
      description: A map of source MIME type to possible targets for all supported exports.
    - name: folderColorPalette
      type: LIST
      description: The currently supported folder colors as RGB hex strings.
    - name: importFormats
      type: STR
      description: A map of source MIME type to possible targets for all supported imports.
    - name: kind
      type: STR
      description: 'Identifies what kind of resource this is. Value: the fixed string `"drive#about"`.'
    - name: maxImportSizes
      type: STR
      description: A map of maximum import sizes by MIME type, in bytes.
    - name: maxUploadSize
      type: STR
      description: The maximum upload size in bytes.
    - name: storageQuota
      type: STR
      description: The user's storage quota limits and usage. For users that are part of an organization with pooled storage,
        information about the limit and usage across all services is for the organization, rather than the individual user.
        All fields are measured in bytes.
    - name: teamDriveThemes
      type: LIST
      description: 'Deprecated: Use `driveThemes` instead.'
    - name: user
      type: STR
      description: The authenticated user.
- name: drive.accessproposals
  description: Operations on the 'accessproposals' resource
  commands:
  - name: get
    description: Retrieves an access proposal by ID. For more information, see [Manage pending access proposals](https://developers.google.com/workspace/drive/api/guides/pending-access).
    params:
    - name: fileId
      type: STR
      description: Required. The ID of the item the request is on.
      required: true
    - name: proposalId
      type: STR
      description: Required. The ID of the access proposal to resolve.
      required: true
    outputs:
    - name: createTime
      type: STR
      description: The creation time.
    - name: fileId
      type: STR
      description: The file ID that the proposal for access is on.
    - name: proposalId
      type: STR
      description: The ID of the access proposal.
    - name: recipientEmailAddress
      type: STR
      description: The email address of the user that will receive permissions, if accepted.
    - name: requestMessage
      type: STR
      description: The message that the requester added to the proposal.
    - name: requesterEmailAddress
      type: STR
      description: The email address of the requesting user.
    - name: rolesAndViews
      type: LIST
      description: A wrapper for the role and view of an access proposal. For more information, see [Roles and permissions](https://developers.google.com/workspace/drive/api/guides/ref-roles).
  - name: list
    description: 'List the access proposals on a file. For more information, see [Manage pending access proposals](https://developers.google.com/workspace/drive/api/guides/pending-access).
      Note: Only approvers are able to list access proposals on a file. If the user isn''t an approver, a 403 error is returned.'
    params:
    - name: fileId
      type: STR
      description: Required. The ID of the item the request is on.
      required: true
    - name: pageSize
      type: INT
      description: Optional. The number of results per page.
    - name: pageToken
      type: STR
      description: Optional. The continuation token on the list of access requests.
    outputs:
    - name: accessProposals
      type: LIST
      description: The list of access proposals. This field is only populated in Drive API v3.
    - name: nextPageToken
      type: STR
      description: The continuation token for the next page of results. This will be absent if the end of the results list
        has been reached. If the token is rejected for any reason, it should be discarded, and pagination should be restarted
        from the first page of results.
  - name: resolve
    description: Approves or denies an access proposal. For more information, see [Manage pending access proposals](https://developers.google.com/workspace/drive/api/guides/pending-access).
    params:
    - name: fileId
      type: STR
      description: Required. The ID of the item the request is on.
      required: true
    - name: proposalId
      type: STR
      description: Required. The ID of the access proposal to resolve.
      required: true
- name: drive.approvals
  description: Operations on the 'approvals' resource
  commands:
  - name: get
    description: Gets an Approval by ID.
    params:
    - name: approvalId
      type: STR
      description: Required. The ID of the Approval.
      required: true
    - name: fileId
      type: STR
      description: Required. The ID of the file the Approval is on.
      required: true
    outputs:
    - name: approvalId
      type: STR
      description: The Approval ID.
    - name: completeTime
      type: STR
      description: Output only. The time the approval was completed.
    - name: createTime
      type: STR
      description: Output only. The time the approval was created.
    - name: dueTime
      type: STR
      description: The time that the approval is due.
    - name: initiator
      type: STR
      description: The user that requested the Approval.
    - name: kind
      type: STR
      description: This is always drive#approval.
    - name: modifyTime
      type: STR
      description: Output only. The most recent time the approval was modified.
    - name: reviewerResponses
      type: LIST
      description: The responses made on the Approval by reviewers.
    - name: status
      type: STR
      description: Output only. The status of the approval at the time this resource was requested.
    - name: targetFileId
      type: STR
      description: Target file id of the approval.
  - name: list
    description: Lists the Approvals on a file.
    params:
    - name: fileId
      type: STR
      description: Required. The ID of the file the Approval is on.
      required: true
    - name: pageSize
      type: INT
      description: The maximum number of Approvals to return. When not set, at most 100 Approvals will be returned.
    - name: pageToken
      type: STR
      description: The token for continuing a previous list request on the next page. This should be set to the value of nextPageToken
        from a previous response.
    outputs:
    - name: items
      type: LIST
      description: The list of Approvals. If nextPageToken is populated, then this list may be incomplete and an additional
        page of results should be fetched.
    - name: kind
      type: STR
      description: This is always drive#approvalList
    - name: nextPageToken
      type: STR
      description: The page token for the next page of Approvals. This will be absent if the end of the Approvals list has
        been reached. If the token is rejected for any reason, it should be discarded, and pagination should be restarted
        from the first page of results.
- name: drive.apps
  description: Operations on the 'apps' resource
  commands:
  - name: get
    description: Gets a specific app. For more information, see [Return user info](https://developers.google.com/workspace/drive/api/guides/user-info).
    params:
    - name: appId
      type: STR
      description: The ID of the app.
      required: true
    outputs:
    - name: authorized
      type: BOOL
      description: Whether the app is authorized to access data on the user's Drive.
    - name: createInFolderTemplate
      type: STR
      description: The template URL to create a file with this app in a given folder. The template contains the {folderId}
        to be replaced by the folder ID house the new file.
    - name: createUrl
      type: STR
      description: The URL to create a file with this app.
    - name: hasDriveWideScope
      type: BOOL
      description: Whether the app has Drive-wide scope. An app with Drive-wide scope can access all files in the user's Drive.
    - name: icons
      type: LIST
      description: The various icons for the app.
    - name: id
      type: STR
      description: The ID of the app.
    - name: installed
      type: BOOL
      description: Whether the app is installed.
    - name: kind
      type: STR
      description: 'Output only. Identifies what kind of resource this is. Value: the fixed string "drive#app".'
    - name: longDescription
      type: STR
      description: A long description of the app.
    - name: name
      type: STR
      description: The name of the app.
    - name: objectType
      type: STR
      description: The type of object this app creates such as a Chart. If empty, the app name should be used instead.
    - name: openUrlTemplate
      type: STR
      description: The template URL for opening files with this app. The template contains {ids} or {exportIds} to be replaced
        by the actual file IDs. For more information, see Open Files for the full documentation.
    - name: primaryFileExtensions
      type: LIST
      description: The list of primary file extensions.
    - name: primaryMimeTypes
      type: LIST
      description: The list of primary MIME types.
    - name: productId
      type: STR
      description: The ID of the product listing for this app.
    - name: productUrl
      type: STR
      description: A link to the product listing for this app.
    - name: secondaryFileExtensions
      type: LIST
      description: The list of secondary file extensions.
    - name: secondaryMimeTypes
      type: LIST
      description: The list of secondary MIME types.
    - name: shortDescription
      type: STR
      description: A short description of the app.
    - name: supportsCreate
      type: BOOL
      description: Whether this app supports creating objects.
    - name: supportsImport
      type: BOOL
      description: Whether this app supports importing from Google Docs.
    - name: supportsMultiOpen
      type: BOOL
      description: Whether this app supports opening more than one file.
    - name: supportsOfflineCreate
      type: BOOL
      description: Whether this app supports creating files when offline.
    - name: useByDefault
      type: BOOL
      description: Whether the app is selected as the default handler for the types it supports.
  - name: list
    description: Lists a user's installed apps. For more information, see [Return user info](https://developers.google.com/workspace/drive/api/guides/user-info).
    params:
    - name: appFilterExtensions
      type: STR
      description: A comma-separated list of file extensions to limit returned results. All results within the given app query
        scope which can open any of the given file extensions are included in the response. If `appFilterMimeTypes` are provided
        as well, the result is a union of the two resulting app lists.
      default: ''
    - name: appFilterMimeTypes
      type: STR
      description: A comma-separated list of file extensions to limit returned results. All results within the given app query
        scope which can open any of the given MIME types will be included in the response. If `appFilterExtensions` are provided
        as well, the result is a union of the two resulting app lists.
      default: ''
    - name: languageCode
      type: STR
      description: A language or locale code, as defined by BCP 47, with some extensions from Unicode's LDML format (http://www.unicode.org/reports/tr35/).
    outputs:
    - name: defaultAppIds
      type: LIST
      description: The list of app IDs that the user has specified to use by default. The list is in reverse-priority order
        (lowest to highest).
    - name: items
      type: LIST
      description: The list of apps.
    - name: kind
      type: STR
      description: 'Output only. Identifies what kind of resource this is. Value: the fixed string "drive#appList".'
    - name: selfLink
      type: STR
      description: A link back to this list.
- name: drive.changes
  description: Operations on the 'changes' resource
  commands:
  - name: getStartPageToken
    description: Gets the starting pageToken for listing future changes. For more information, see [Retrieve changes](https://developers.google.com/workspace/drive/api/guides/manage-changes).
    params:
    - name: driveId
      type: STR
      description: The ID of the shared drive for which the starting pageToken for listing future changes from that shared
        drive will be returned.
    - name: supportsAllDrives
      type: BOOL
      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
      is_flag: true
    - name: supportsTeamDrives
      type: BOOL
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
      is_flag: true
    - name: teamDriveId
      type: STR
      description: 'Deprecated: Use `driveId` instead.'
    outputs:
    - name: kind
      type: STR
      description: 'Identifies what kind of resource this is. Value: the fixed string `"drive#startPageToken"`.'
    - name: startPageToken
      type: STR
      description: The starting page token for listing future changes. The page token doesn't expire.
  - name: list
    description: Lists the changes for a user or shared drive. For more information, see [Retrieve changes](https://developers.google.com/workspace/drive/api/guides/manage-changes).
    params:
    - name: driveId
      type: STR
      description: The shared drive from which changes will be returned. If specified the change IDs will be reflective of
        the shared drive; use the combined drive ID and change ID as an identifier.
    - name: includeCorpusRemovals
      type: BOOL
      description: Whether changes should include the file resource if the file is still accessible by the user at the time
        of the request, even when a file was removed from the list of changes and there will be no further change entries
        for this file.
      default: 'false'
      is_flag: true
    - name: includeItemsFromAllDrives
      type: BOOL
      description: Whether both My Drive and shared drive items should be included in results.
      default: 'false'
      is_flag: true
    - name: includeLabels
      type: STR
      description: A comma-separated list of IDs of labels to include in the `labelInfo` part of the response.
    - name: includePermissionsForView
      type: STR
      description: Specifies which additional view's permissions to include in the response. Only 'published' is supported.
    - name: includeRemoved
      type: BOOL
      description: Whether to include changes indicating that items have been removed from the list of changes, for example
        by deletion or loss of access.
      default: 'true'
      is_flag: true
    - name: includeTeamDriveItems
      type: BOOL
      description: 'Deprecated: Use `includeItemsFromAllDrives` instead.'
      default: 'false'
      is_flag: true
    - name: pageSize
      type: INT
      description: The maximum number of changes to return per page.
      default: '100'
    - name: pageToken
      type: STR
      description: The token for continuing a previous list request on the next page. This should be set to the value of 'nextPageToken'
        from the previous response or to the response from the getStartPageToken method.
      required: true
    - name: restrictToMyDrive
      type: BOOL
      description: Whether to restrict the results to changes inside the My Drive hierarchy. This omits changes to files such
        as those in the Application Data folder or shared files which have not been added to My Drive.
      default: 'false'
      is_flag: true
    - name: spaces
      type: STR
      description: A comma-separated list of spaces to query within the corpora. Supported values are 'drive' and 'appDataFolder'.
      default: drive
    - name: supportsAllDrives
      type: BOOL
      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
      is_flag: true
    - name: supportsTeamDrives
      type: BOOL
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
      is_flag: true
    - name: teamDriveId
      type: STR
      description: 'Deprecated: Use `driveId` instead.'
    outputs:
    - name: changes
      type: LIST
      description: The list of changes. If nextPageToken is populated, then this list may be incomplete and an additional
        page of results should be fetched.
    - name: kind
      type: STR
      description: 'Identifies what kind of resource this is. Value: the fixed string `"drive#changeList"`.'
    - name: newStartPageToken
      type: STR
      description: The starting page token for future changes. This will be present only if the end of the current changes
        list has been reached. The page token doesn't expire.
    - name: nextPageToken
      type: STR
      description: The page token for the next page of changes. This will be absent if the end of the changes list has been
        reached. The page token doesn't expire.
  - name: watch
    description: Subscribes to changes for a user. For more information, see [Notifications for resource changes](https://developers.google.com/workspace/drive/api/guides/push).
    params:
    - name: driveId
      type: STR
      description: The shared drive from which changes will be returned. If specified the change IDs will be reflective of
        the shared drive; use the combined drive ID and change ID as an identifier.
    - name: includeCorpusRemovals
      type: BOOL
      description: Whether changes should include the file resource if the file is still accessible by the user at the time
        of the request, even when a file was removed from the list of changes and there will be no further change entries
        for this file.
      default: 'false'
      is_flag: true
    - name: includeItemsFromAllDrives
      type: BOOL
      description: Whether both My Drive and shared drive items should be included in results.
      default: 'false'
      is_flag: true
    - name: includeLabels
      type: STR
      description: A comma-separated list of IDs of labels to include in the `labelInfo` part of the response.
    - name: includePermissionsForView
      type: STR
      description: Specifies which additional view's permissions to include in the response. Only 'published' is supported.
    - name: includeRemoved
      type: BOOL
      description: Whether to include changes indicating that items have been removed from the list of changes, for example
        by deletion or loss of access.
      default: 'true'
      is_flag: true
    - name: includeTeamDriveItems
      type: BOOL
      description: 'Deprecated: Use `includeItemsFromAllDrives` instead.'
      default: 'false'
      is_flag: true
    - name: pageSize
      type: INT
      description: The maximum number of changes to return per page.
      default: '100'
    - name: pageToken
      type: STR
      description: The token for continuing a previous list request on the next page. This should be set to the value of 'nextPageToken'
        from the previous response or to the response from the getStartPageToken method.
      required: true
    - name: restrictToMyDrive
      type: BOOL
      description: Whether to restrict the results to changes inside the My Drive hierarchy. This omits changes to files such
        as those in the Application Data folder or shared files which have not been added to My Drive.
      default: 'false'
      is_flag: true
    - name: spaces
      type: STR
      description: A comma-separated list of spaces to query within the corpora. Supported values are 'drive' and 'appDataFolder'.
      default: drive
    - name: supportsAllDrives
      type: BOOL
      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
      is_flag: true
    - name: supportsTeamDrives
      type: BOOL
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
      is_flag: true
    - name: teamDriveId
      type: STR
      description: 'Deprecated: Use `driveId` instead.'
    outputs:
    - name: address
      type: STR
      description: The address where notifications are delivered for this channel.
    - name: expiration
      type: STR
      description: Date and time of notification channel expiration, expressed as a Unix timestamp, in milliseconds. Optional.
    - name: id
      type: STR
      description: A UUID or similar unique string that identifies this channel.
    - name: kind
      type: STR
      description: Identifies this as a notification channel used to watch for changes to a resource, which is `api#channel`.
    - name: params
      type: STR
      description: Additional parameters controlling delivery channel behavior. Optional.
    - name: payload
      type: BOOL
      description: A Boolean value to indicate whether payload is wanted. Optional.
    - name: resourceId
      type: STR
      description: An opaque ID that identifies the resource being watched on this channel. Stable across different API versions.
    - name: resourceUri
      type: STR
      description: A version-specific identifier for the watched resource.
    - name: token
      type: STR
      description: An arbitrary string delivered to the target address with each notification delivered over this channel.
        Optional.
    - name: type
      type: STR
      description: The type of delivery mechanism used for this channel. Valid values are "web_hook" or "webhook".
- name: drive.channels
  description: Operations on the 'channels' resource
  commands:
  - name: stop
    description: Stops watching resources through this channel. For more information, see [Notifications for resource changes](https://developers.google.com/workspace/drive/api/guides/push).
- name: drive.comments
  description: Operations on the 'comments' resource
  commands:
  - name: create
    description: 'Creates a comment on a file. For more information, see [Manage comments and replies](https://developers.google.com/workspace/drive/api/guides/manage-comments).
      Required: The `fields` parameter must be set. To return the exact fields you need, see [Return specific fields](https://developers.google.com/workspace/drive/api/guides/fields-parameter).'
    params:
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
    outputs:
    - name: anchor
      type: STR
      description: A region of the document represented as a JSON string. For details on defining anchor properties, refer
        to [Manage comments and replies](https://developers.google.com/workspace/drive/api/v3/manage-comments).
    - name: assigneeEmailAddress
      type: STR
      description: Output only. The email address of the user assigned to this comment. If no user is assigned, the field
        is unset.
    - name: author
      type: STR
      description: Output only. The author of the comment. The author's email address and permission ID will not be populated.
    - name: content
      type: STR
      description: The plain text content of the comment. This field is used for setting the content, while `htmlContent`
        should be displayed.
    - name: createdTime
      type: STR
      description: The time at which the comment was created (RFC 3339 date-time).
    - name: deleted
      type: BOOL
      description: Output only. Whether the comment has been deleted. A deleted comment has no content.
    - name: htmlContent
      type: STR
      description: Output only. The content of the comment with HTML formatting.
    - name: id
      type: STR
      description: Output only. The ID of the comment.
    - name: kind
      type: STR
      description: 'Output only. Identifies what kind of resource this is. Value: the fixed string `"drive#comment"`.'
    - name: mentionedEmailAddresses
      type: LIST
      description: Output only. A list of email addresses for users mentioned in this comment. If no users are mentioned,
        the list is empty.
    - name: modifiedTime
      type: STR
      description: The last time the comment or any of its replies was modified (RFC 3339 date-time).
    - name: quotedFileContent
      type: STR
      description: The file content to which the comment refers, typically within the anchor region. For a text file, for
        example, this would be the text at the location of the comment.
    - name: replies
      type: LIST
      description: Output only. The full list of replies to the comment in chronological order.
    - name: resolved
      type: BOOL
      description: Output only. Whether the comment has been resolved by one of its replies.
  - name: delete
    description: Deletes a comment. For more information, see [Manage comments and replies](https://developers.google.com/workspace/drive/api/guides/manage-comments).
    params:
    - name: commentId
      type: STR
      description: The ID of the comment.
      required: true
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
  - name: get
    description: 'Gets a comment by ID. For more information, see [Manage comments and replies](https://developers.google.com/workspace/drive/api/guides/manage-comments).
      Required: The `fields` parameter must be set. To return the exact fields you need, see [Return specific fields](https://developers.google.com/workspace/drive/api/guides/fields-parameter).'
    params:
    - name: commentId
      type: STR
      description: The ID of the comment.
      required: true
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
    - name: includeDeleted
      type: BOOL
      description: Whether to return deleted comments. Deleted comments will not include their original content.
      default: 'false'
      is_flag: true
    outputs:
    - name: anchor
      type: STR
      description: A region of the document represented as a JSON string. For details on defining anchor properties, refer
        to [Manage comments and replies](https://developers.google.com/workspace/drive/api/v3/manage-comments).
    - name: assigneeEmailAddress
      type: STR
      description: Output only. The email address of the user assigned to this comment. If no user is assigned, the field
        is unset.
    - name: author
      type: STR
      description: Output only. The author of the comment. The author's email address and permission ID will not be populated.
    - name: content
      type: STR
      description: The plain text content of the comment. This field is used for setting the content, while `htmlContent`
        should be displayed.
    - name: createdTime
      type: STR
      description: The time at which the comment was created (RFC 3339 date-time).
    - name: deleted
      type: BOOL
      description: Output only. Whether the comment has been deleted. A deleted comment has no content.
    - name: htmlContent
      type: STR
      description: Output only. The content of the comment with HTML formatting.
    - name: id
      type: STR
      description: Output only. The ID of the comment.
    - name: kind
      type: STR
      description: 'Output only. Identifies what kind of resource this is. Value: the fixed string `"drive#comment"`.'
    - name: mentionedEmailAddresses
      type: LIST
      description: Output only. A list of email addresses for users mentioned in this comment. If no users are mentioned,
        the list is empty.
    - name: modifiedTime
      type: STR
      description: The last time the comment or any of its replies was modified (RFC 3339 date-time).
    - name: quotedFileContent
      type: STR
      description: The file content to which the comment refers, typically within the anchor region. For a text file, for
        example, this would be the text at the location of the comment.
    - name: replies
      type: LIST
      description: Output only. The full list of replies to the comment in chronological order.
    - name: resolved
      type: BOOL
      description: Output only. Whether the comment has been resolved by one of its replies.
  - name: list
    description: 'Lists a file''s comments. For more information, see [Manage comments and replies](https://developers.google.com/workspace/drive/api/guides/manage-comments).
      Required: The `fields` parameter must be set. To return the exact fields you need, see [Return specific fields](https://developers.google.com/workspace/drive/api/guides/fields-parameter).'
    params:
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
    - name: includeDeleted
      type: BOOL
      description: Whether to include deleted comments. Deleted comments will not include their original content.
      default: 'false'
      is_flag: true
    - name: pageSize
      type: INT
      description: The maximum number of comments to return per page.
      default: '20'
    - name: pageToken
      type: STR
      description: The token for continuing a previous list request on the next page. This should be set to the value of 'nextPageToken'
        from the previous response.
    - name: startModifiedTime
      type: STR
      description: The minimum value of 'modifiedTime' for the result comments (RFC 3339 date-time).
    outputs:
    - name: comments
      type: LIST
      description: The list of comments. If nextPageToken is populated, then this list may be incomplete and an additional
        page of results should be fetched.
    - name: kind
      type: STR
      description: 'Identifies what kind of resource this is. Value: the fixed string `"drive#commentList"`.'
    - name: nextPageToken
      type: STR
      description: The page token for the next page of comments. This will be absent if the end of the comments list has been
        reached. If the token is rejected for any reason, it should be discarded, and pagination should be restarted from
        the first page of results. The page token is typically valid for several hours. However, if new items are added or
        removed, your expected results might differ.
  - name: update
    description: 'Updates a comment with patch semantics. For more information, see [Manage comments and replies](https://developers.google.com/workspace/drive/api/guides/manage-comments).
      Required: The `fields` parameter must be set. To return the exact fields you need, see [Return specific fields](https://developers.google.com/workspace/drive/api/guides/fields-parameter).'
