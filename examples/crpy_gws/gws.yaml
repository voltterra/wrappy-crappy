  - name: list
    description: Lists notes. Every list call returns a page of results with `page_size` as the upper bound of returned items.
      A `page_size` of zero allows the server to choose the upper bound. The ListNotesResponse contains at most `page_size`
      entries. If there are more things left to list, it provides a `next_page_token` value. (Page tokens are opaque values.)
      To get the next page of results, copy the result's `next_page_token` into the next request's `page_token`. Repeat until
      the `next_page_token` returned with a page of results is empty. ListNotes return consistent results in the face of concurrent
      changes, or signals that it cannot with an ABORTED error.
    params:
    - name: filter
      type: STR
