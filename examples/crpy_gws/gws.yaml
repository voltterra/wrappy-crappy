  - name: get
    description: 'Returns the spreadsheet at the given ID. The caller must specify the spreadsheet ID. By default, data within
      grids is not returned. You can include grid data in one of 2 ways: * Specify a [field mask](https://developers.google.com/workspace/sheets/api/guides/field-masks)
      listing your desired fields using the `fields` URL parameter in HTTP * Set the includeGridData URL parameter to true.
      If a field mask is set, the `includeGridData` parameter is ignored For large spreadsheets, as a best practice, retrieve
      only the specific spreadsheet fields that you want. To retrieve only subsets of spreadsheet data, use the ranges URL
      parameter. Ranges are specified using [A1 notation](https://developers.google.com/workspace/sheets/api/guides/concepts#cell).
