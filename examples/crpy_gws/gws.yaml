      type: STR
      description: Output only. The thumbnail version for use in thumbnail cache invalidation.
    - name: trashed
      type: BOOL
      description: Whether the file has been trashed, either explicitly or from a trashed parent folder. Only the owner may
        trash a file, and other users cannot see files in the owner's trash.
    - name: trashedTime
      type: STR
      description: The time that the item was trashed (RFC 3339 date-time). Only populated for items in shared drives.
    - name: trashingUser
      type: STR
      description: Output only. If the file has been explicitly trashed, the user who trashed it. Only populated for items
        in shared drives.
