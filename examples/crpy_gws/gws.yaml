  - name: updateGradingPeriodSettings
    description: 'Updates grading period settings of a course. Individual grading periods can be added, removed, or modified
      using this method. The requesting user and course owner must be eligible to modify Grading Periods. For details, see
      [licensing requirements](https://developers.google.com/workspace/classroom/grading-periods/manage-grading-periods#licensing_requirements).
      This method returns the following error codes: * `PERMISSION_DENIED` if the requesting user is not permitted to modify
      the grading period settings in a course or for access errors: * UserIneligibleToUpdateGradingPeriodSettings * `INVALID_ARGUMENT`
      if the request is malformed. * `NOT_FOUND` if the requested course does not exist.'
    params:
    - name: courseId
      type: STR
      description: Required. The identifier of the course.
      required: true
    - name: updateMask
      type: STR
      description: 'Mask that identifies which fields in the GradingPeriodSettings to update. The GradingPeriodSettings `grading_periods`
        list will be fully replaced by the grading periods specified in the update request. For example: * Grading periods
        included in the list without an ID are considered additions, and a new ID will be assigned when the request is made.
        * Grading periods that currently exist, but are missing from the request will be considered deletions. * Grading periods
        with an existing ID and modified data are considered edits. Unmodified data will be left as is. * Grading periods
        included with an unknown ID will result in an error. The following fields may be specified: * `grading_periods` *
        `apply_to_existing_coursework`'
    outputs:
    - name: applyToExistingCoursework
      type: BOOL
      description: Supports toggling the application of grading periods on existing stream items. Once set, this value is
        persisted meaning that it does not need to be set in every request to update `GradingPeriodSettings`. If not previously
        set, the default is False.
    - name: gradingPeriods
      type: LIST
      description: The list of grading periods in a specific course. Grading periods must not have overlapping date ranges
        and must be listed in chronological order. Each grading period must have a unique title within a course.
