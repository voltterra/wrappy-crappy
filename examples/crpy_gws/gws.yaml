      description: Whether this is a locked event copy where no changes can be made to the main event fields "summary", "description",
        "location", "start", "end" or "recurrence". The default is False. Read-Only.
    - name: organizer
      type: STR
      description: The organizer of the event. If the organizer is also an attendee, this is indicated with a separate entry
        in attendees with the organizer field set to True. To change the organizer, use the move operation. Read-only, except
        when importing an event.
    - name: originalStartTime
      type: STR
      description: For an instance of a recurring event, this is the time at which this event would start according to the
        recurrence data in the recurring event identified by recurringEventId. It uniquely identifies the instance within
        the recurring event series even if the instance was moved to a different time. Immutable.
    - name: outOfOfficeProperties
      type: STR
      description: Out of office event data. Used if eventType is outOfOffice.
    - name: privateCopy
      type: BOOL
      description: If set to True, Event propagation is disabled. Note that it is not the same thing as Private event properties.
        Optional. Immutable. The default is False.
    - name: recurrence
      type: LIST
      description: List of RRULE, EXRULE, RDATE and EXDATE lines for a recurring event, as specified in RFC5545. Note that
        DTSTART and DTEND lines are not allowed in this field; event start and end times are specified in the start and end
        fields. This field is omitted for single events or instances of recurring events.
    - name: recurringEventId
      type: STR
      description: For an instance of a recurring event, this is the id of the recurring event to which this instance belongs.
        Immutable.
    - name: reminders
      type: STR
      description: Information about the event's reminders for the authenticated user. Note that changing reminders does not
        also change the updated property of the enclosing event.
    - name: sequence
      type: INT
      description: Sequence number as per iCalendar.
    - name: source
      type: STR
      description: Source from which the event was created. For example, a web page, an email message or any document identifiable
        by an URL with HTTP or HTTPS scheme. Can only be seen or modified by the creator of the event.
    - name: start
      type: STR
      description: The (inclusive) start time of the event. For a recurring event, this is the start time of the first instance.
    - name: status
      type: STR
      description: "Status of the event. Optional. Possible values are:  \n- \"confirmed\" - The event is confirmed. This\
        \ is the default status. \n- \"tentative\" - The event is tentatively confirmed. \n- \"cancelled\" - The event is\
        \ cancelled (deleted). The list method returns cancelled events only on incremental sync (when syncToken or updatedMin\
        \ are specified) or if the showDeleted flag is set to true. The get method always returns them.\nA cancelled status\
        \ represents two different states depending on the event type:  \n- Cancelled exceptions of an uncancelled recurring\
        \ event indicate that this instance should no longer be presented to the user. Clients should store these events for\
        \ the lifetime of the parent recurring event.\nCancelled exceptions are only guaranteed to have values for the id,\
        \ recurringEventId and originalStartTime fields populated. The other fields might be empty.  \n- All other cancelled\
        \ events represent deleted events. Clients should remove their locally synced copies. Such cancelled events will eventually\
        \ disappear, so do not rely on them being available indefinitely.\nDeleted events are only guaranteed to have the\
        \ id field populated.   On the organizer's calendar, cancelled events continue to expose event details (summary, location,\
        \ etc.) so that they can be restored (undeleted). Similarly, the events to which the user was invited and that they\
        \ manually removed continue to provide details. However, incremental sync requests with showDeleted set to false will\
        \ not return these details.\nIf an event changes its organizer (for example via the move operation) and the original\
        \ organizer is not on the attendee list, it will leave behind a cancelled event where only the id field is guaranteed\
        \ to be populated."
    - name: summary
      type: STR
      description: Title of the event.
    - name: transparency
      type: STR
      description: "Whether the event blocks time on the calendar. Optional. Possible values are:  \n- \"opaque\" - Default\
        \ value. The event does block time on the calendar. This is equivalent to setting Show me as to Busy in the Calendar\
        \ UI. \n- \"transparent\" - The event does not block time on the calendar. This is equivalent to setting Show me as\
        \ to Available in the Calendar UI."
    - name: updated
      type: STR
      description: Last modification time of the main event data (as a RFC3339 timestamp). Updating event reminders will not
        cause this to change. Read-only.
    - name: visibility
      type: STR
      description: "Visibility of the event. Optional. Possible values are:  \n- \"default\" - Uses the default visibility\
        \ for events on the calendar. This is the default value. \n- \"public\" - The event is public and event details are\
        \ visible to all readers of the calendar. \n- \"private\" - The event is private and only event attendees may view\
        \ event details. \n- \"confidential\" - The event is private. This value is provided for compatibility reasons."
    - name: workingLocationProperties
      type: STR
      description: Working location event data.
  - name: watch
    description: Watch for changes to Events resources.
    params:
    - name: alwaysIncludeEmail
      type: BOOL
      description: Deprecated and ignored.
      is_flag: true
    - name: calendarId
      type: STR
      description: Calendar identifier. To retrieve calendar IDs call the calendarList.list method. If you want to access
        the primary calendar of the currently logged in user, use the "primary" keyword.
      required: true
    - name: eventTypes
      type: STR
      description: Event types to return. Optional. This parameter can be repeated multiple times to return events of different
        types. If unset, returns all event types.
      choices:
      - birthday
      - default
      - focusTime
      - fromGmail
      - outOfOffice
      - workingLocation
    - name: iCalUID
      type: STR
      description: Specifies an event ID in the iCalendar format to be provided in the response. Optional. Use this if you
        want to search for an event by its iCalendar ID.
    - name: maxAttendees
      type: INT
      description: The maximum number of attendees to include in the response. If there are more than the specified number
        of attendees, only the participant is returned. Optional.
    - name: maxResults
      type: INT
      description: Maximum number of events returned on one result page. The number of events in the resulting page may be
        less than this value, or none at all, even if there are more events matching the query. Incomplete pages can be detected
        by a non-empty nextPageToken field in the response. By default the value is 250 events. The page size can never be
        larger than 2500 events. Optional.
      default: '250'
    - name: orderBy
      type: STR
      description: The order of the events returned in the result. Optional. The default is an unspecified, stable order.
      choices:
      - startTime
      - updated
    - name: pageToken
      type: STR
      description: Token specifying which result page to return. Optional.
    - name: privateExtendedProperty
      type: STR
      description: Extended properties constraint specified as propertyName=value. Matches only private properties. This parameter
        might be repeated multiple times to return events that match all given constraints.
    - name: q
      type: STR
      description: "Free text search terms to find events that match these terms in the following fields:\n\n- summary \n\
        - description \n- location \n- attendee's displayName \n- attendee's email \n- organizer's displayName \n- organizer's\
        \ email \n- workingLocationProperties.officeLocation.buildingId \n- workingLocationProperties.officeLocation.deskId\
        \ \n- workingLocationProperties.officeLocation.label \n- workingLocationProperties.customLocation.label \nThese search\
        \ terms also match predefined keywords against all display title translations of working location, out-of-office,\
        \ and focus-time events. For example, searching for \"Office\" or \"Bureau\" returns working location events of type\
        \ officeLocation, whereas searching for \"Out of office\" or \"Abwesend\" returns out-of-office events. Optional."
    - name: sharedExtendedProperty
      type: STR
      description: Extended properties constraint specified as propertyName=value. Matches only shared properties. This parameter
        might be repeated multiple times to return events that match all given constraints.
    - name: showDeleted
      type: BOOL
      description: Whether to include deleted events (with status equals "cancelled") in the result. Cancelled instances of
        recurring events (but not the underlying recurring event) will still be included if showDeleted and singleEvents are
        both False. If showDeleted and singleEvents are both True, only single instances of deleted events (but not the underlying
        recurring events) are returned. Optional. The default is False.
      is_flag: true
    - name: showHiddenInvitations
      type: BOOL
      description: Whether to include hidden invitations in the result. Optional. The default is False.
      is_flag: true
    - name: singleEvents
      type: BOOL
      description: Whether to expand recurring events into instances and only return single one-off events and instances of
        recurring events, but not the underlying recurring events themselves. Optional. The default is False.
      is_flag: true
    - name: syncToken
      type: STR
      description: "Token obtained from the nextSyncToken field returned on the last page of results from the previous list\
        \ request. It makes the result of this list request contain only entries that have changed since then. All events\
        \ deleted since the previous list request will always be in the result set and it is not allowed to set showDeleted\
        \ to False.\nThere are several query parameters that cannot be specified together with nextSyncToken to ensure consistency\
        \ of the client state.\n\nThese are: \n- iCalUID \n- orderBy \n- privateExtendedProperty \n- q \n- sharedExtendedProperty\
        \ \n- timeMin \n- timeMax \n- updatedMin All other query parameters should be the same as for the initial synchronization\
        \ to avoid undefined behavior. If the syncToken expires, the server will respond with a 410 GONE response code and\
        \ the client should clear its storage and perform a full synchronization without any syncToken.\nLearn more about\
        \ incremental synchronization.\nOptional. The default is to return all entries."
    - name: timeMax
      type: STR
      description: Upper bound (exclusive) for an event's start time to filter by. Optional. The default is not to filter
        by start time. Must be an RFC3339 timestamp with mandatory time zone offset, for example, 2011-06-03T10:00:00-07:00,
        2011-06-03T10:00:00Z. Milliseconds may be provided but are ignored. If timeMin is set, timeMax must be greater than
        timeMin.
    - name: timeMin
      type: STR
      description: Lower bound (exclusive) for an event's end time to filter by. Optional. The default is not to filter by
        end time. Must be an RFC3339 timestamp with mandatory time zone offset, for example, 2011-06-03T10:00:00-07:00, 2011-06-03T10:00:00Z.
        Milliseconds may be provided but are ignored. If timeMax is set, timeMin must be smaller than timeMax.
    - name: timeZone
      type: STR
      description: Time zone used in the response. Optional. The default is the time zone of the calendar.
    - name: updatedMin
      type: STR
      description: Lower bound for an event's last modification time (as a RFC3339 timestamp) to filter by. When specified,
        entries deleted since this time will always be included regardless of showDeleted. Optional. The default is not to
        filter by last modification time.
    outputs:
    - name: address
      type: STR
      description: The address where notifications are delivered for this channel.
    - name: expiration
      type: STR
      description: Date and time of notification channel expiration, expressed as a Unix timestamp, in milliseconds. Optional.
    - name: id
      type: STR
      description: A UUID or similar unique string that identifies this channel.
    - name: kind
      type: STR
      description: Identifies this as a notification channel used to watch for changes to a resource, which is "api#channel".
    - name: params
      type: STR
      description: Additional parameters controlling delivery channel behavior. Optional.
    - name: payload
      type: BOOL
      description: A Boolean value to indicate whether payload is wanted. Optional.
    - name: resourceId
      type: STR
      description: An opaque ID that identifies the resource being watched on this channel. Stable across different API versions.
    - name: resourceUri
      type: STR
      description: A version-specific identifier for the watched resource.
    - name: token
      type: STR
      description: An arbitrary string delivered to the target address with each notification delivered over this channel.
        Optional.
    - name: type
      type: STR
      description: The type of delivery mechanism used for this channel. Valid values are "web_hook" (or "webhook"). Both
        values refer to a channel where Http requests are used to deliver messages.
