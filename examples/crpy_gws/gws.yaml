    - name: kind
      type: STR
      description: 'Identifies what kind of resource this is. Value: the fixed string `"drive#generatedIds"`.'
    - name: space
      type: STR
      description: The type of file that can be created with these IDs.
  - name: get
    description: ' Gets a file''s metadata or content by ID. For more information, see [Search for files and folders](/workspace/drive/api/guides/search-files).
      If you provide the URL parameter `alt=media`, then the response includes the file contents in the response body. Downloading
      content with `alt=media` only works if the file is stored in Drive. To download Google Docs, Sheets, and Slides use
