      type: STR
      description: Output only. The SHA1 checksum associated with this file, if available. This field is only populated for
        files with content stored in Google Drive; it's not populated for Docs Editors or shortcut files.
    - name: sha256Checksum
      type: STR
      description: Output only. The SHA256 checksum associated with this file, if available. This field is only populated
        for files with content stored in Google Drive; it's not populated for Docs Editors or shortcut files.
    - name: shared
      type: BOOL
      description: Output only. Whether the file has been shared. Not populated for items in shared drives.
    - name: sharedWithMeTime
      type: STR
      description: The time at which the file was shared with the user, if applicable (RFC 3339 date-time).
    - name: sharingUser
      type: STR
      description: Output only. The user who shared the file with the requesting user, if applicable.
    - name: shortcutDetails
      type: STR
      description: Shortcut file details. Only populated for shortcut files, which have the mimeType field set to `application/vnd.google-apps.shortcut`.
        Can only be set on `files.create` requests.
    - name: size
      type: STR
      description: Output only. Size in bytes of blobs and Google Workspace editor files. Won't be populated for files that
        have no size, like shortcuts and folders.
    - name: spaces
      type: LIST
      description: Output only. The list of spaces which contain the file. The currently supported values are `drive`, `appDataFolder`,
        and `photos`.
    - name: starred
      type: BOOL
      description: Whether the user has starred the file.
    - name: teamDriveId
      type: STR
      description: 'Deprecated: Output only. Use `driveId` instead.'
    - name: thumbnailLink
      type: STR
      description: Output only. A short-lived link to the file's thumbnail, if available. Typically lasts on the order of
        hours. Not intended for direct usage on web applications due to [Cross-Origin Resource Sharing (CORS)](https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS)
        policies. Consider using a proxy server. Only populated when the requesting app can access the file's content. If
        the file isn't shared publicly, the URL returned in `files.thumbnailLink` must be fetched using a credentialed request.
