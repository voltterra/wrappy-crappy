      description: Required. Prefix query that matches fields in the person. Does NOT use the read_mask for determining what
        fields to match.
    - name: readMask
      type: STR
      description: 'Required. A field mask to restrict which fields on each person are returned. Multiple fields can be specified
        by separating them with commas. Valid values are: * addresses * ageRanges * biographies * birthdays * calendarUrls
        * clientData * coverPhotos * emailAddresses * events * externalIds * genders * imClients * interests * locales * locations
        * memberships * metadata * miscKeywords * names * nicknames * occupations * organizations * phoneNumbers * photos
        * relations * sipAddresses * skills * urls * userDefined'
    - name: sources
      type: STR
      description: Required. Directory sources to return.
      choices:
      - DIRECTORY_SOURCE_TYPE_UNSPECIFIED
      - DIRECTORY_SOURCE_TYPE_DOMAIN_CONTACT
      - DIRECTORY_SOURCE_TYPE_DOMAIN_PROFILE
    outputs:
    - name: nextPageToken
      type: STR
      description: A token, which can be sent as `page_token` to retrieve the next page. If this field is omitted, there are
        no subsequent pages.
    - name: people
      type: LIST
      description: The list of people in the domain directory that match the query.
    - name: totalSize
      type: INT
      description: The total number of items in the list without pagination.
  - name: updateContact
    description: 'Update contact data for an existing contact person. Any non-contact data will not be modified. Any non-contact
      data in the person to update will be ignored. All fields specified in the `update_mask` will be replaced. The server
      returns a 400 error if `person.metadata.sources` is not specified for the contact to be updated or if there is no contact
      source. The server returns a 400 error with reason `"failedPrecondition"` if `person.metadata.sources.etag` is different
      than the contact''s etag, which indicates the contact has changed since its data was read. Clients should get the latest
      person and merge their updates into the latest person. If making sequential updates to the same person, the etag from
      the `updateContact` response should be used to avoid failures. The server returns a 400 error if `memberships` are being
      updated and there are no contact group memberships specified on the person. The server returns a 400 error if more than
      one field is specified on a field that is a singleton for contact sources: * biographies * birthdays * genders * names
      Mutate requests for the same user should be sent sequentially to avoid increased latency and failures.'
    params:
    - name: personFields
      type: STR
      description: 'Optional. A field mask to restrict which fields on each person are returned. Multiple fields can be specified
        by separating them with commas. Defaults to all fields if not set. Valid values are: * addresses * ageRanges * biographies
        * birthdays * calendarUrls * clientData * coverPhotos * emailAddresses * events * externalIds * genders * imClients
        * interests * locales * locations * memberships * metadata * miscKeywords * names * nicknames * occupations * organizations
        * phoneNumbers * photos * relations * sipAddresses * skills * urls * userDefined'
    - name: resourceName
      type: STR
      description: The resource name for the person, assigned by the server. An ASCII string in the form of `people/{person_id}`.
      required: true
    - name: sources
      type: STR
      description: Optional. A mask of what source types to return. Defaults to READ_SOURCE_TYPE_CONTACT and READ_SOURCE_TYPE_PROFILE
        if not set.
      choices:
      - READ_SOURCE_TYPE_UNSPECIFIED
      - READ_SOURCE_TYPE_PROFILE
      - READ_SOURCE_TYPE_CONTACT
      - READ_SOURCE_TYPE_DOMAIN_CONTACT
      - READ_SOURCE_TYPE_OTHER_CONTACT
    - name: updatePersonFields
      type: STR
      description: 'Required. A field mask to restrict which fields on the person are updated. Multiple fields can be specified
        by separating them with commas. All updated fields will be replaced. Valid values are: * addresses * biographies *
        birthdays * calendarUrls * clientData * emailAddresses * events * externalIds * genders * imClients * interests *
        locales * locations * memberships * miscKeywords * names * nicknames * occupations * organizations * phoneNumbers
        * relations * sipAddresses * urls * userDefined'
    outputs:
    - name: addresses
      type: LIST
      description: The person's street addresses.
    - name: ageRange
      type: STR
      description: Output only. **DEPRECATED** (Please use `person.ageRanges` instead) The person's age range.
    - name: ageRanges
      type: LIST
      description: Output only. The person's age ranges.
    - name: biographies
      type: LIST
      description: The person's biographies. This field is a singleton for contact sources.
    - name: birthdays
      type: LIST
      description: The person's birthdays. This field is a singleton for contact sources.
    - name: braggingRights
      type: LIST
      description: '**DEPRECATED**: No data will be returned The person''s bragging rights.'
    - name: calendarUrls
      type: LIST
      description: The person's calendar URLs.
    - name: clientData
      type: LIST
      description: The person's client data.
    - name: coverPhotos
      type: LIST
      description: Output only. The person's cover photos.
    - name: emailAddresses
      type: LIST
      description: The person's email addresses. For `people.connections.list` and `otherContacts.list` the number of email
        addresses is limited to 100. If a Person has more email addresses the entire set can be obtained by calling GetPeople.
    - name: etag
      type: STR
      description: The [HTTP entity tag](https://en.wikipedia.org/wiki/HTTP_ETag) of the resource. Used for web cache validation.
    - name: events
      type: LIST
      description: The person's events.
    - name: externalIds
      type: LIST
      description: The person's external IDs.
    - name: fileAses
      type: LIST
      description: The person's file-ases.
    - name: genders
      type: LIST
      description: The person's genders. This field is a singleton for contact sources.
    - name: imClients
      type: LIST
      description: The person's instant messaging clients.
    - name: interests
      type: LIST
      description: The person's interests.
    - name: locales
      type: LIST
      description: The person's locale preferences.
    - name: locations
      type: LIST
      description: The person's locations.
    - name: memberships
      type: LIST
      description: The person's group memberships.
    - name: metadata
      type: STR
      description: Output only. Metadata about the person.
    - name: miscKeywords
      type: LIST
      description: The person's miscellaneous keywords.
    - name: names
      type: LIST
      description: The person's names. This field is a singleton for contact sources.
    - name: nicknames
      type: LIST
      description: The person's nicknames.
    - name: occupations
      type: LIST
      description: The person's occupations.
    - name: organizations
      type: LIST
      description: The person's past or current organizations.
    - name: phoneNumbers
      type: LIST
      description: The person's phone numbers. For `people.connections.list` and `otherContacts.list` the number of phone
        numbers is limited to 100. If a Person has more phone numbers the entire set can be obtained by calling GetPeople.
    - name: photos
      type: LIST
      description: Output only. The person's photos.
    - name: relations
      type: LIST
      description: The person's relations.
    - name: relationshipInterests
      type: LIST
      description: 'Output only. **DEPRECATED**: No data will be returned The person''s relationship interests.'
    - name: relationshipStatuses
      type: LIST
      description: 'Output only. **DEPRECATED**: No data will be returned The person''s relationship statuses.'
    - name: residences
      type: LIST
      description: '**DEPRECATED**: (Please use `person.locations` instead) The person''s residences.'
    - name: resourceName
      type: STR
      description: The resource name for the person, assigned by the server. An ASCII string in the form of `people/{person_id}`.
    - name: sipAddresses
      type: LIST
      description: The person's SIP addresses.
    - name: skills
      type: LIST
      description: The person's skills.
    - name: taglines
      type: LIST
      description: 'Output only. **DEPRECATED**: No data will be returned The person''s taglines.'
    - name: urls
      type: LIST
      description: The person's associated URLs.
    - name: userDefined
      type: LIST
      description: The person's user defined data.
  - name: updateContactPhoto
    description: Update a contact's photo. Mutate requests for the same user should be sent sequentially to avoid increased
      latency and failures.
    params:
    - name: resourceName
      type: STR
      description: Required. Person resource name
      required: true
    outputs:
    - name: person
      type: STR
      description: The updated person, if person_fields is set in the UpdateContactPhotoRequest; otherwise this will be unset.
  - name: connections
    description: Operations on the 'connections' resource
- name: chat.customEmojis
  description: Operations on the 'customEmojis' resource
  commands:
  - name: create
    description: 'Creates a custom emoji. Custom emojis are only available for Google Workspace accounts, and the administrator
      must turn custom emojis on for the organization. For more information, see [Learn about custom emojis in Google Chat](https://support.google.com/chat/answer/12800149)
      and [Manage custom emoji permissions](https://support.google.com/a/answer/12850085). Requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)
      with the [authorization scope](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes):
      - `https://www.googleapis.com/auth/chat.customemojis`'
    outputs:
    - name: emojiName
      type: STR
      description: 'Optional. Immutable. User-provided name for the custom emoji, which is unique within the organization.
        Required when the custom emoji is created, output only otherwise. Emoji names must start and end with colons, must
        be lowercase and can only contain alphanumeric characters, hyphens, and underscores. Hyphens and underscores should
        be used to separate words and cannot be used consecutively. Example: `:valid-emoji-name:`'
    - name: name
      type: STR
      description: 'Identifier. The resource name of the custom emoji, assigned by the server. Format: `customEmojis/{customEmoji}`'
    - name: payload
      type: STR
      description: Optional. Input only. Payload data. Required when the custom emoji is created.
    - name: temporaryImageUri
      type: STR
      description: Output only. A temporary image URL for the custom emoji, valid for at least 10 minutes. Note that this
        is not populated in the response when the custom emoji is created.
    - name: uid
      type: STR
      description: Output only. Unique key for the custom emoji resource.
  - name: delete
    description: 'Deletes a custom emoji. By default, users can only delete custom emoji they created. [Emoji managers](https://support.google.com/a/answer/12850085)
      assigned by the administrator can delete any custom emoji in the organization. See [Learn about custom emojis in Google
      Chat](https://support.google.com/chat/answer/12800149). Custom emojis are only available for Google Workspace accounts,
      and the administrator must turn custom emojis on for the organization. For more information, see [Learn about custom
      emojis in Google Chat](https://support.google.com/chat/answer/12800149) and [Manage custom emoji permissions](https://support.google.com/a/answer/12850085).
      Requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user) with the
      [authorization scope](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes): - `https://www.googleapis.com/auth/chat.customemojis`'
    params:
    - name: name
      type: STR
      description: 'Required. Resource name of the custom emoji to delete. Format: `customEmojis/{customEmoji}` You can use
        the emoji name as an alias for `{customEmoji}`. For example, `customEmojis/:example-emoji:` where `:example-emoji:`
        is the emoji name for a custom emoji.'
      required: true
  - name: get
    description: 'Returns details about a custom emoji. Custom emojis are only available for Google Workspace accounts, and
      the administrator must turn custom emojis on for the organization. For more information, see [Learn about custom emojis
      in Google Chat](https://support.google.com/chat/answer/12800149) and [Manage custom emoji permissions](https://support.google.com/a/answer/12850085).
      Requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user) with one
      of the following [authorization scopes](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes):
      - `https://www.googleapis.com/auth/chat.customemojis.readonly` - `https://www.googleapis.com/auth/chat.customemojis`'
    params:
    - name: name
      type: STR
      description: 'Required. Resource name of the custom emoji. Format: `customEmojis/{customEmoji}` You can use the emoji
        name as an alias for `{customEmoji}`. For example, `customEmojis/:example-emoji:` where `:example-emoji:` is the emoji
        name for a custom emoji.'
      required: true
    outputs:
    - name: emojiName
      type: STR
      description: 'Optional. Immutable. User-provided name for the custom emoji, which is unique within the organization.
        Required when the custom emoji is created, output only otherwise. Emoji names must start and end with colons, must
        be lowercase and can only contain alphanumeric characters, hyphens, and underscores. Hyphens and underscores should
        be used to separate words and cannot be used consecutively. Example: `:valid-emoji-name:`'
    - name: name
      type: STR
      description: 'Identifier. The resource name of the custom emoji, assigned by the server. Format: `customEmojis/{customEmoji}`'
    - name: payload
      type: STR
      description: Optional. Input only. Payload data. Required when the custom emoji is created.
    - name: temporaryImageUri
      type: STR
      description: Output only. A temporary image URL for the custom emoji, valid for at least 10 minutes. Note that this
        is not populated in the response when the custom emoji is created.
    - name: uid
      type: STR
      description: Output only. Unique key for the custom emoji resource.
  - name: list
    description: 'Lists custom emojis visible to the authenticated user. Custom emojis are only available for Google Workspace
      accounts, and the administrator must turn custom emojis on for the organization. For more information, see [Learn about
      custom emojis in Google Chat](https://support.google.com/chat/answer/12800149) and [Manage custom emoji permissions](https://support.google.com/a/answer/12850085).
      Requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user) with one
      of the following [authorization scopes](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes):
      - `https://www.googleapis.com/auth/chat.customemojis.readonly` - `https://www.googleapis.com/auth/chat.customemojis`'
    params:
    - name: filter
      type: STR
      description: 'Optional. A query filter. Supports filtering by creator. To filter by creator, you must specify a valid
        value. Currently only `creator("users/me")` and `NOT creator("users/me")` are accepted to filter custom emojis by
        whether they were created by the calling user or not. For example, the following query returns custom emojis created
        by the caller: ``` creator("users/me") ``` Invalid queries are rejected with an `INVALID_ARGUMENT` error.'
    - name: pageSize
      type: INT
      description: Optional. The maximum number of custom emojis returned. The service can return fewer custom emojis than
        this value. If unspecified, the default value is 25. The maximum value is 200; values above 200 are changed to 200.
    - name: pageToken
      type: STR
      description: Optional. (If resuming from a previous query.) A page token received from a previous list custom emoji
        call. Provide this to retrieve the subsequent page. When paginating, the filter value should match the call that provided
        the page token. Passing a different value might lead to unexpected results.
    outputs:
    - name: customEmojis
      type: LIST
      description: Unordered list. List of custom emojis.
    - name: nextPageToken
      type: STR
      description: A token that you can send as `pageToken` to retrieve the next page of results. If empty, there are no subsequent
        pages.
- name: chat.media
  description: Operations on the 'media' resource
  commands:
  - name: download
    description: Downloads media. Download is supported on the URI `/v1/media/{+name}?alt=media`.
    params:
    - name: resourceName
      type: STR
      description: Name of the media that is being downloaded. See ReadRequest.resource_name.
      required: true
    outputs:
    - name: resourceName
      type: STR
      description: Name of the media resource.
  - name: upload
    description: 'Uploads an attachment. For an example, see [Upload media as a file attachment](https://developers.google.com/workspace/chat/upload-media-attachments).
      Requires user [authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user) with one
      of the following [authorization scopes](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes):
      - `https://www.googleapis.com/auth/chat.messages.create` - `https://www.googleapis.com/auth/chat.messages` - `https://www.googleapis.com/auth/chat.import`
      (import mode spaces only) You can upload attachments up to 200 MB. Certain file types aren''t supported. For details,
      see [File types blocked by Google Chat](https://support.google.com/chat/answer/7651457?&co=GENIE.Platform%3DDesktop#File%20types%20blocked%20in%20Google%20Chat).'
    params:
    - name: parent
      type: STR
      description: Required. Resource name of the Chat space in which the attachment is uploaded. Format "spaces/{space}".
      required: true
    outputs:
    - name: attachmentDataRef
      type: STR
      description: Reference to the uploaded attachment.
- name: chat.spaces
  description: Operations on the 'spaces' resource
  commands:
  - name: completeImport
    description: 'Completes the [import process](https://developers.google.com/workspace/chat/import-data) for the specified
      space and makes it visible to users. Requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)
      and domain-wide delegation with the [authorization scope](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes):
      - `https://www.googleapis.com/auth/chat.import` For more information, see [Authorize Google Chat apps to import data](https://developers.google.com/workspace/chat/authorize-import).'
    params:
    - name: name
      type: STR
      description: 'Required. Resource name of the import mode space. Format: `spaces/{space}`'
      required: true
    outputs:
    - name: space
      type: STR
      description: The import mode space.
  - name: create
    description: 'Creates a space. Can be used to create a named space, or a group chat in `Import mode`. For an example,
      see [Create a space](https://developers.google.com/workspace/chat/create-spaces). Supports the following types of [authentication](https://developers.google.com/workspace/chat/authenticate-authorize):
      - [App authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-app) with [administrator
      approval](https://support.google.com/a?p=chat-app-auth) and one of the following authorization scopes: - `https://www.googleapis.com/auth/chat.app.spaces.create`
      - `https://www.googleapis.com/auth/chat.app.spaces` - [User authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)
      with one of the following authorization scopes: - `https://www.googleapis.com/auth/chat.spaces.create` - `https://www.googleapis.com/auth/chat.spaces`
      - `https://www.googleapis.com/auth/chat.import` (import mode spaces only) When authenticating as an app, the `space.customer`
      field must be set in the request. When authenticating as an app, the Chat app is added as a member of the space. However,
      unlike human authentication, the Chat app is not added as a space manager. By default, the Chat app can be removed from
      the space by all space members. To allow only space managers to remove the app from a space, set `space.permission_settings.manage_apps`
      to `managers_allowed`. Space membership upon creation depends on whether the space is created in `Import mode`: * **Import
      mode:** No members are created. * **All other modes:** The calling user is added as a member. This is: * The app itself
      when using app authentication. * The human user when using user authentication. If you receive the error message `ALREADY_EXISTS`
      when creating a space, try a different `displayName`. An existing space within the Google Workspace organization might
      already use this display name.'
    params:
    - name: requestId
      type: STR
      description: Optional. A unique identifier for this request. A random UUID is recommended. Specifying an existing request
        ID returns the space created with that ID instead of creating a new space. Specifying an existing request ID from
        the same Chat app with a different authenticated user returns an error.
    outputs:
    - name: accessSettings
      type: STR
      description: Optional. Specifies the [access setting](https://support.google.com/chat/answer/11971020) of the space.
        Only populated when the `space_type` is `SPACE`.
    - name: adminInstalled
      type: BOOL
      description: Output only. For direct message (DM) spaces with a Chat app, whether the space was created by a Google
        Workspace administrator. Administrators can install and set up a direct message with a Chat app on behalf of users
        in their organization. To support admin install, your Chat app must feature direct messaging.
    - name: createTime
      type: STR
      description: Optional. Immutable. For spaces created in Chat, the time the space was created. This field is output only,
        except when used in import mode spaces. For import mode spaces, set this field to the historical timestamp at which
        the space was created in the source in order to preserve the original creation time. Only populated in the output
        when `spaceType` is `GROUP_CHAT` or `SPACE`.
    - name: customer
      type: STR
      description: Optional. Immutable. The customer id of the domain of the space. Required only when creating a space with
        [app authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-app) and `SpaceType`
        is `SPACE`, otherwise should not be set. In the format `customers/{customer}`, where `customer` is the `id` from the
        [Admin SDK customer resource](https://developers.google.com/admin-sdk/directory/reference/rest/v1/customers). Private
        apps can also use the `customers/my_customer` alias to create the space in the same Google Workspace organization
        as the app. This field isn't populated for direct messages (DMs) or when the space is created by non-Google Workspace
        users.
    - name: displayName
      type: STR
      description: Optional. The space's display name. Required when [creating a space](https://developers.google.com/workspace/chat/api/reference/rest/v1/spaces/create)
        with a `spaceType` of `SPACE`. If you receive the error message `ALREADY_EXISTS` when creating a space or updating
        the `displayName`, try a different `displayName`. An existing space within the Google Workspace organization might
        already use this display name. For direct messages, this field might be empty. Supports up to 128 characters.
    - name: externalUserAllowed
      type: BOOL
      description: 'Optional. Immutable. Whether this space permits any Google Chat user as a member. Input when creating
        a space in a Google Workspace organization. Omit this field when creating spaces in the following conditions: * The
        authenticated user uses a consumer account (unmanaged user account). By default, a space created by a consumer account
        permits any Google Chat user. For existing spaces, this field is output only.'
    - name: importMode
      type: BOOL
      description: Optional. Whether this space is created in `Import Mode` as part of a data migration into Google Workspace.
        While spaces are being imported, they aren't visible to users until the import is complete. Creating a space in `Import
        Mode`requires [user authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user).
    - name: importModeExpireTime
      type: STR
      description: Output only. The time when the space will be automatically deleted by the system if it remains in import
        mode. Each space created in import mode must exit this mode before this expire time using `spaces.completeImport`.
        This field is only populated for spaces that were created with import mode.
    - name: lastActiveTime
      type: STR
      description: Output only. Timestamp of the last message in the space.
    - name: membershipCount
      type: STR
      description: Output only. The count of joined memberships grouped by member type. Populated when the `space_type` is
        `SPACE`, `DIRECT_MESSAGE` or `GROUP_CHAT`.
    - name: name
      type: STR
      description: 'Identifier. Resource name of the space. Format: `spaces/{space}` Where `{space}` represents the system-assigned
        ID for the space. You can obtain the space ID by calling the [`spaces.list()`](https://developers.google.com/workspace/chat/api/reference/rest/v1/spaces/list)
        method or from the space URL. For example, if the space URL is `https://mail.google.com/mail/u/0/#chat/space/AAAAAAAAA`,
        the space ID is `AAAAAAAAA`.'
    - name: permissionSettings
      type: STR
      description: 'Optional. Space permission settings for existing spaces. Input for updating exact space permission settings,
        where existing permission settings are replaced. Output lists current permission settings. Reading and updating permission
        settings supports: - [App authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-app)
        with [administrator approval](https://support.google.com/a?p=chat-app-auth) with the `chat.app.spaces` scope. Only
        populated and settable when the Chat app created the space. - [User authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)'
    - name: predefinedPermissionSettings
      type: STR
      description: 'Optional. Input only. Predefined space permission settings, input only when creating a space. If the field
        is not set, a collaboration space is created. After you create the space, settings are populated in the `PermissionSettings`
        field. Setting predefined permission settings supports: - [App authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-app)
        with [administrator approval](https://support.google.com/a?p=chat-app-auth) with the `chat.app.spaces` or `chat.app.spaces.create`
        scopes. - [User authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)'
    - name: singleUserBotDm
      type: BOOL
      description: Optional. Whether the space is a DM between a Chat app and a single human.
    - name: spaceDetails
      type: STR
      description: Optional. Details about the space including description and rules.
    - name: spaceHistoryState
      type: STR
      description: Optional. The message history state for messages and threads in this space.
    - name: spaceThreadingState
      type: STR
      description: Output only. The threading state in the Chat space.
    - name: spaceType
      type: STR
      description: Optional. The type of space. Required when creating a space or updating the space type of a space. Output
        only for other usage.
    - name: spaceUri
      type: STR
      description: Output only. The URI for a user to access the space.
    - name: threaded
      type: BOOL
      description: 'Output only. Deprecated: Use `spaceThreadingState` instead. Whether messages are threaded in this space.'
    - name: type
      type: STR
      description: 'Output only. Deprecated: Use `space_type` instead. The type of a space.'
  - name: delete
    description: 'Deletes a named space. Always performs a cascading delete, which means that the space''s child resources—like
      messages posted in the space and memberships in the space—are also deleted. For an example, see [Delete a space](https://developers.google.com/workspace/chat/delete-spaces).
      Supports the following types of [authentication](https://developers.google.com/workspace/chat/authenticate-authorize):
      - [App authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-app) with [administrator
      approval](https://support.google.com/a?p=chat-app-auth) and the authorization scope: - `https://www.googleapis.com/auth/chat.app.delete`
      (only in spaces the app created) - [User authentication](https://developers.google.com/workspace/chat/authenticate-authorize-chat-user)
      with one of the following authorization scopes: - `https://www.googleapis.com/auth/chat.delete` - `https://www.googleapis.com/auth/chat.import`
      (import mode spaces only) - User authentication grants administrator privileges when an administrator account authenticates,
      `use_admin_access` is `true`, and the following authorization scope is used: - `https://www.googleapis.com/auth/chat.admin.delete`'
    params:
    - name: name
      type: STR
      description: 'Required. Resource name of the space to delete. Format: `spaces/{space}`'
      required: true
    - name: useAdminAccess
      type: BOOL
      description: Optional. When `true`, the method runs using the user's Google Workspace administrator privileges. The
        calling user must be a Google Workspace administrator with the [manage chat and spaces conversations privilege](https://support.google.com/a/answer/13369245).
        Requires the `chat.admin.delete` [OAuth 2.0 scope](https://developers.google.com/workspace/chat/authenticate-authorize#chat-api-scopes).
