    - name: hasThumbnail
      type: BOOL
      description: Output only. Whether this file has a thumbnail. This doesn't indicate whether the requesting app has access
        to the thumbnail. To check access, look for the presence of the thumbnailLink field.
    - name: headRevisionId
      type: STR
      description: Output only. The ID of the file's head revision. This is currently only available for files with binary
        content in Google Drive.
    - name: iconLink
      type: STR
      description: Output only. A static, unauthenticated link to the file's icon.
    - name: id
      type: STR
      description: The ID of the file.
    - name: imageMediaMetadata
      type: STR
      description: Output only. Additional metadata about image media, if available.
    - name: inheritedPermissionsDisabled
      type: BOOL
      description: Whether this file has inherited permissions disabled. Inherited permissions are enabled by default.
    - name: isAppAuthorized
      type: BOOL
      description: Output only. Whether the file was created or opened by the requesting app.
    - name: kind
      type: STR
      description: 'Output only. Identifies what kind of resource this is. Value: the fixed string `"drive#file"`.'
    - name: labelInfo
      type: STR
      description: Output only. An overview of the labels on the file.
    - name: lastModifyingUser
      type: STR
      description: Output only. The last user to modify the file. This field is only populated when the last modification
        was performed by a signed-in user.
    - name: linkShareMetadata
      type: STR
      description: Contains details about the link URLs that clients are using to refer to this item.
    - name: md5Checksum
      type: STR
      description: Output only. The MD5 checksum for the content of the file. This is only applicable to files with binary
        content in Google Drive.
    - name: mimeType
      type: STR
      description: The MIME type of the file. Google Drive attempts to automatically detect an appropriate value from uploaded
        content, if no value is provided. The value cannot be changed unless a new revision is uploaded. If a file is created
        with a Google Doc MIME type, the uploaded content is imported, if possible. The supported import formats are published
