- name: slides.presentations
  description: Operations on the 'presentations' resource
  commands:
  - name: batchUpdate
    description: 'Applies one or more updates to the presentation. Each request is validated before being applied. If any
      request is not valid, then the entire request will fail and nothing will be applied. Some requests have replies to give
      you some information about how they are applied. Other requests do not need to return information; these each return
      an empty reply. The order of replies matches that of the requests. For example, suppose you call batchUpdate with four
      updates, and only the third one returns information. The response would have two empty replies: the reply to the third
      request, and another empty reply, in that order. Because other users may be editing the presentation, the presentation
      might not exactly reflect your changes: your changes may be altered with respect to collaborator changes. If there are
      no collaborators, the presentation should reflect your changes. In any case, the updates in your request are guaranteed
      to be applied together atomically.'
    params:
    - name: presentationId
      type: STR
      description: The presentation to apply the updates to.
      required: true
    outputs:
    - name: presentationId
      type: STR
      description: The presentation the updates were applied to.
    - name: replies
      type: LIST
      description: The reply of the updates. This maps 1:1 with the updates, although replies to some requests may be empty.
    - name: writeControl
      type: STR
      description: The updated write control after applying the request.
  - name: create
    description: Creates a blank presentation using the title given in the request. If a `presentationId` is provided, it
      is used as the ID of the new presentation. Otherwise, a new ID is generated. Other fields in the request, including
      any provided content, are ignored. Returns the created presentation.
    outputs:
    - name: layouts
      type: LIST
      description: The layouts in the presentation. A layout is a template that determines how content is arranged and styled
        on the slides that inherit from that layout.
    - name: locale
      type: STR
      description: The locale of the presentation, as an IETF BCP 47 language tag.
    - name: masters
      type: LIST
      description: 'The slide masters in the presentation. A slide master contains all common page elements and the common
        properties for a set of layouts. They serve three purposes: - Placeholder shapes on a master contain the default text
        styles and shape properties of all placeholder shapes on pages that use that master. - The master page properties
        define the common page properties inherited by its layouts. - Any other shapes on the master slide appear on all slides
        using that master, regardless of their layout.'
    - name: notesMaster
      type: STR
      description: 'The notes master in the presentation. It serves three purposes: - Placeholder shapes on a notes master
        contain the default text styles and shape properties of all placeholder shapes on notes pages. Specifically, a `SLIDE_IMAGE`
        placeholder shape contains the slide thumbnail, and a `BODY` placeholder shape contains the speaker notes. - The notes
        master page properties define the common page properties inherited by all notes pages. - Any other shapes on the notes
        master appear on all notes pages. The notes master is read-only.'
    - name: pageSize
      type: STR
      description: The size of pages in the presentation.
    - name: presentationId
      type: STR
      description: The ID of the presentation.
    - name: revisionId
      type: STR
      description: Output only. The revision ID of the presentation. Can be used in update requests to assert the presentation
        revision hasn't changed since the last read operation. Only populated if the user has edit access to the presentation.
        The revision ID is not a sequential number but a nebulous string. The format of the revision ID may change over time,
        so it should be treated opaquely. A returned revision ID is only guaranteed to be valid for 24 hours after it has
        been returned and cannot be shared across users. If the revision ID is unchanged between calls, then the presentation
        has not changed. Conversely, a changed ID (for the same presentation and user) usually means the presentation has
        been updated. However, a changed ID can also be due to internal factors such as ID format changes.
    - name: slides
      type: LIST
      description: The slides in the presentation. A slide inherits properties from a slide layout.
    - name: title
      type: STR
      description: The title of the presentation.
  - name: get
    description: Gets the latest version of the specified presentation.
    params:
    - name: presentationId
      type: STR
      description: The ID of the presentation to retrieve.
      required: true
    outputs:
    - name: layouts
      type: LIST
      description: The layouts in the presentation. A layout is a template that determines how content is arranged and styled
        on the slides that inherit from that layout.
    - name: locale
      type: STR
      description: The locale of the presentation, as an IETF BCP 47 language tag.
    - name: masters
      type: LIST
      description: 'The slide masters in the presentation. A slide master contains all common page elements and the common
        properties for a set of layouts. They serve three purposes: - Placeholder shapes on a master contain the default text
        styles and shape properties of all placeholder shapes on pages that use that master. - The master page properties
        define the common page properties inherited by its layouts. - Any other shapes on the master slide appear on all slides
        using that master, regardless of their layout.'
    - name: notesMaster
      type: STR
      description: 'The notes master in the presentation. It serves three purposes: - Placeholder shapes on a notes master
        contain the default text styles and shape properties of all placeholder shapes on notes pages. Specifically, a `SLIDE_IMAGE`
        placeholder shape contains the slide thumbnail, and a `BODY` placeholder shape contains the speaker notes. - The notes
        master page properties define the common page properties inherited by all notes pages. - Any other shapes on the notes
        master appear on all notes pages. The notes master is read-only.'
    - name: pageSize
      type: STR
      description: The size of pages in the presentation.
    - name: presentationId
      type: STR
      description: The ID of the presentation.
    - name: revisionId
      type: STR
      description: Output only. The revision ID of the presentation. Can be used in update requests to assert the presentation
        revision hasn't changed since the last read operation. Only populated if the user has edit access to the presentation.
        The revision ID is not a sequential number but a nebulous string. The format of the revision ID may change over time,
        so it should be treated opaquely. A returned revision ID is only guaranteed to be valid for 24 hours after it has
        been returned and cannot be shared across users. If the revision ID is unchanged between calls, then the presentation
        has not changed. Conversely, a changed ID (for the same presentation and user) usually means the presentation has
        been updated. However, a changed ID can also be due to internal factors such as ID format changes.
    - name: slides
      type: LIST
      description: The slides in the presentation. A slide inherits properties from a slide layout.
    - name: title
      type: STR
      description: The title of the presentation.
