    - name: summary
      type: STR
      description: Title of the calendar. Read-only.
    - name: timeZone
      type: STR
      description: The time zone of the calendar. Read-only.
    - name: updated
      type: STR
      description: Last modification time of the calendar (as a RFC3339 timestamp). Read-only.
  - name: move
    description: Moves an event to another calendar, i.e. changes an event's organizer. Note that only default events can
      be moved; birthday, focusTime, fromGmail, outOfOffice and workingLocation events cannot be moved.
    params:
    - name: calendarId
      type: STR
      description: Calendar identifier of the source calendar where the event currently is on.
      required: true
    - name: destination
      type: STR
      description: Calendar identifier of the target calendar where the event is to be moved to.
      required: true
    - name: eventId
      type: STR
      description: Event identifier.
      required: true
    - name: sendNotifications
      type: BOOL
      description: 'Deprecated. Please use sendUpdates instead.


        Whether to send notifications about the change of the event''s organizer. Note that some emails might still be sent
        even if you set the value to false. The default is false.'
      is_flag: true
    - name: sendUpdates
      type: STR
      description: Guests who should receive notifications about the change of the event's organizer.
      choices:
      - all
      - externalOnly
      - none
    outputs:
    - name: anyoneCanAddSelf
      type: BOOL
      description: Whether anyone can invite themselves to the event (deprecated). Optional. The default is False.
    - name: attachments
      type: LIST
      description: 'File attachments for the event.

        In order to modify attachments the supportsAttachments request parameter should be set to true.

        There can be at most 25 attachments per event,'
    - name: attendees
