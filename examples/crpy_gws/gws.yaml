        organization. To update the space history state, you must omit all other field masks in your request. `space_history_state`
        is not supported with `useAdminAccess`. `access_settings.audience`: Updates the [access setting](https://support.google.com/chat/answer/11971020)
        of who can discover the space, join the space, and preview the messages in named space where `spaceType` field is
        `SPACE`. If the existing space has a target audience, you can remove the audience and restrict space access by omitting
        a value for this field mask. To update access settings for a space, the authenticating user must be a space manager
        and omit all other field masks in your request. You can''t update this field if the space is in [import mode](https://developers.google.com/workspace/chat/import-data-overview).
        To learn more, see [Make a space discoverable to specific users](https://developers.google.com/workspace/chat/space-target-audience).
