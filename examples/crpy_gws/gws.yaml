- name: people.contactGroups
  description: Operations on the 'contactGroups' resource
  commands:
  - name: batchGet
    description: Get a list of contact groups owned by the authenticated user by specifying a list of contact group resource
      names.
    params:
    - name: groupFields
      type: STR
      description: 'Optional. A field mask to restrict which fields on the group are returned. Defaults to `metadata`, `groupType`,
        `memberCount`, and `name` if not set or set to empty. Valid fields are: * clientData * groupType * memberCount * metadata
        * name'
    - name: maxMembers
      type: INT
      description: Optional. Specifies the maximum number of members to return for each group. Defaults to 0 if not set, which
        will return zero members.
    - name: resourceNames
      type: STR
      description: Required. The resource names of the contact groups to get. There is a maximum of 200 resource names.
    outputs:
    - name: responses
      type: LIST
      description: The list of responses for each requested contact group resource.
  - name: create
    description: Create a new contact group owned by the authenticated user. Created contact group names must be unique to
      the users contact groups. Attempting to create a group with a duplicate name will return a HTTP 409 error. Mutate requests
      for the same user should be sent sequentially to avoid increased latency and failures.
    outputs:
    - name: clientData
      type: LIST
      description: The group's client data.
    - name: etag
      type: STR
      description: The [HTTP entity tag](https://en.wikipedia.org/wiki/HTTP_ETag) of the resource. Used for web cache validation.
    - name: formattedName
      type: STR
      description: Output only. The name translated and formatted in the viewer's account locale or the `Accept-Language`
        HTTP header locale for system groups names. Group names set by the owner are the same as name.
    - name: groupType
      type: STR
      description: Output only. The contact group type.
    - name: memberCount
      type: INT
      description: Output only. The total number of contacts in the group irrespective of max members in specified in the
        request.
    - name: memberResourceNames
      type: LIST
      description: Output only. The list of contact person resource names that are members of the contact group. The field
        is only populated for GET requests and will only return as many members as `maxMembers` in the get request.
    - name: metadata
      type: STR
      description: Output only. Metadata about the contact group.
    - name: name
      type: STR
      description: The contact group name set by the group owner or a system provided name for system groups. For [`contactGroups.create`](/people/api/rest/v1/contactGroups/create)
        or [`contactGroups.update`](/people/api/rest/v1/contactGroups/update) the name must be unique to the users contact
        groups. Attempting to create a group with a duplicate name will return a HTTP 409 error.
    - name: resourceName
      type: STR
      description: The resource name for the contact group, assigned by the server. An ASCII string, in the form of `contactGroups/{contact_group_id}`.
  - name: delete
    description: Delete an existing contact group owned by the authenticated user by specifying a contact group resource name.
      Mutate requests for the same user should be sent sequentially to avoid increased latency and failures.
    params:
    - name: deleteContacts
      type: BOOL
      description: Optional. Set to true to also delete the contacts in the specified group.
      is_flag: true
    - name: resourceName
      type: STR
      description: Required. The resource name of the contact group to delete.
      required: true
  - name: get
    description: Get a specific contact group owned by the authenticated user by specifying a contact group resource name.
    params:
    - name: groupFields
      type: STR
      description: 'Optional. A field mask to restrict which fields on the group are returned. Defaults to `metadata`, `groupType`,
        `memberCount`, and `name` if not set or set to empty. Valid fields are: * clientData * groupType * memberCount * metadata
        * name'
    - name: maxMembers
      type: INT
      description: Optional. Specifies the maximum number of members to return. Defaults to 0 if not set, which will return
        zero members.
    - name: resourceName
      type: STR
      description: Required. The resource name of the contact group to get.
      required: true
    outputs:
    - name: clientData
      type: LIST
      description: The group's client data.
    - name: etag
      type: STR
      description: The [HTTP entity tag](https://en.wikipedia.org/wiki/HTTP_ETag) of the resource. Used for web cache validation.
    - name: formattedName
      type: STR
      description: Output only. The name translated and formatted in the viewer's account locale or the `Accept-Language`
        HTTP header locale for system groups names. Group names set by the owner are the same as name.
    - name: groupType
      type: STR
      description: Output only. The contact group type.
    - name: memberCount
      type: INT
      description: Output only. The total number of contacts in the group irrespective of max members in specified in the
        request.
    - name: memberResourceNames
      type: LIST
      description: Output only. The list of contact person resource names that are members of the contact group. The field
        is only populated for GET requests and will only return as many members as `maxMembers` in the get request.
    - name: metadata
      type: STR
      description: Output only. Metadata about the contact group.
    - name: name
      type: STR
      description: The contact group name set by the group owner or a system provided name for system groups. For [`contactGroups.create`](/people/api/rest/v1/contactGroups/create)
        or [`contactGroups.update`](/people/api/rest/v1/contactGroups/update) the name must be unique to the users contact
        groups. Attempting to create a group with a duplicate name will return a HTTP 409 error.
    - name: resourceName
      type: STR
      description: The resource name for the contact group, assigned by the server. An ASCII string, in the form of `contactGroups/{contact_group_id}`.
  - name: list
    description: List all contact groups owned by the authenticated user. Members of the contact groups are not populated.
    params:
    - name: groupFields
      type: STR
      description: 'Optional. A field mask to restrict which fields on the group are returned. Defaults to `metadata`, `groupType`,
        `memberCount`, and `name` if not set or set to empty. Valid fields are: * clientData * groupType * memberCount * metadata
        * name'
    - name: pageSize
      type: INT
      description: Optional. The maximum number of resources to return. Valid values are between 1 and 1000, inclusive. Defaults
        to 30 if not set or set to 0.
    - name: pageToken
      type: STR
      description: Optional. The next_page_token value returned from a previous call to [ListContactGroups](/people/api/rest/v1/contactgroups/list).
        Requests the next page of resources.
    - name: syncToken
      type: STR
      description: Optional. A sync token, returned by a previous call to `contactgroups.list`. Only resources changed since
        the sync token was created will be returned.
    outputs:
    - name: contactGroups
      type: LIST
      description: The list of contact groups. Members of the contact groups are not populated.
    - name: nextPageToken
      type: STR
      description: The token that can be used to retrieve the next page of results.
    - name: nextSyncToken
      type: STR
      description: The token that can be used to retrieve changes since the last request.
    - name: totalItems
      type: INT
      description: The total number of items in the list without pagination.
  - name: update
    description: Update the name of an existing contact group owned by the authenticated user. Updated contact group names
      must be unique to the users contact groups. Attempting to create a group with a duplicate name will return a HTTP 409
      error. Mutate requests for the same user should be sent sequentially to avoid increased latency and failures.
    params:
    - name: resourceName
      type: STR
      description: The resource name for the contact group, assigned by the server. An ASCII string, in the form of `contactGroups/{contact_group_id}`.
      required: true
    outputs:
    - name: clientData
      type: LIST
      description: The group's client data.
    - name: etag
      type: STR
      description: The [HTTP entity tag](https://en.wikipedia.org/wiki/HTTP_ETag) of the resource. Used for web cache validation.
    - name: formattedName
      type: STR
      description: Output only. The name translated and formatted in the viewer's account locale or the `Accept-Language`
        HTTP header locale for system groups names. Group names set by the owner are the same as name.
    - name: groupType
      type: STR
      description: Output only. The contact group type.
    - name: memberCount
      type: INT
      description: Output only. The total number of contacts in the group irrespective of max members in specified in the
        request.
    - name: memberResourceNames
      type: LIST
      description: Output only. The list of contact person resource names that are members of the contact group. The field
        is only populated for GET requests and will only return as many members as `maxMembers` in the get request.
    - name: metadata
      type: STR
      description: Output only. Metadata about the contact group.
    - name: name
      type: STR
      description: The contact group name set by the group owner or a system provided name for system groups. For [`contactGroups.create`](/people/api/rest/v1/contactGroups/create)
        or [`contactGroups.update`](/people/api/rest/v1/contactGroups/update) the name must be unique to the users contact
        groups. Attempting to create a group with a duplicate name will return a HTTP 409 error.
    - name: resourceName
      type: STR
      description: The resource name for the contact group, assigned by the server. An ASCII string, in the form of `contactGroups/{contact_group_id}`.
