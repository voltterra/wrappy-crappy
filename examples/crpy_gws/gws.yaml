- name: drive.files
  description: Operations on the 'files' resource
  commands:
  - name: copy
    description: Creates a copy of a file and applies any requested updates with patch semantics. For more information, see
      [Create and manage files](https://developers.google.com/workspace/drive/api/guides/create-file).
    params:
    - name: enforceSingleParent
      type: BOOL
      description: 'Deprecated: Copying files into multiple folders is no longer supported. Use shortcuts instead.'
      default: 'false'
      is_flag: true
    - name: fileId
      type: STR
      description: The ID of the file.
      required: true
    - name: ignoreDefaultVisibility
      type: BOOL
      description: Whether to ignore the domain's default visibility settings for the created file. Domain administrators
        can choose to make all uploaded files visible to the domain by default; this parameter bypasses that behavior for
        the request. Permissions are still inherited from parent folders.
      default: 'false'
      is_flag: true
    - name: includeLabels
      type: STR
      description: A comma-separated list of IDs of labels to include in the `labelInfo` part of the response.
    - name: includePermissionsForView
      type: STR
      description: Specifies which additional view's permissions to include in the response. Only `published` is supported.
    - name: keepRevisionForever
      type: BOOL
      description: Whether to set the `keepForever` field in the new head revision. This is only applicable to files with
        binary content in Google Drive. Only 200 revisions for the file can be kept forever. If the limit is reached, try
        deleting pinned revisions.
      default: 'false'
      is_flag: true
    - name: ocrLanguage
      type: STR
      description: A language hint for OCR processing during image import (ISO 639-1 code).
    - name: supportsAllDrives
      type: BOOL
      description: Whether the requesting application supports both My Drives and shared drives.
      default: 'false'
      is_flag: true
    - name: supportsTeamDrives
      type: BOOL
      description: 'Deprecated: Use `supportsAllDrives` instead.'
      default: 'false'
      is_flag: true
    outputs:
    - name: appProperties
      type: STR
      description: 'A collection of arbitrary key-value pairs which are private to the requesting app.

        Entries with null values are cleared in update and copy requests. These properties can only be retrieved using an
        authenticated request. An authenticated request uses an access token obtained with a OAuth 2 client ID. You cannot
        use an API key to retrieve private properties.'
    - name: capabilities
      type: STR
      description: Output only. Capabilities the current user has on this file. Each capability corresponds to a fine-grained
        action that a user may take. For more information, see [Understand file capabilities](https://developers.google.com/workspace/drive/api/guides/manage-sharing#capabilities).
    - name: contentHints
      type: STR
      description: Additional information about the content of the file. These fields are never populated in responses.
    - name: contentRestrictions
      type: LIST
      description: Restrictions for accessing the content of the file. Only populated if such a restriction exists.
    - name: copyRequiresWriterPermission
      type: BOOL
      description: Whether the options to copy, print, or download this file should be disabled for readers and commenters.
    - name: createdTime
      type: STR
      description: The time at which the file was created (RFC 3339 date-time).
    - name: description
      type: STR
      description: A short description of the file.
    - name: downloadRestrictions
      type: STR
      description: Download restrictions applied on the file.
    - name: driveId
      type: STR
      description: Output only. ID of the shared drive the file resides in. Only populated for items in shared drives.
    - name: explicitlyTrashed
      type: BOOL
      description: Output only. Whether the file has been explicitly trashed, as opposed to recursively trashed from a parent
        folder.
    - name: exportLinks
      type: STR
      description: Output only. Links for exporting Docs Editors files to specific formats.
    - name: fileExtension
      type: STR
      description: Output only. The final component of `fullFileExtension`. This is only available for files with binary content
        in Google Drive.
    - name: folderColorRgb
      type: STR
      description: The color for a folder or a shortcut to a folder as an RGB hex string. The supported colors are published
        in the `folderColorPalette` field of the [`about`](/workspace/drive/api/reference/rest/v3/about) resource. If an unsupported
        color is specified, the closest color in the palette is used instead.
    - name: fullFileExtension
      type: STR
      description: Output only. The full file extension extracted from the `name` field. May contain multiple concatenated
        extensions, such as "tar.gz". This is only available for files with binary content in Google Drive. This is automatically
        updated when the `name` field changes, however it's not cleared if the new name doesn't contain a valid extension.
    - name: hasAugmentedPermissions
      type: BOOL
      description: Output only. Whether there are permissions directly on this file. This field is only populated for items
        in shared drives.
    - name: hasThumbnail
      type: BOOL
      description: Output only. Whether this file has a thumbnail. This doesn't indicate whether the requesting app has access
        to the thumbnail. To check access, look for the presence of the thumbnailLink field.
    - name: headRevisionId
      type: STR
      description: Output only. The ID of the file's head revision. This is currently only available for files with binary
        content in Google Drive.
    - name: iconLink
      type: STR
      description: Output only. A static, unauthenticated link to the file's icon.
    - name: id
      type: STR
      description: The ID of the file.
    - name: imageMediaMetadata
      type: STR
      description: Output only. Additional metadata about image media, if available.
    - name: inheritedPermissionsDisabled
      type: BOOL
      description: Whether this file has inherited permissions disabled. Inherited permissions are enabled by default.
    - name: isAppAuthorized
      type: BOOL
      description: Output only. Whether the file was created or opened by the requesting app.
    - name: kind
      type: STR
      description: 'Output only. Identifies what kind of resource this is. Value: the fixed string `"drive#file"`.'
    - name: labelInfo
      type: STR
      description: Output only. An overview of the labels on the file.
    - name: lastModifyingUser
      type: STR
      description: Output only. The last user to modify the file. This field is only populated when the last modification
        was performed by a signed-in user.
    - name: linkShareMetadata
      type: STR
      description: Contains details about the link URLs that clients are using to refer to this item.
    - name: md5Checksum
      type: STR
      description: Output only. The MD5 checksum for the content of the file. This is only applicable to files with binary
        content in Google Drive.
    - name: mimeType
      type: STR
      description: The MIME type of the file. Google Drive attempts to automatically detect an appropriate value from uploaded
        content, if no value is provided. The value cannot be changed unless a new revision is uploaded. If a file is created
        with a Google Doc MIME type, the uploaded content is imported, if possible. The supported import formats are published
        in the [`about`](/workspace/drive/api/reference/rest/v3/about) resource.
    - name: modifiedByMe
      type: BOOL
      description: Output only. Whether the file has been modified by this user.
    - name: modifiedByMeTime
      type: STR
      description: The last time the file was modified by the user (RFC 3339 date-time).
    - name: modifiedTime
      type: STR
      description: he last time the file was modified by anyone (RFC 3339 date-time). Note that setting modifiedTime will
        also update modifiedByMeTime for the user.
    - name: name
      type: STR
      description: The name of the file. This isn't necessarily unique within a folder. Note that for immutable items such
        as the top-level folders of shared drives, the My Drive root folder, and the Application Data folder, the name is
        constant.
    - name: originalFilename
      type: STR
      description: The original filename of the uploaded content if available, or else the original value of the `name` field.
        This is only available for files with binary content in Google Drive.
    - name: ownedByMe
      type: BOOL
      description: Output only. Whether the user owns the file. Not populated for items in shared drives.
    - name: owners
      type: LIST
      description: Output only. The owner of this file. Only certain legacy files may have more than one owner. This field
