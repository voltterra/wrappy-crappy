      description: Token used to access the next page of this result. Omitted if no further results are available, in which
        case nextSyncToken is provided.
    - name: nextSyncToken
      type: STR
      description: Token used at a later point in time to retrieve only the entries that have changed since this result was
        returned. Omitted if further results are available, in which case nextPageToken is provided.
  - name: watch
