      type: STR
      description: The ID of the theme from which the background image and color will be set. The set of possible `driveThemes`
        can be retrieved from a `drive.about.get` response. When not specified on a `drive.drives.create` request, a random
        theme is chosen from which the background image and color are set. This is a write-only field; it can only be set
