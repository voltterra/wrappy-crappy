      is_flag: true
    - name: showCompleted
      type: BOOL
      description: Flag indicating whether completed tasks are returned in the result. Note that showHidden must also be True
        to show tasks completed in first party clients, such as the web UI and Google's mobile apps. Optional. The default
        is True.
      is_flag: true
    - name: showDeleted
      type: BOOL
      description: Flag indicating whether deleted tasks are returned in the result. Optional. The default is False.
      is_flag: true
    - name: showHidden
      type: BOOL
      description: Flag indicating whether hidden tasks are returned in the result. Optional. The default is False.
      is_flag: true
